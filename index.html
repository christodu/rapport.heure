const calcHeures = (p) => {
  const [h1,m1] = p.debut.split(":").map(Number);
  const [h2,m2] = p.fin.split(":").map(Number);
  const min = (h2*60+m2)-(h1*60+m1)-(p.pause||0);
  return Math.max(0, Math.round((min/60)*100)/100);
};
const calcHSupSemaine = (ptgs) => {
  const total = ptgs.reduce((s,p)=>s+calcHeures(p),0);
  return Math.max(0, Math.round((total-35)*100)/100);
};
const calcHNuit = (p) => {
  const [h2,m2] = p.fin.split(":").map(Number);
  const finMin = h2*60+m2;
  if (finMin <= 20*60) return 0;
  const minNuit = finMin - 20*60;
  return Math.min(Math.round((minNuit/60)*100)/100, calcHeures(p));
};

function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}
function usePersist(key, init) {
  const [val, setVal] = useState(() => load(key, init));
  const setter = (v) => {
    const next = typeof v === "function" ? v(val) : v;
    setVal(next); save(key, next);
  };
  return [val, setter];
}

// ============================================================
//  UTILITAIRES SEMAINE ISO
// ============================================================
function infoSemaine(iso) {
  const d = new Date(iso + "T00:00:00");
  const j = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = j.getUTCDay() || 7;
  j.setUTCDate(j.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(j.getUTCFullYear(), 0, 1));
  const numSem = Math.ceil((((j - yearStart) / 86400000) + 1) / 7);
  const annee = j.getUTCFullYear();
  const sem = String(numSem).padStart(2, "0");
  const lundiD = new Date(iso + "T00:00:00");
  lundiD.setDate(lundiD.getDate() - (lundiD.getDay() || 7) + 1);
  const vendrediD = new Date(lundiD); vendrediD.setDate(lundiD.getDate() + 4);
  const fmt = (x) => x.toLocaleDateString("fr-FR", {day:"numeric", month:"short"});
  return {
    annee, semaine: numSem, cle: `${annee}-S${sem}`,
    label: `S${sem} — ${fmt(lundiD)} au ${fmt(vendrediD)} ${annee}`,
    labelCourt: `S${sem}`,
    moisNum: lundiD.getMonth() + 1,
    moisLabel: lundiD.toLocaleDateString("fr-FR", {month:"long", year:"numeric"}),
    lundi: lundiD.toISOString().slice(0,10),
    vendredi: vendrediD.toISOString().slice(0,10),
  };
}
function semaineCouranteCle() { return infoSemaine(new Date().toISOString().slice(0,10)).cle; }
function grouperParSemaine(pointages) {
  const map = {};
  pointages.forEach(p => { const { cle } = infoSemaine(p.date); if (!map[cle]) map[cle] = []; map[cle].push(p); });
  return map;
}

// ============================================================
//  SUPABASE — configuration runtime
// ============================================================
const _SB_URL = "";
const _SB_KEY = "";

function getSb() {
  const url = localStorage.getItem("chok_sb_url") || _SB_URL;
  const key = localStorage.getItem("chok_sb_key") || _SB_KEY;
  if (url && key && typeof supabase !== "undefined") {
    try { return supabase.createClient(url, key); } catch(e) { return null; }
  }
  return null;
}

async function sbSync(table, newData, prevData) {
  const sb = getSb(); if (!sb) return;
  const prevIds = new Set((prevData||[]).map(r=>r.id));
  const newIds  = new Set((newData||[]).map(r=>r.id));
  const toUpsert  = newData.filter(r => !prevIds.has(r.id) || JSON.stringify(r) !== JSON.stringify((prevData||[]).find(p=>p.id===r.id)));
  const toDelete  = [...prevIds].filter(id => !newIds.has(id));
  if (toUpsert.length)  await sb.from(table).upsert(toUpsert);
  if (toDelete.length)  await sb.from(table).delete().in("id", toDelete);
}

function App() {
  const [pinRH,   setPinRH]   = usePersist("chok_pin_rh",   "1234");
  const [pinChef, setPinChef] = usePersist("chok_pin_chef",  "0000");

  const [salaries,     setSalariesRaw]     = useState(() => { const s = load("chok_salaries", null); return (s && s.length > 0) ? s : REAL_SALARIES; });
  const [interimaires, setInterimairesRaw] = useState(() => load("chok_interimaires", []));
  const [chantiers,    setChantiersRaw]    = useState(() => load("chok_chantiers",    []));
  const [pointages,    setPointagesRaw]    = useState(() => load("chok_pointages",    []));
  const [absences,     setAbsencesRaw]     = useState(() => load("chok_absences",     []));
  const [appLoading,   setAppLoading]      = useState(false);
  const [syncState,    setSyncState]       = useState("idle");

  const refs = {
    salaries:     useRef(salaries),
    interimaires: useRef(interimaires),
    chantiers:    useRef(chantiers),
    pointages:    useRef(pointages),
    absences:     useRef(absences),
  };
  useEffect(() => { refs.salaries.current     = salaries; },     [salaries]);
  useEffect(() => { refs.interimaires.current = interimaires; }, [interimaires]);
  useEffect(() => { refs.chantiers.current    = chantiers; },    [chantiers]);
  useEffect(() => { refs.pointages.current    = pointages; },    [pointages]);
  useEffect(() => { refs.absences.current     = absences; },     [absences]);

  const chargerDepuisSupabase = useCallback(async () => {
    const sb = getSb(); if (!sb) return;
    setAppLoading(true); setSyncState("syncing");
    try {
      const [s,i,c,p,a] = await Promise.all([
        sb.from("salaries").select("*"),
        sb.from("interimaires").select("*"),
        sb.from("chantiers").select("*"),
        sb.from("pointages").select("*"),
        sb.from("absences").select("*"),
      ]);
      if (!s.error && s.data.length) { setSalariesRaw(s.data);     save("chok_salaries",     s.data); }
      if (!i.error) { setInterimairesRaw(i.data); save("chok_interimaires", i.data); }
      if (!c.error) { setChantiersRaw(c.data);    save("chok_chantiers",    c.data); }
      if (!p.error) { setPointagesRaw(p.data);    save("chok_pointages",    p.data); }
      if (!a.error) { setAbsencesRaw(a.data);     save("chok_absences",     a.data); }
      setSyncState("ok");
    } catch(e) { setSyncState("err"); }
    finally { setAppLoading(false); }
  }, []);

  useEffect(() => { chargerDepuisSupabase(); }, []);

  function makeSetter(rawSetter, ref, lsKey, table) {
    return (v) => {
      const prev = ref.current;
      const next = typeof v === "function" ? v(prev) : v;
      ref.current = next;
      rawSetter(next);
      save(lsKey, next);
      const sb = getSb();
      if (sb) {
        setSyncState("syncing");
        sbSync(table, next, prev)
          .then(() => setSyncState("ok"))
          .catch(() => setSyncState("err"));
      }
    };
  }

  const setSalaries     = makeSetter(setSalariesRaw,     refs.salaries,     "chok_salaries",     "salaries");
  const setInterimaires = makeSetter(setInterimairesRaw, refs.interimaires, "chok_interimaires", "interimaires");
  const setChantiers    = makeSetter(setChantiersRaw,    refs.chantiers,    "chok_chantiers",    "chantiers");
  const setPointages    = makeSetter(setPointagesRaw,    refs.pointages,    "chok_pointages",    "pointages");
  const setAbsences     = makeSetter(setAbsencesRaw,     refs.absences,     "chok_absences",     "absences");

  const [session, setSession] = useState(null);
  const seDeconnecter = () => setSession(null);

  const donnees = { salaries, setSalaries, interimaires, setInterimaires, chantiers, setChantiers, pointages, setPointages, absences, setAbsences };

  const chargerDemo = () => {
    setSalaries(DEMO.salaries);
    setInterimaires(DEMO.interimaires);
    setChantiers(DEMO.chantiers);
  };

  if (appLoading) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontFamily:FM,fontSize:12,color:C.gris,letterSpacing:"0.2em"}}>CHARGEMENT SUPABASE…</div>
    </div>
  );

  if (!session) return <EcranConnexion salaries={salaries} interimaires={interimaires} pinRH={pinRH} pinChef={pinChef} onConnexion={setSession}/>;

  return (
    <div>
      <Header session={session} onDeconnexion={seDeconnecter} syncState={syncState} onReload={chargerDepuisSupabase}/>
      {session.role === "rh"     && <VueAdmin {...donnees} pinRH={pinRH} setPinRH={setPinRH} pinChef={pinChef} setPinChef={setPinChef} onChargerDemo={chargerDemo} onReloadSupabase={chargerDepuisSupabase}/>}
      {session.role === "chef"   && <VueMobile {...donnees}/>}
      {session.role === "salarie"&& <VueSalarie session={session} pointages={pointages} chantiers={chantiers} salaries={salaries} interimaires={interimaires}/>}
      <Footer/>
    </div>
  );
}

// ============================================================
//  CLAVIER PIN
// ============================================================
function PinPad({pin, setPin, onValider, erreur, setErreur}) {
  const ajouter = (c) => { if (pin.length >= 6) return; setErreur(""); setPin(pin + c); };
  const effacer = () => { setPin(pin.slice(0,-1)); setErreur(""); };
  return (
    <div>
      <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:20}}>
        {[0,1,2,3,4,5].map(i=>(
          <div key={i} style={{width:40,height:40,border:`2px solid ${pin.length>i?C.encre:C.ligne}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:700,background:pin.length>i?C.encre:C.papier,color:C.jaune}}>
            {pin.length>i?"●":""}
          </div>
        ))}
      </div>
      {erreur && <div style={{padding:"8px 12px",background:"#FFF0F0",border:`1px solid ${C.orange}`,color:C.orange,fontSize:12,marginBottom:12,textAlign:"center"}}>{erreur}</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>
        {["1","2","3","4","5","6","7","8","9"].map(c=>(
          <button key={c} onClick={()=>ajouter(c)} style={{padding:"18px",fontFamily:FT,fontSize:22,fontWeight:700,background:C.papier,border:`1.5px solid ${C.ligne}`,cursor:"pointer"}}>{c}</button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
        <button onClick={effacer} style={{padding:"18px",fontFamily:FM,fontSize:12,fontWeight:700,background:"transparent",border:`1.5px solid ${C.ligne}`,cursor:"pointer",color:C.gris}}>⌫</button>
        <button onClick={()=>ajouter("0")} style={{padding:"18px",fontFamily:FT,fontSize:22,fontWeight:700,background:C.papier,border:`1.5px solid ${C.ligne}`,cursor:"pointer"}}>0</button>
        <button onClick={onValider} style={{padding:"18px",fontFamily:FM,fontSize:12,fontWeight:700,background:C.encre,border:"none",color:C.jaune,cursor:"pointer"}}>OK ✓</button>
      </div>
    </div>
  );
}

// ============================================================
//  VUE ADMIN
// ============================================================
function VueAdmin({pointages,setPointages,chantiers,setChantiers,salaries,setSalaries,interimaires,setInterimaires,absences,setAbsences,pinRH,setPinRH,pinChef,setPinChef,onChargerDemo,onReloadSupabase}) {
  const [onglet, setOnglet] = useState("pointages");
  const auj = new Date().toISOString().slice(0,10);
  const ptgAuj = pointages.filter(p=>p.date===auj);
  const totalH = ptgAuj.reduce((s,p)=>s+calcHeures(p),0);
  const aValider = ptgAuj.filter(p=>!p.valide).length;
  const semaineCourante = (()=>{const d=new Date(),day=d.getDay()||7;const lundi=new Date(d);lundi.setDate(d.getDate()-day+1);return Array.from({length:7},(_,i)=>{const x=new Date(lundi);x.setDate(lundi.getDate()+i);return x.toISOString().slice(0,10);});})();
  const ptgSemaine = pointages.filter(p=>semaineCourante.includes(p.date));
  const intJour = [...new Set(ptgAuj.filter(p=>p.interim).map(p=>p.salarie))].length;
  const intSemaine = [...new Set(ptgSemaine.filter(p=>p.interim).map(p=>p.salarie))].length;
  const trouver = (id) => salaries.find(s=>s.id===id) || interimaires.find(i=>i.id===id);
  const valider = (id) => setPointages(pointages.map(p=>p.id===id?{...p,valide:true}:p));
  const validerTout = () => setPointages(pointages.map(p=>p.date===auj?{...p,valide:true}:p));
  const supprPointage = (id) => setPointages(pointages.filter(p=>p.id!==id));
  const tabs = [["pointages","Pointages"],["absences","Absences"],["salaries","Salariés"],["interim","Intérimaires"],["chantiers","Chantiers"],["paie","Rapport"],["archives","Archives 📁"],["parametres","⚙ Paramètres"]];
  return (
    <main style={{padding:"28px 32px",maxWidth:1500,margin:"0 auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",paddingBottom:20,borderBottom:`1px solid ${C.ligne}`,marginBottom:24}}>
        <div>
          <div style={{fontSize:11,color:C.gris,letterSpacing:"0.2em",marginBottom:6}}>JOURNÉE EN COURS</div>
          <div style={{fontFamily:FT,fontSize:32,fontWeight:800,letterSpacing:"-0.02em"}}>{dateFr()}</div>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:14,marginBottom:28}}>
        <Kpi label="Pointages du jour" val={ptgAuj.length} sub="entrées aujourd'hui" accent={C.jaune}/>
        <Kpi label="Heures totales" val={fmtH(totalH)} sub={`${chantiers.filter(c=>c.actif).length} chantier(s) actif(s)`} accent="#3D5A80"/>
        <Kpi label="Salariés" val={salaries.length} sub="CHOK BÉTON enregistrés" accent={C.vert}/>
        <Kpi label="Intérimaires / jour" val={intJour} sub="personnes différentes aujourd'hui" accent={C.bleu}/>
        <Kpi label="Intérimaires / sem." val={intSemaine} sub="personnes cette semaine" accent="#6C3483"/>
        <Kpi label="À valider" val={aValider} sub="pointages en attente RH" accent={C.encre} alert={aValider>0}/>
      </div>
      <div className="admin-tabs">
        {tabs.map(([k,l])=>(
          <button key={k} onClick={()=>setOnglet(k)} style={{fontFamily:FM,fontSize:12,fontWeight:onglet===k?700:500,padding:"12px 20px",background:"transparent",border:"none",cursor:"pointer",letterSpacing:"0.1em",color:onglet===k?C.encre:C.gris,borderBottom:onglet===k?`3px solid ${C.jaune}`:"3px solid transparent",marginBottom:-2,flexShrink:0}}>
            {l.toUpperCase()}
          </button>
        ))}
      </div>
      {onglet==="pointages"  && <OngletPointages auj={auj} pointagesTous={pointages} setPointages={setPointages} chantiers={chantiers} salaries={salaries} interimaires={interimaires} trouver={trouver} aValider={aValider} valider={valider} validerTout={validerTout} supprPointage={supprPointage}/>}
      {onglet==="absences"   && <OngletAbsences absences={absences} setAbsences={setAbsences} salaries={salaries} interimaires={interimaires} pointages={pointages}/>}
      {onglet==="salaries"   && <OngletSalaries salaries={salaries} setSalaries={setSalaries} pointages={pointages}/>}
      {onglet==="interim"    && <OngletInterim interimaires={interimaires} setInterimaires={setInterimaires} pointages={pointages} chantiers={chantiers}/>}
      {onglet==="chantiers"  && <OngletChantiers chantiers={chantiers} setChantiers={setChantiers} pointages={pointages}/>}
      {onglet==="paie"       && <OngletPaie pointages={pointages} absences={absences} salaries={salaries} interimaires={interimaires} chantiers={chantiers}/>}
      {onglet==="archives"   && <OngletArchives pointages={pointages} absences={absences} salaries={salaries} interimaires={interimaires} chantiers={chantiers}/>}
      {onglet==="parametres" && <OngletParametres pinRH={pinRH} setPinRH={setPinRH} pinChef={pinChef} setPinChef={setPinChef} onChargerDemo={onChargerDemo} onReloadSupabase={onReloadSupabase} salaries={salaries} setSalaries={setSalaries} chantiers={chantiers} setChantiers={setChantiers} interimaires={interimaires} setInterimaires={setInterimaires} pointages={pointages} setPointages={setPointages} absences={absences} setAbsences={setAbsences}/>}
    </main>
  );
}

// ---- Onglet Pointages ----
function OngletPointages({auj,pointagesTous,setPointages,chantiers,salaries,interimaires,trouver,aValider,valider,validerTout,supprPointage}) {
  const [filtre,setFiltre] = useState("tous");
  const [editId,setEditId] = useState(null);
  const [editData,setEditData] = useState({});
  const liste = filtre==="tous" ? pointagesTous.filter(p=>p.date===auj) : pointagesTous.filter(p=>p.date===auj&&p.chantier===filtre);
  const semaineCourante=(()=>{const d=new Date(),day=d.getDay()||7;const lundi=new Date(d);lundi.setDate(d.getDate()-day+1);return Array.from({length:7},(_,i)=>{const x=new Date(lundi);x.setDate(lundi.getDate()+i);return x.toISOString().slice(0,10);});})();
  const ptgSem=pointagesTous.filter(p=>semaineCourante.includes(p.date));
  const alertesJour=pointagesTous.filter(p=>p.date===auj&&calcHeures(p)>10).map(p=>({id:p.id,niveau:"danger",msg:`${trouver(p.salarie)?.nom||p.salarie} — ${fmtH(calcHeures(p))}/jour (max légal : 10h)`}));
  const personnesSem=[...new Set(ptgSem.map(p=>p.salarie))];
  const alertesSemaine=personnesSem.flatMap(id=>{const total=ptgSem.filter(p=>p.salarie===id).reduce((s,p)=>s+calcHeures(p),0);if(total>48)return[{id,niveau:"danger",msg:`${trouver(id)?.nom||id} — ${fmtH(total)}/semaine (max légal : 48h)`}];if(total>44)return[{id,niveau:"warn",msg:`${trouver(id)?.nom||id} — ${fmtH(total)}/semaine (seuil : 44h)`}];return[];});
  const toutesAlertes=[...alertesJour,...alertesSemaine];
  const iStyle={padding:"6px 8px",background:C.papier,border:`1.5px solid ${C.encre}`,fontFamily:FM,fontSize:12,outline:"none",width:"100%",boxSizing:"border-box"};
  const ouvrirEdit=(p)=>{setEditId(p.id);setEditData({debut:p.debut,fin:p.fin,pause:p.pause,chantier:p.chantier,commentaire:p.commentaire||""});};
  const annulerEdit=()=>{setEditId(null);setEditData({});};
  const sauvegarderEdit=(id)=>{setPointages(pointagesTous.map(p=>p.id===id?{...p,...editData,modifiePar:"RH",modifieLe:new Date().toISOString()}:p));setEditId(null);setEditData({});};
  return (
    <Section titre="Pointages du jour" actions={
      <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
        <select value={filtre} onChange={e=>setFiltre(e.target.value)} style={selectStyle}>
          <option value="tous">Tous les chantiers</option>
          {chantiers.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}
        </select>
        {aValider>0 && <Btn onClick={validerTout}>✓ TOUT VALIDER ({aValider})</Btn>}
      </div>
    }>
      {toutesAlertes.length>0 && <div style={{marginBottom:16}}>{toutesAlertes.map((a,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",marginBottom:6,background:a.niveau==="danger"?"#FFF0F0":"#FFF8E1",border:`1.5px solid ${a.niveau==="danger"?C.orange:"#F39C12"}`}}>
          <span style={{fontSize:18}}>{a.niveau==="danger"?"🔴":"🟠"}</span>
          <div><div style={{fontFamily:FM,fontSize:11,fontWeight:700,color:a.niveau==="danger"?C.orange:"#B7770D"}}>{a.niveau==="danger"?"DÉPASSEMENT LÉGAL":"SEUIL D'ALERTE"}</div><div style={{fontSize:12,marginTop:2}}>{a.msg}</div></div>
        </div>
      ))}</div>}
      {liste.length===0
        ? <EmptyState>Aucun pointage aujourd'hui.<br/><small style={{color:C.gris}}>Les rapports arrivent depuis l'onglet Chef d'équipe.</small></EmptyState>
        : <TableWrap>
            <thead><tr><Th>Date</Th><Th>Personne</Th><Th>Statut</Th><Th>Chantier</Th><Th r>Début</Th><Th r>Fin</Th><Th r>Pause</Th><Th r>Total</Th><Th r>H.Nuit</Th><Th>Commentaire</Th><Th>État RH</Th><Th></Th></tr></thead>
            <tbody>{liste.map(p=>{
              const pers=trouver(p.salarie);const ch=chantiers.find(c=>c.id===p.chantier);const ag=p.interim?AGENCES.find(a=>a.id===pers?.agence):null;
              const dateCourte=p.date?new Date(p.date+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}):"—";
              const hTot=calcHeures(p);const hNuit=calcHNuit(p);const enEdition=editId===p.id;
              const hEdit=enEdition?calcHeures({...p,...editData}):hTot;
              return(<tr key={p.id} style={{borderBottom:`1px solid ${C.ligne}`,background:hTot>10?"#FFF8F8":enEdition?"#FFFDE7":"transparent"}}>
                <Td><span style={{fontSize:11,fontWeight:500}}>{dateCourte}</span>{p.modifiePar&&<div style={{fontSize:9,color:C.gris,marginTop:2}}>✎ Modifié RH</div>}</Td>
                <Td><b style={{fontSize:13}}>{pers?.nom||p.salarie}</b><br/><span style={{fontSize:11,color:C.gris}}>{pers?.poste||"—"}{p.chefNom?` · Chef: ${p.chefNom}`:""}</span></Td>
                <Td>{p.interim?<span style={{fontSize:10,padding:"3px 8px",color:"#fff",fontWeight:700,background:ag?.couleur}}>{ag?.nom||"INTÉRIM"}</span>:<span style={{fontSize:10,padding:"3px 8px",fontWeight:700,border:`1px solid ${C.encre}`}}>INTERNE</span>}</Td>
                <Td>{enEdition?<select value={editData.chantier} onChange={e=>setEditData({...editData,chantier:e.target.value})} style={{...iStyle,width:160}}>{chantiers.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}</select>:ch?<span style={{fontSize:11,padding:"3px 8px",fontWeight:700,background:ch.couleur,color:ch.couleur==="#F5C518"?"#0A0A0A":"#fff"}}>{ch.nom}</span>:"—"}</Td>
                <Td r>{enEdition?<input type="time" value={editData.debut} onChange={e=>setEditData({...editData,debut:e.target.value})} style={{...iStyle,width:90,textAlign:"center"}}/>:p.debut}</Td>
                <Td r>{enEdition?<input type="time" value={editData.fin} onChange={e=>setEditData({...editData,fin:e.target.value})} style={{...iStyle,width:90,textAlign:"center"}}/>:p.fin}</Td>
                <Td r>{enEdition?<input type="number" value={editData.pause} onChange={e=>setEditData({...editData,pause:parseInt(e.target.value)||0})} style={{...iStyle,width:70,textAlign:"center"}}/>:`${p.pause}min`}</Td>
                <Td r><b style={{color:hEdit>10?C.orange:"inherit"}}>{fmtH(enEdition?hEdit:hTot)}</b></Td>
                <Td r>{hNuit>0?<span style={{color:"#6C3483",fontWeight:700,fontSize:11}}>{fmtH(hNuit)}</span>:<span style={{color:C.ligne}}>—</span>}</Td>
                <Td>{enEdition?<textarea value={editData.commentaire||""} onChange={e=>setEditData({...editData,commentaire:e.target.value})} rows={2} style={{...iStyle,width:160,resize:"vertical",fontSize:11}}/>:p.commentaire?<span style={{fontSize:10,color:"#6C3483",fontStyle:"italic"}}>💬 {p.commentaire}</span>:<span style={{color:C.ligne,fontSize:10}}>—</span>}</Td>
                <Td>{p.valide?<span style={{color:C.vert,fontSize:11,fontWeight:700}}>● VALIDÉ</span>:<span style={{color:C.orange,fontSize:11,fontWeight:700}}>● ATTENTE</span>}</Td>
                <Td>{enEdition?(<div style={{display:"flex",gap:6,flexDirection:"column"}}><Btn variant="mini" onClick={()=>sauvegarderEdit(p.id)}>✓ SAUVER</Btn><Btn variant="ghost" onClick={annulerEdit}>ANNULER</Btn></div>):(<div style={{display:"flex",gap:6}}><Btn variant="ghost" onClick={()=>ouvrirEdit(p)}>✎</Btn>{!p.valide&&<Btn variant="mini" onClick={()=>valider(p.id)}>✓</Btn>}<Btn variant="danger-mini" onClick={()=>supprPointage(p.id)}>✕</Btn></div>)}</Td>
              </tr>);
            })}</tbody>
          </TableWrap>
      }
      <div style={{marginTop:12,fontSize:11,color:C.gris,display:"flex",gap:20,flexWrap:"wrap"}}>
        <span>🔴 Dépassement légal (&gt;10h/j ou &gt;48h/sem)</span>
        <span>🟠 Seuil d'alerte (&gt;44h/sem)</span>
      </div>
    </Section>
  );
}

// ---- Onglet Absences ----
function OngletAbsences({absences,setAbsences,salaries,interimaires,pointages}) {
  const auj = new Date().toISOString().slice(0,10);
  const [open,setOpen]=useState(false);
  const [personneId,setPersonneId]=useState("");
  const [dateDebut,setDateDebut]=useState(auj);
  const [dateFin,setDateFin]=useState(auj);
  const [type,setType]=useState(TYPES_ABSENCE[0].code);
  const [commentaire,setCommentaire]=useState("");
  const [err,setErr]=useState("");
  const [filtreType,setFiltreType]=useState("tous");
  const [filtrePersonne,setFiltrePersonne]=useState("tous");
  const tousPersonnes=[...salaries.map(s=>({...s,_type:"interne"})),...interimaires.map(i=>({...i,_type:"interim"}))];
  const ajouter=()=>{
    if(!personneId){setErr("Sélectionnez une personne.");return;}
    if(dateDebut>dateFin){setErr("La date de fin doit être après la date de début.");return;}
    const typeInfo=TYPES_ABSENCE.find(t=>t.code===type);
    setAbsences([...absences,{id:genId("A"),salarie:personneId,dateDebut,dateFin,type,typeLabel:typeInfo.label,typeIcone:typeInfo.icone,commentaire:commentaire.trim(),saisieParRH:true,saisieDate:new Date().toISOString()}]);
    setPersonneId("");setDateDebut(auj);setDateFin(auj);setType(TYPES_ABSENCE[0].code);setCommentaire("");setOpen(false);setErr("");
  };
  const supprimer=(id)=>{if(!window.confirm("Supprimer cette absence ?"))return;setAbsences(absences.filter(a=>a.id!==id));};
  const nbJoursOuvres=(d1,d2)=>{let count=0;const cur=new Date(d1+"T00:00:00");const fin=new Date(d2+"T00:00:00");while(cur<=fin){const j=cur.getDay();if(j!==0&&j!==6)count++;cur.setDate(cur.getDate()+1);}return count;};
  const listeFiltree=absences.filter(a=>filtreType==="tous"||a.type===filtreType).filter(a=>filtrePersonne==="tous"||a.salarie===filtrePersonne).sort((a,b)=>b.dateDebut.localeCompare(a.dateDebut));
  const fmtDate=(iso)=>new Date(iso+"T00:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"});
  return (
    <Section titre={`Absences & Congés — ${absences.length}`} actions={<Btn onClick={()=>{setOpen(!open);setErr("");}}>{open?"✕ Annuler":"+ SAISIR UNE ABSENCE"}</Btn>}>
      {open&&<FormInline>
        <div style={{fontFamily:FM,fontSize:10,letterSpacing:"0.2em",color:C.gris,fontWeight:700,marginBottom:12}}>NOUVELLE ABSENCE / CONGÉ</div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end",marginBottom:12}}>
          <Champ label="PERSONNE"><select value={personneId} onChange={e=>{setPersonneId(e.target.value);setErr("");}} style={selectStyle}><option value="" disabled>— Sélectionner —</option>{salaries.length>0&&<optgroup label="── Salariés CHOK BÉTON">{salaries.map(s=><option key={s.id} value={s.id}>{s.nom}</option>)}</optgroup>}{interimaires.length>0&&<optgroup label="── Intérimaires">{interimaires.map(i=><option key={i.id} value={i.id}>{i.nom}</option>)}</optgroup>}</select></Champ>
          <Champ label="TYPE"><select value={type} onChange={e=>setType(e.target.value)} style={selectStyle}>{TYPES_ABSENCE.map(t=><option key={t.code} value={t.code}>{t.icone} {t.label}</option>)}</select></Champ>
          <Champ label="DÉBUT"><input type="date" value={dateDebut} onChange={e=>setDateDebut(e.target.value)} style={inputStyle}/></Champ>
          <Champ label="FIN"><input type="date" value={dateFin} onChange={e=>setDateFin(e.target.value)} style={inputStyle}/></Champ>
          {dateDebut&&dateFin&&dateDebut<=dateFin&&<div style={{padding:"0 0 2px",fontSize:12,color:C.gris,alignSelf:"flex-end"}}>→ <b>{nbJoursOuvres(dateDebut,dateFin)}</b> jour(s) ouvré(s)</div>}
        </div>
        <div style={{display:"flex",gap:12,alignItems:"flex-end"}}>
          <Champ label="COMMENTAIRE (OPTIONNEL)" style={{flex:1}}><input value={commentaire} onChange={e=>setCommentaire(e.target.value)} placeholder="Justificatif..." style={{...inputStyle,minWidth:300}}/></Champ>
          <Btn onClick={ajouter}>ENREGISTRER</Btn>
        </div>
        {err&&<ErrBox>{err}</ErrBox>}
      </FormInline>}
      {absences.length>0&&<div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}><select value={filtreType} onChange={e=>setFiltreType(e.target.value)} style={selectStyle}><option value="tous">Tous les types</option>{TYPES_ABSENCE.map(t=><option key={t.code} value={t.code}>{t.icone} {t.label}</option>)}</select><select value={filtrePersonne} onChange={e=>setFiltrePersonne(e.target.value)} style={selectStyle}><option value="tous">Toutes les personnes</option>{salaries.map(s=><option key={s.id} value={s.id}>{s.nom}</option>)}{interimaires.map(i=><option key={i.id} value={i.id}>{i.nom}</option>)}</select><span style={{fontSize:11,color:C.gris}}>{listeFiltree.length} résultat(s)</span></div>}
      {absences.length===0?<EmptyState>Aucune absence. Cliquez sur "+ SAISIR UNE ABSENCE".</EmptyState>
        :listeFiltree.length===0?<EmptyState>Aucun résultat pour ces filtres.</EmptyState>
        :<TableWrap><thead><tr><Th>Personne</Th><Th>Type</Th><Th>Début</Th><Th>Fin</Th><Th r>Jours ouvrés</Th><Th>Commentaire</Th><Th></Th></tr></thead>
          <tbody>{listeFiltree.map(a=>{const typeInfo=TYPES_ABSENCE.find(t=>t.code===a.type);const jours=nbJoursOuvres(a.dateDebut,a.dateFin);const personne=tousPersonnes.find(p=>p.id===a.salarie);
          return(<tr key={a.id} style={{borderBottom:`1px solid ${C.ligne}`}}><Td><b>{personne?.nom||a.salarie}</b></Td><Td><span style={{display:"inline-flex",alignItems:"center",gap:6,padding:"4px 10px",background:typeInfo?.couleur+"22",border:`1px solid ${typeInfo?.couleur}`,fontSize:11,fontWeight:700,color:typeInfo?.couleur}}>{typeInfo?.icone} {typeInfo?.label}</span></Td><Td>{fmtDate(a.dateDebut)}</Td><Td>{fmtDate(a.dateFin)}</Td><Td r><b style={{fontFamily:FT,fontSize:16}}>{jours}</b> <span style={{fontSize:10,color:C.gris}}>j.</span></Td><Td>{a.commentaire?<span style={{fontSize:11,color:"#6C3483",fontStyle:"italic"}}>💬 {a.commentaire}</span>:<span style={{color:C.ligne}}>—</span>}</Td><Td><Btn variant="danger" onClick={()=>supprimer(a.id)}>SUPPR.</Btn></Td></tr>);
          })}</tbody></TableWrap>
      }
    </Section>
  );
}

// ---- Onglet Salariés (avec import en masse) ----
function OngletSalaries({salaries,setSalaries,pointages}) {
  const [open,setOpen]=useState(false);
  const [nom,setNom]=useState("");
  const [poste,setPoste]=useState(POSTES[0]);
  const [err,setErr]=useState("");
  const [importOpen,setImportOpen]=useState(false);
  const [importTexte,setImportTexte]=useState("");
  const [importPreview,setImportPreview]=useState([]);

  const ajouter=()=>{
    if(nom.trim().length<2){setErr("Nom trop court.");return;}
    if(salaries.some(s=>s.nom.toLowerCase()===nom.trim().toLowerCase())){setErr("Déjà enregistré.");return;}
    setSalaries([...salaries,{id:genId("S"),nom:nom.trim(),poste,equipe:"—",interne:true}]);
    setNom("");setPoste(POSTES[0]);setOpen(false);setErr("");
  };
  const supprimer=(id)=>{
    if(pointages.some(p=>p.salarie===id)&&!window.confirm("Ce salarié a des pointages. Supprimer quand même ?"))return;
    setSalaries(salaries.filter(s=>s.id!==id));
  };

  const detecterPoste=(l)=>{
    const ll=l.toLowerCase();
    if(ll.includes(" ce ")||ll.includes("chef")||ll.endsWith(" ce")||ll.includes("(ce)")||ll.includes("chef d'équipe")) return "Chef d'équipe";
    return "Chef d'équipe";
  };
  const nettoyerNom=(l)=>l.replace(/\s*[-–—]\s*(CE|chef d'équipe|manœuvre|mano|maçon)\s*$/i,"").replace(/\s*\((CE|chef|mano)\)/gi,"").trim();

  const analyserImport=(texte)=>{
    const lignes=texte.split("\n").map(l=>l.trim()).filter(l=>l.length>2);
    return lignes.map(l=>({
      nomBrut:l,
      nom:nettoyerNom(l),
      poste:detecterPoste(l),
      doublon:salaries.some(s=>s.nom.toLowerCase()===nettoyerNom(l).toLowerCase()),
    }));
  };

  const handleImportTexte=(v)=>{setImportTexte(v);setImportPreview(analyserImport(v));};
  const confirmerImport=()=>{
    const nouveaux=importPreview.filter(r=>!r.doublon&&r.nom.length>2).map(r=>({id:genId("S"),nom:r.nom,poste:r.poste,equipe:"—",interne:true}));
    setSalaries([...salaries,...nouveaux]);
    setImportTexte("");setImportPreview([]);setImportOpen(false);
  };

  return (
    <Section titre={`Salariés CHOK BÉTON — ${salaries.length}`} actions={
      <div style={{display:"flex",gap:8}}>
        <Btn variant="ghost" onClick={()=>{setImportOpen(!importOpen);setOpen(false);}}>{importOpen?"✕ Annuler":"↑ IMPORT EN MASSE"}</Btn>
        <Btn onClick={()=>{setOpen(!open);setImportOpen(false);}}>{open?"✕ Annuler":"+ AJOUTER"}</Btn>
      </div>
    }>
      {open&&<FormInline>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
          <Champ label="NOM COMPLET"><input value={nom} onChange={e=>{setNom(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&ajouter()} placeholder="NOM Prénom" style={inputStyle}/></Champ>
          <Champ label="POSTE"><select value={poste} onChange={e=>setPoste(e.target.value)} style={selectStyle}>{POSTES.map(p=><option key={p}>{p}</option>)}</select></Champ>
          <Btn onClick={ajouter}>AJOUTER</Btn>
        </div>
        {err&&<ErrBox>{err}</ErrBox>}
      </FormInline>}

      {importOpen&&<FormInline>
        <div style={{fontFamily:FM,fontSize:10,letterSpacing:"0.2em",color:C.gris,fontWeight:700,marginBottom:12}}>IMPORT EN MASSE — UN NOM PAR LIGNE</div>
        <div style={{display:"flex",gap:10,marginBottom:10,flexWrap:"wrap",fontSize:11,color:C.gris}}>
          Format libre : <code style={{background:C.fond,padding:"2px 6px",fontSize:11}}>DUPONT Jean</code> ou <code style={{background:C.fond,padding:"2px 6px",fontSize:11}}>Jean Dupont</code>
        </div>
        <textarea value={importTexte} onChange={e=>handleImportTexte(e.target.value)} placeholder={"ADOU Stéphane\nBAKAYOKO Moussa\n..."} rows={8} style={{width:"100%",padding:"10px",background:C.fond,border:`1.5px solid ${C.encre}`,fontFamily:FM,fontSize:12,outline:"none",resize:"vertical",boxSizing:"border-box",marginBottom:12}}/>
        {importPreview.length>0&&(
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,color:C.gris,letterSpacing:"0.1em",marginBottom:8}}>
              APERÇU — {importPreview.filter(r=>!r.doublon&&r.nom.length>2).length} à importer, {importPreview.filter(r=>r.doublon).length} doublon(s)
            </div>
            <div style={{maxHeight:200,overflowY:"auto",border:`1px solid ${C.ligne}`}}>
              {importPreview.map((r,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",borderBottom:`1px solid ${C.ligne}`,background:r.doublon?"#FFF8E1":"transparent",fontSize:12}}>
                  <span style={{color:r.doublon?C.orange:C.vert,fontSize:14}}>{r.doublon?"⚠":"✓"}</span>
                  <span style={{flex:1}}>{r.nom}</span>
                  <span style={{fontSize:10,color:C.gris}}>{r.poste}</span>
                  {r.doublon&&<span style={{fontSize:9,color:C.orange,fontWeight:700}}>DOUBLON</span>}
                </div>
              ))}
            </div>
          </div>
        )}
        <Btn onClick={confirmerImport} disabled={importPreview.filter(r=>!r.doublon&&r.nom.length>2).length===0}>
          ✓ IMPORTER {importPreview.filter(r=>!r.doublon&&r.nom.length>2).length} SALARIÉ(S)
        </Btn>
      </FormInline>}

      {salaries.length===0
        ? <EmptyState>Aucun salarié. Cliquez sur "+ AJOUTER" ou "↑ IMPORT EN MASSE".</EmptyState>
        : <TableWrap>
            <thead><tr><Th>Nom</Th><Th>Poste</Th><Th>ID</Th><Th r>Pointages</Th><Th></Th></tr></thead>
            <tbody>{salaries.map(s=>{
              const jours=pointages.filter(p=>p.salarie===s.id).length;
              return <tr key={s.id} style={{borderBottom:`1px solid ${C.ligne}`}}>
                <Td><div style={{display:"flex",alignItems:"center",gap:10}}><Avatar nom={s.nom}/><b>{s.nom}</b></div></Td>
                <Td><span style={{fontSize:10,padding:"3px 8px",fontWeight:700,border:`1px solid ${C.encre}`}}>{s.poste}</span></Td>
                <Td><span style={{fontSize:10,padding:"3px 8px",color:C.gris,border:`1px solid ${C.ligne}`}}>{s.id}</span></Td>
                <Td r>{jours}</Td>
                <Td><Btn variant="danger" onClick={()=>supprimer(s.id)}>SUPPRIMER</Btn></Td>
              </tr>;
            })}</tbody>
          </TableWrap>
      }
    </Section>
  );
}

      {interimaires.length===0?<EmptyState>Aucun intérimaire. Ajoutez-les ici ou depuis l'app chef d'équipe.</EmptyState>
        :<TableWrap><thead><tr><Th>Nom</Th><Th>Poste</Th><Th>Agence</Th><Th r>Jours</Th><Th r>Heures</Th><Th></Th></tr></thead>
          <tbody>{interimaires.map(i=>{const ag=AGENCES.find(a=>a.id===i.agence);const s=stats(i.id);return<tr key={i.id} style={{borderBottom:`1px solid ${C.ligne}`}}><Td><div style={{display:"flex",alignItems:"center",gap:10}}><Avatar nom={i.nom} bg={ag?.couleur} light/><b>{i.nom}</b></div></Td><Td>{i.poste}</Td><Td><span style={{fontSize:10,padding:"3px 8px",fontWeight:700,color:"#fff",background:ag?.couleur}}>{ag?.nom}</span></Td><Td r>{s.j}</Td><Td r><b>{fmtH(s.h)}</b></Td><Td><Btn variant="danger" onClick={()=>supprimer(i.id)}>SUPPRIMER</Btn></Td></tr>;})}</tbody>
        </TableWrap>}

// ---- Onglet Paie ----
function OngletPaie({pointages,salaries,interimaires,chantiers}) {
  const [personneId,setPersonneId]=useState("tous");
  const [modeVue,setModeVue]=useState("semaine");
  const tousLesPersonnes=[...salaries.map(s=>({...s,_type:"interne"})),...interimaires.map(i=>({...i,_type:"interim"}))];
  const auj=new Date().toISOString().slice(0,10);
  const plage=(()=>{const d=new Date();if(modeVue==="semaine"){const day=d.getDay()||7;const lundi=new Date(d);lundi.setDate(d.getDate()-day+1);return Array.from({length:5},(_,i)=>{const x=new Date(lundi);x.setDate(lundi.getDate()+i);return x.toISOString().slice(0,10);});}if(modeVue==="mois"){const dates=[];const debut=new Date(d.getFullYear(),d.getMonth(),1);const fin=new Date(d.getFullYear(),d.getMonth()+1,0);for(let dt=new Date(debut);dt<=fin;dt.setDate(dt.getDate()+1))dates.push(new Date(dt).toISOString().slice(0,10));return dates;}return[...new Set(pointages.map(p=>p.date))].sort();})();
  const fmtDate=(iso)=>new Date(iso+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}).toUpperCase();

      {tousLesPersonnes.length===0?<EmptyState>Aucun salarié ni intérimaire enregistré.</EmptyState>

          const parSemaine={};ptgPersonne.forEach(x=>{const{cle}=infoSemaine(x.date);if(!parSemaine[cle])parSemaine[cle]=[];parSemaine[cle].push(x);});
          const totalSup=Object.values(parSemaine).reduce((acc,ptgs)=>acc+calcHSupSemaine(ptgs),0);
          const semCle=semaineCouranteCle();const ptgSemCourante=parSemaine[semCle]||[];const totalSem35=ptgSemCourante.reduce((s,x)=>s+calcHeures(x),0);
          const parDate={};ptgPersonne.forEach(x=>{if(!parDate[x.date])parDate[x.date]=[];parDate[x.date].push(x);});
          return(<div key={p.id} className={`print-break ${p._type==="interim"?"bloc-interim":"bloc-interne"}`} style={{background:C.papier,border:`1.5px solid ${C.encre}`,marginBottom:20,overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",gap:14,padding:"14px 20px",borderBottom:`2px solid ${C.encre}`,background:C.fond,flexWrap:"wrap"}}>

              <div style={{display:"flex",gap:24,flexWrap:"wrap"}}>
                {[["TOTAL PÉRIODE",fmtH(totalH),C.encre],["CETTE SEMAINE",fmtH(totalSem35),C.encre],...(totalSup>0?[["H.SUP","+"+fmtH(totalSup),C.orange]]:[]),...(totalNuit>0?[["H.NUIT",fmtH(totalNuit),"#6C3483"]]:[])].map(([l,v,col])=>(<div key={l} style={{textAlign:"center"}}><div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:3}}>{l}</div><div style={{fontFamily:FT,fontSize:22,fontWeight:800,color:col}}>{v}</div></div>))}

                <tbody>{(()=>{const rows=[];const semainesTriees=Object.entries(parSemaine).sort(([a],[b])=>b.localeCompare(a));semainesTriees.forEach(([semCle,ptgsSem])=>{const datesSem=[...new Set(ptgsSem.map(x=>x.date))].sort((a,b)=>b.localeCompare(a));const totalSemH=ptgsSem.reduce((s,x)=>s+calcHeures(x),0);const supSem=calcHSupSemaine(ptgsSem);datesSem.forEach(date=>{const lignes=ptgsSem.filter(x=>x.date===date);const isWE=[0,6].includes(new Date(date+"T00:00:00").getDay());lignes.forEach((x,idx)=>{const ch=chantiers.find(c=>c.id===x.chantier);const h=calcHeures(x);const hNuit=calcHNuit(x);rows.push(<tr key={x.id} style={{borderBottom:`1px solid ${C.ligne}`,background:isWE?"#FFF8E1":idx%2===0?C.papier:"#F8F6F0"}}>{idx===0?<td rowSpan={lignes.length} style={{padding:"10px 16px",verticalAlign:"top",borderRight:`1px solid ${C.ligne}`,whiteSpace:"nowrap"}}><div style={{fontWeight:700,fontSize:11}}>{fmtDate(date)}</div></td>:null}<td style={{padding:"10px 16px"}}>{ch?<span style={{fontSize:11,padding:"3px 8px",fontWeight:700,background:ch.couleur,color:ch.couleur==="#F5C518"?"#0A0A0A":"#fff"}}>{ch.nom}</span>:<span style={{color:C.gris}}>—</span>}</td><td style={{padding:"10px 16px",fontSize:11,color:C.gris}}>{ch?`📍 ${ch.ville}`:"—"}</td><td style={{padding:"10px 16px",textAlign:"right",fontWeight:500}}>{x.debut}</td><td style={{padding:"10px 16px",textAlign:"right",fontWeight:500}}>{x.fin}</td><td style={{padding:"10px 16px",textAlign:"right",color:C.gris}}>{x.pause}min</td><td style={{padding:"10px 16px",textAlign:"right"}}><b style={{fontFamily:FT,fontSize:15}}>{fmtH(h)}</b></td><td style={{padding:"10px 16px",textAlign:"right"}}>{hNuit>0?<b style={{color:"#6C3483",fontSize:13}}>{fmtH(hNuit)}</b>:<span style={{color:C.ligne}}>—</span>}</td><td style={{padding:"10px 16px",textAlign:"center"}}>{x.valide?<span style={{fontSize:10,color:C.vert,fontWeight:700}}>✓</span>:<span style={{fontSize:10,color:C.orange,fontWeight:700}}>⏳</span>}</td></tr>);});});rows.push(<tr key={`sem-${semCle}`} style={{borderTop:`1.5px solid ${C.encre}`,background:"#F0F4F8"}}><td colSpan={6} style={{padding:"8px 16px",fontSize:10,fontWeight:700,color:C.gris,letterSpacing:"0.1em"}}>{infoSemaine(ptgsSem[0].date).label}</td><td style={{padding:"8px 16px",textAlign:"right"}}><b style={{fontFamily:FT,fontSize:15}}>{fmtH(totalSemH)}</b></td><td style={{padding:"8px 16px",textAlign:"right",fontSize:10,color:C.gris}}>{ptgsSem.reduce((s,x)=>s+calcHNuit(x),0)>0?fmtH(ptgsSem.reduce((s,x)=>s+calcHNuit(x),0)):"—"}</td><td style={{padding:"8px 16px",textAlign:"center"}}>{supSem>0?<span style={{fontSize:11,fontWeight:700,color:C.orange}}>+{fmtH(supSem)} H.SUP</span>:<span style={{fontSize:10,color:C.vert,fontWeight:700}}>{fmtH(totalSemH)}/35h ✓</span>}</td></tr>);});rows.push(<tr key="total" style={{borderTop:`2px solid ${C.encre}`,background:C.fond}}><td colSpan={6} style={{padding:"10px 16px",fontSize:11,fontWeight:700}}>TOTAL PÉRIODE</td><td style={{padding:"10px 16px",textAlign:"right"}}><b style={{fontFamily:FT,fontSize:18,fontWeight:800}}>{fmtH(totalH)}</b></td><td style={{padding:"10px 16px",textAlign:"right"}}>{totalNuit>0?<b style={{fontFamily:FT,fontSize:16,color:"#6C3483"}}>{fmtH(totalNuit)}</b>:<span style={{color:C.ligne}}>—</span>}</td><td style={{padding:"10px 16px",textAlign:"center"}}>{totalSup>0?<b style={{fontFamily:FT,fontSize:16,color:C.orange}}>+{fmtH(totalSup)} H.SUP</b>:<span style={{color:C.ligne}}>—</span>}</td></tr>);return rows;})()}</tbody>

function OngletArchives({pointages,salaries,interimaires,chantiers}) {
  const semCourante=semaineCouranteCle();
  const parSemaine=grouperParSemaine(pointages);
  const semainesPassees=Object.keys(parSemaine).filter(cle=>cle<semCourante).sort((a,b)=>b.localeCompare(a));
  const arbre={};semainesPassees.forEach(cle=>{const info=infoSemaine(parSemaine[cle][0].date);if(!arbre[info.annee])arbre[info.annee]={};const moisKey=`${String(info.moisNum).padStart(2,"0")}-${info.moisLabel}`;if(!arbre[info.annee][moisKey])arbre[info.annee][moisKey]=[];arbre[info.annee][moisKey].push(cle);});
  const [anneeOuverte,setAnneeOuverte]=useState(null);
  const [moisOuvert,setMoisOuvert]=useState(null);

  useEffect(()=>{const annees=Object.keys(arbre).sort((a,b)=>b-a);if(annees.length&&!anneeOuverte)setAnneeOuverte(annees[0]);},[pointages.length]);
  const annees=Object.keys(arbre).sort((a,b)=>b-a);
  const recapSemaine=(cle)=>{const ptgs=parSemaine[cle]||[];const nbInterne=[...new Set(ptgs.filter(p=>!p.interim).map(p=>p.salarie))].length;const nbInterim=[...new Set(ptgs.filter(p=>p.interim).map(p=>p.salarie))].length;const totalH=ptgs.reduce((s,p)=>s+calcHeures(p),0);const totalSup=calcHSupSemaine(ptgs);return{ptgs,nbInterne,nbInterim,totalH,totalSup};};
  const exportSemaine=(cle,cible)=>{setSemSel(cle);setTimeout(()=>{document.body.setAttribute("data-print",cible);window.print();setTimeout(()=>{document.body.removeAttribute("data-print");},500);},100);};
  if(semainesPassees.length===0)return(<Section titre="Archives — Semaines passées"><EmptyState>Aucune semaine archivée pour le moment.</EmptyState></Section>);
  return (
    <Section titre="Archives — Semaines passées">
      <style>{`@media print{header,footer,.no-print{display:none!important}body{background:white!important;background-image:none!important}main{padding:0!important;max-width:100%!important}.print-break{page-break-after:always}@page{margin:15mm;size:A4 landscape}body[data-print="interne"] .bloc-interim{display:none!important}body[data-print="interim"] .bloc-interne{display:none!important}.print-header-arch{display:block!important}}.print-header-arch{display:none}`}</style>
      <div style={{display:"flex",gap:20,alignItems:"flex-start",flexWrap:"wrap"}}>
        <div style={{width:280,flexShrink:0}}>
          {annees.map(annee=>(<div key={annee} style={{marginBottom:8}}>
            <button onClick={()=>{setAnneeOuverte(anneeOuverte===annee?null:annee);setMoisOuvert(null);setSemSel(null);}} style={{width:"100%",padding:"12px 16px",background:anneeOuverte===annee?C.encre:C.papier,border:`1.5px solid ${C.encre}`,color:anneeOuverte===annee?C.jaune:C.encre,fontFamily:FM,fontSize:13,fontWeight:700,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between"}}>
              <span>📅 {annee}</span><span>{anneeOuverte===annee?"▲":"▼"}</span>
            </button>
            {anneeOuverte===annee&&(<div style={{borderLeft:`3px solid ${C.jaune}`,marginLeft:12,paddingLeft:8}}>
              {Object.keys(arbre[annee]).sort((a,b)=>b.localeCompare(a)).map(moisKey=>{const moisLabel=moisKey.split("-").slice(1).join("-");const semsDuMois=arbre[annee][moisKey];const ouvert=moisOuvert===moisKey;return(<div key={moisKey} style={{marginTop:4}}>
                <button onClick={()=>{setMoisOuvert(ouvert?null:moisKey);setSemSel(null);}} style={{width:"100%",padding:"9px 14px",background:ouvert?"#F0F4F8":C.fond,border:`1px solid ${C.ligne}`,fontFamily:FM,fontSize:11,fontWeight:700,cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{textTransform:"capitalize"}}>{moisLabel}</span><span style={{fontSize:10,color:C.gris}}>{semsDuMois.length} sem. {ouvert?"▲":"▼"}</span>
                </button>

              </div>);})}
            </div>)}
          </div>))}
        </div>
        <div style={{flex:1,minWidth:0}}>
          {!semSel?<div style={{padding:"48px 24px",textAlign:"center",background:C.papier,border:`1.5px dashed ${C.ligne}`,color:C.gris,fontSize:13}}>← Sélectionnez une semaine dans le panneau gauche.</div>

        </div>
      </div>
    </Section>
  );
}

function VueSalarie({session,pointages,chantiers,salaries,interimaires}) {
  const personne=salaries.find(s=>s.id===session.personneId)||interimaires.find(i=>i.id===session.personneId);
  const ag=personne&&interimaires.find(i=>i.id===personne.id)?AGENCES.find(a=>a.id===personne.agence):null;
  const mesPtg=pointages.filter(p=>p.salarie===session.personneId).sort((a,b)=>b.date.localeCompare(a.date));
  const totalTout=mesPtg.reduce((s,p)=>s+calcHeures(p),0);
  const auj=new Date().toISOString().slice(0,10);
  const semaine=(()=>{const d=new Date(),day=d.getDay()||7;const lundi=new Date(d);lundi.setDate(d.getDate()-day+1);return Array.from({length:5},(_,i)=>{const x=new Date(lundi);x.setDate(lundi.getDate()+i);return x.toISOString().slice(0,10);});})();
  const totalSem=mesPtg.filter(p=>semaine.includes(p.date)).reduce((s,p)=>s+calcHeures(p),0);
  const hSup=Math.max(0,totalSem-35);
  const fmtDate=(iso)=>new Date(iso+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"}).toUpperCase();
  if(!personne)return<div style={{padding:48,textAlign:"center",color:C.gris}}>Profil introuvable.</div>;
  return(
    <main style={{padding:"28px 32px",maxWidth:900,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",gap:20,padding:"24px",background:C.papier,border:`2px solid ${C.encre}`,marginBottom:24}}>
        <div style={{width:64,height:64,background:ag?ag.couleur:C.encre,color:ag?"#fff":C.jaune,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FT,fontWeight:800,fontSize:22,flexShrink:0}}>{initiales(personne.nom)}</div>
        <div style={{flex:1}}><div style={{fontFamily:FT,fontSize:28,fontWeight:800}}>{personne.nom}</div><div style={{fontSize:12,color:C.gris,marginTop:4}}>{personne.poste}</div></div>
        <div style={{display:"flex",gap:24}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4}}>CETTE SEMAINE</div><div style={{fontFamily:FT,fontSize:28,fontWeight:800}}>{fmtH(totalSem)}</div></div>
          {hSup>0&&<div style={{textAlign:"center"}}><div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4}}>H.SUP</div><div style={{fontFamily:FT,fontSize:28,fontWeight:800,color:C.orange}}>+{fmtH(hSup)}</div></div>}
          <div style={{textAlign:"center"}}><div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4}}>TOTAL</div><div style={{fontFamily:FT,fontSize:28,fontWeight:800}}>{fmtH(totalTout)}</div></div>
        </div>
      </div>
      {mesPtg.length===0?<div style={{padding:"48px",textAlign:"center",background:C.papier,border:`1.5px dashed ${C.ligne}`,fontSize:14,color:C.gris}}>Aucun rapport d'heures enregistré.</div>
        :<div style={{background:C.papier,border:`1.5px solid ${C.encre}`,overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead><tr style={{background:C.fond}}>{["Date","Chantier","Lieu","Début","Fin","Pause","Total","État"].map((h,i)=>(<th key={h} style={{padding:"11px 16px",textAlign:i>2?"right":"left",fontSize:9,letterSpacing:"0.15em",color:C.gris,fontWeight:500,borderBottom:`1px solid ${C.ligne}`,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>))}</tr></thead>
            <tbody>{mesPtg.map((p,idx)=>{const ch=chantiers.find(c=>c.id===p.chantier);const h=calcHeures(p);const estAujourd=p.date===auj;return(<tr key={p.id} style={{borderBottom:`1px solid ${C.ligne}`,background:estAujourd?"#FFFDE7":idx%2===0?C.papier:"#F8F6F0"}}><td style={{padding:"12px 16px",whiteSpace:"nowrap"}}><div style={{fontWeight:estAujourd?700:500,fontSize:12}}>{fmtDate(p.date)}</div>{estAujourd&&<div style={{fontSize:10,color:C.vert,fontWeight:700,marginTop:2}}>AUJOURD'HUI</div>}</td><td style={{padding:"12px 16px"}}>{ch?<span style={{fontSize:11,padding:"3px 8px",fontWeight:700,background:ch.couleur,color:ch.couleur==="#F5C518"?"#0A0A0A":"#fff"}}>{ch.nom}</span>:<span style={{color:C.gris}}>—</span>}</td><td style={{padding:"12px 16px",fontSize:11,color:C.gris}}>{ch?`📍 ${ch.ville}`:"—"}</td><td style={{padding:"12px 16px",textAlign:"right",fontWeight:500}}>{p.debut}</td><td style={{padding:"12px 16px",textAlign:"right",fontWeight:500}}>{p.fin}</td><td style={{padding:"12px 16px",textAlign:"right",color:C.gris}}>{p.pause}min</td><td style={{padding:"12px 16px",textAlign:"right"}}><b style={{fontFamily:FT,fontSize:16}}>{fmtH(h)}</b></td><td style={{padding:"12px 16px",textAlign:"right"}}>{p.valide?<span style={{fontSize:10,color:C.vert,fontWeight:700}}>✓ VALIDÉ</span>:<span style={{fontSize:10,color:C.orange,fontWeight:700}}>⏳ ATTENTE</span>}</td></tr>);})}
            </tbody>
            <tfoot><tr style={{borderTop:`2px solid ${C.encre}`,background:C.fond}}><td colSpan={6} style={{padding:"12px 16px",fontWeight:700,fontSize:11}}>TOTAL</td><td style={{padding:"12px 16px",textAlign:"right"}}><b style={{fontFamily:FT,fontSize:20,fontWeight:800}}>{fmtH(totalTout)}</b></td><td></td></tr></tfoot>
          </table>
        </div>}
      <div style={{marginTop:16,padding:"12px 16px",background:"#FFF8E1",border:`1px solid ${C.ligne}`,fontSize:11,color:C.gris}}>🔒 Vous consultez uniquement vos propres heures. Pour toute modification, contactez la RH.</div>
    </main>
  );
}

  const [newPinChef,setNewPinChef]=useState("");

  const [sbKey,setSbKey]=useState(localStorage.getItem("chok_sb_key")||"");
  const [msgPin,setMsgPin]=useState("");
  const [msgSb,setMsgSb]=useState("");

  const sauverPins=()=>{
    if(newPinRH.length>=4)setPinRH(newPinRH);
    if(newPinChef.length>=4)setPinChef(newPinChef);
    setMsgPin("✓ Codes mis à jour.");setNewPinRH("");setNewPinChef("");

create table absences (id text primary key, salarie text, "dateDebut" text, "dateFin" text, type text, "typeLabel" text, "typeIcone" text, commentaire text, "saisieParRH" boolean, "saisieDate" text);

alter table salaries disable row level security;
alter table interimaires disable row level security;
alter table chantiers disable row level security;
alter table pointages disable row level security;

            </Champ>

function MAccueil({chantiers,salaries,interimaires,optionsDates,dateRapport,setDate,onNouveau,onSuite}) {
  const [chSel,setChSel]   = useState(null);
  const [chefId,setChefId] = useState("");
  const [proposerReprise,setProposerReprise] = useState(false);
  const [dernierRapport,setDernierRapport]   = useState(null);

  const actifs = chantiers.filter(c=>c.actif);
  const tousChefs = [...salaries.map(s=>({...s,_type:"interne"})),...interimaires.map(i=>({...i,_type:"interim"}))];

  // Mémoire par chef
  const onChefChange = (id) => {
    setChefId(id);
    setProposerReprise(false);
    setDernierRapport(null);
    const last = load(`chok_last_${id}`, null);
    if (last && last.ts && (Date.now()-last.ts < 30*24*60*60*1000)) {
      setDernierRapport(last);
      const ch = chantiers.find(c=>c.id===last.chantierId && c.actif);
      if (ch) { setChSel(ch); setProposerReprise(true); }
    }
  };

  const ok = chSel && chefId;
  const trouverChef = (id) => tousChefs.find(p=>p.id===id);

  return (
    <>
      <div style={{overflowY:"auto",flex:1,padding:"0 20px 8px"}}>

        {/* Chef d'équipe EN PREMIER */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,color:C.gris,letterSpacing:"0.2em",marginBottom:8,fontWeight:700}}>CHEF D'ÉQUIPE</div>
          {tousChefs.length===0
            ? <div style={{padding:"10px 12px",background:"#FFF8E1",border:`1px solid ${C.ligne}`,fontSize:11}}>Aucun salarié. Ajoutez-en depuis l'onglet Admin.</div>
            : <select value={chefId} onChange={e=>onChefChange(e.target.value)} style={{...mInputStyle,width:"100%"}}>
                <option value="" disabled>— Qui êtes-vous ? —</option>
                {salaries.length>0&&<optgroup label="── Salariés CHOK BÉTON">{salaries.map(s=><option key={s.id} value={s.id}>{s.nom}</option>)}</optgroup>}
                {interimaires.length>0&&<optgroup label="── Intérimaires">{interimaires.map(i=>{const ag=AGENCES.find(a=>a.id===i.agence);return<option key={i.id} value={i.id}>{i.nom} · {ag?.nom}</option>;})}</optgroup>}
              </select>
          }
        </div>

        {/* Date du rapport */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,color:C.gris,letterSpacing:"0.2em",marginBottom:8,fontWeight:700}}>DATE DU RAPPORT</div>
          <div style={{display:"flex",gap:6}}>
            {optionsDates.map(opt=>(
              <button key={opt.iso} onClick={()=>setDate(opt.iso)} style={{flex:1,padding:"9px 6px",background:dateRapport===opt.iso?C.encre:C.fond,border:`1.5px solid ${dateRapport===opt.iso?C.encre:C.ligne}`,color:dateRapport===opt.iso?C.jaune:C.encre,fontFamily:FM,fontSize:10,fontWeight:700,cursor:"pointer",textAlign:"center",letterSpacing:"0.05em"}}>
                <div>{opt.label}</div>
                <div style={{fontSize:9,fontWeight:400,marginTop:3,color:dateRapport===opt.iso?C.jaune:C.gris}}>{opt.fr}</div>
              </button>
            ))}
          </div>
        </div>

        {/* Proposition de reprise */}
        {proposerReprise && dernierRapport && (
          <div style={{marginBottom:14,padding:"10px 12px",background:"#FFFDE7",border:`1.5px solid ${C.jaune}`}}>
            <div style={{fontSize:10,color:C.gris,letterSpacing:"0.1em",fontWeight:700,marginBottom:6}}>💡 DERNIER RAPPORT</div>
            <div style={{fontSize:12}}>Chantier : <b>{chantiers.find(c=>c.id===dernierRapport.chantierId)?.nom||"—"}</b></div>
            <div style={{fontSize:11,color:C.gris,marginTop:2}}>{dernierRapport.equipeIds?.length||0} personne(s) · {dernierRapport.date||""}</div>
            <button onClick={()=>setProposerReprise(false)} style={{marginTop:8,fontSize:10,background:"transparent",border:"none",color:C.gris,cursor:"pointer",textDecoration:"underline",padding:0}}>Ignorer</button>
          </div>
        )}

        {/* Chantier du jour */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,color:C.gris,letterSpacing:"0.2em",marginBottom:8,fontWeight:700}}>CHANTIER DU JOUR</div>
          {actifs.length===0
            ? <div style={{padding:"10px 12px",background:"#FFF8E1",border:`1px solid ${C.ligne}`,fontSize:11,lineHeight:1.5}}>Aucun chantier actif. Créez-en un ci-dessous ou dans l'onglet Admin.</div>
            : <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {actifs.map(c=>(
                  <button key={c.id} onClick={()=>setChSel(c)} style={{background:chSel?.id===c.id?C.papier:C.fond,border:`1.5px solid ${chSel?.id===c.id?C.encre:C.ligne}`,borderLeft:`5px solid ${c.couleur}`,padding:"10px 12px",cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center",fontFamily:FM}}>
                    <div><div style={{fontSize:12,fontWeight:700}}>{c.nom}</div><div style={{fontSize:10,color:C.gris,marginTop:2}}>{c.ville}</div></div>
                    {chSel?.id===c.id&&<span style={{color:C.vert,fontWeight:700}}>✓</span>}
                  </button>
                ))}
              </div>
          }
        </div>
      </div>

      <div style={{flexShrink:0,padding:"0 20px 4px"}}>
        <button onClick={onNouveau} style={{width:"100%",padding:"14px",background:"transparent",border:`2px solid ${C.encre}`,fontFamily:FM,fontSize:12,fontWeight:700,color:C.encre,cursor:"pointer",marginBottom:8,letterSpacing:"0.05em"}}>+ NOUVEAU CHANTIER</button>
        <button disabled={!ok} onClick={()=>ok&&onSuite(chSel,trouverChef(chefId))} style={{width:"100%",padding:"16px",background:ok?C.encre:C.ligne,border:"none",color:ok?C.jaune:C.gris,fontFamily:FM,fontSize:13,fontWeight:700,cursor:ok?"pointer":"not-allowed",letterSpacing:"0.1em",marginBottom:8}}>→ COMPOSER L'ÉQUIPE</button>
      </div>
    </>
  );
}

// ---- Équipe ----
function MEquipe({chantier,chef,salaries,interimaires,equipe,setEquipe,onRetour,onSuite,onAjoutInt}) {
  useEffect(()=>{if(chef&&!equipe.find(m=>m.id===chef.id))setEquipe([{id:chef.id,type:"interne",debut:"08:00",fin:"16:00",pause:60}]);},[chef]);
  const add=(id,type)=>{if(!equipe.find(m=>m.id===id))setEquipe([...equipe,{id,type,debut:"08:00",fin:"16:00",pause:60}]);};
  const del=(id)=>{if(id!==chef?.id)setEquipe(equipe.filter(m=>m.id!==id));};
  const getNom=(id)=>{const s=salaries.find(x=>x.id===id);if(s)return s.nom;const i=interimaires.find(x=>x.id===id);return i?i.nom:id;};
  const getAg=(id)=>{const i=interimaires.find(x=>x.id===id);return i?AGENCES.find(a=>a.id===i.agence):null;};
  const autreSal=salaries.filter(s=>s.id!==chef?.id&&!equipe.find(m=>m.id===s.id));
  const autreInt=interimaires.filter(i=>!equipe.find(m=>m.id===i.id));
  return(
    <MFormWrap titre="ÉQUIPE DU JOUR" onRetour={onRetour}>
      <ChantierBandeau chantier={chantier}/>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {equipe.map(m=>{const ag=m.type==="interim"?getAg(m.id):null;return(
          <div key={m.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 10px",background:C.fond,border:`1.5px solid ${C.ligne}`}}>
            <div style={{width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:11,flexShrink:0,background:m.id===chef?.id?"#0A0A0A":ag?.couleur||"#3D5A80",color:"#fff"}}>{initiales(getNom(m.id))}</div>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{getNom(m.id)}</div><div style={{fontSize:10,color:C.gris,marginTop:1}}>{m.id===chef?.id?"Chef d'équipe · TOI":m.type==="interim"?`INTÉRIM · ${ag?.nom||""}`:"Salarié interne"}</div></div>
            {m.id!==chef?.id&&<button onClick={()=>del(m.id)} style={{background:"transparent",border:`1px solid ${C.gris}`,color:C.gris,width:26,height:26,cursor:"pointer",fontSize:16,lineHeight:1,flexShrink:0}}>×</button>}
          </div>
        );})}
        {autreSal.length>0&&<select defaultValue="" onChange={e=>{if(e.target.value){add(e.target.value,"interne");e.target.value=""}}} style={{...mInputStyle,marginTop:4}}><option value="" disabled>+ Ajouter un salarié CHOK BÉTON</option>{autreSal.map(s=><option key={s.id} value={s.id}>{s.nom}</option>)}</select>}
        {autreInt.length>0&&<select defaultValue="" onChange={e=>{if(e.target.value){add(e.target.value,"interim");e.target.value=""}}} style={mInputStyle}><option value="" disabled>+ Ajouter un intérimaire</option>{autreInt.map(i=>{const ag=AGENCES.find(a=>a.id===i.agence);return<option key={i.id} value={i.id}>{i.nom} · {ag?.nom}</option>;})}</select>}
        <button onClick={onAjoutInt} style={{padding:"11px",background:"transparent",border:`1.5px dashed ${C.encre}`,fontFamily:FM,fontSize:11,fontWeight:700,color:C.encre,cursor:"pointer"}}>+ NOUVEL INTÉRIMAIRE (pas encore fiché)</button>
      </div>
      <MBtn disabled={equipe.length===0} onClick={()=>equipe.length>0&&onSuite()}>→ SAISIR LES HORAIRES</MBtn>
    </MFormWrap>
  );
}

// ---- Nouvel intérimaire ----
function MNouvelInt({onAnnuler,onCreer}) {
  const [nom,setNom]=useState("");const [poste,setPoste]=useState("Manœuvre");const [agence,setAgence]=useState(AGENCES[0].id);const ok=nom.trim().length>2;

    <MChamp label="AGENCE"><select value={agence} onChange={e=>setAgence(e.target.value)} style={mInputStyle}>{AGENCES.map(a=><option key={a.id} value={a.id}>{a.nom}</option>)}</select></MChamp>
    <div style={{padding:"10px 12px",background:"#FFF8E1",border:`1px solid ${C.ligne}`,fontSize:11,lineHeight:1.5}}>💡 Il sera ajouté à la base RH pour les prochaines fois.</div>

}

// ---- Pointage ----
function MPointage({chantier,chef,equipe,setEquipe,salaries,interimaires,dateRapport,onRetour,onValider}) {
  const getNom=(id)=>{const s=salaries.find(x=>x.id===id);if(s)return s.nom;const i=interimaires.find(x=>x.id===id);return i?i.nom:id;};
  const getAg=(id)=>{const i=interimaires.find(x=>x.id===id);return i?AGENCES.find(a=>a.id===i.agence):null;};
  const upd=(id,k,v)=>setEquipe(equipe.map(m=>m.id===id?{...m,[k]:k==="pause"?parseInt(v)||0:v}:m));
  const [validationsInt,setValidationsInt]=useState({});
  const interimDansEquipe=equipe.filter(m=>m.type==="interim");
  const tousInterimValides=interimDansEquipe.every(m=>validationsInt[m.id]);
  const peutEnvoyer=tousInterimValides||interimDansEquipe.length===0;
  const toggleValidInt=(id)=>setValidationsInt(prev=>({...prev,[id]:!prev[id]}));
  const dateFrCourt=(iso)=>new Date(iso+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
  return(
    <MFormWrap titre="HORAIRES PAR PERSONNE" onRetour={onRetour}>
      <ChantierBandeau chantier={chantier}/>
      <div style={{padding:"6px 0",fontSize:11,color:C.gris,fontWeight:700,letterSpacing:"0.05em",borderBottom:`1px solid ${C.ligne}`,marginBottom:4}}>📅 {dateFrCourt(dateRapport).toUpperCase()}</div>
      <div style={{overflowY:"auto",flex:1,padding:"4px 0 8px"}}>
        {equipe.map(m=>{const isChef=m.id===chef?.id;const isInt=m.type==="interim";const ag=isInt?getAg(m.id):null;const total=calcHeures(m);const valide=validationsInt[m.id];
        return(
          <div key={m.id} style={{marginBottom:12,padding:"12px",background:C.fond,border:`1.5px solid ${isInt&&valide?C.vert:C.ligne}`}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <div style={{width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:11,flexShrink:0,background:isChef?"#0A0A0A":ag?.couleur||"#3D5A80",color:"#fff"}}>{initiales(getNom(m.id))}</div>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{getNom(m.id)}</div><div style={{fontSize:10,color:C.gris}}>{isChef?"CHEF D'ÉQUIPE":isInt?`INTÉRIM · ${ag?.nom}`:"SALARIÉ CHOK BÉTON"}</div></div>
              <div style={{fontFamily:FT,fontSize:16,fontWeight:800,background:C.encre,color:C.jaune,padding:"3px 10px"}}>{fmtH(total)}</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
              {[["DÉBUT","time","debut"],["FIN","time","fin"],["PAUSE (min)","number","pause"]].map(([l,t,k])=>(
                <div key={k}><div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4,fontWeight:700}}>{l}</div><input type={t} value={m[k]} onChange={e=>upd(m.id,k,e.target.value)} style={{width:"100%",padding:"10px 8px",background:C.papier,border:`1.5px solid ${C.ligne}`,fontFamily:FM,fontSize:13,outline:"none",textAlign:"center",fontWeight:700,boxSizing:"border-box"}}/></div>
              ))}
            </div>
            <div style={{marginBottom:isInt?8:0}}>
              <div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4,fontWeight:700}}>COMMENTAIRE (OPTIONNEL)</div>
              <textarea value={m.commentaire||""} onChange={e=>upd(m.id,"commentaire",e.target.value)} placeholder="Remarque, incident..." rows={2} style={{width:"100%",padding:"8px 10px",background:C.papier,border:`1.5px solid ${C.ligne}`,fontFamily:FM,fontSize:11,outline:"none",resize:"vertical",boxSizing:"border-box"}}/>
            </div>
            {isInt&&(<div onClick={()=>toggleValidInt(m.id)} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px",background:valide?"#E8F5E9":"#FFF8E1",border:`1.5px solid ${valide?C.vert:C.orange}`,cursor:"pointer",marginTop:4}}>
              <div style={{width:22,height:22,border:`2px solid ${valide?C.vert:C.orange}`,background:valide?C.vert:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>{valide&&<span style={{color:"#fff",fontSize:14,fontWeight:700,lineHeight:1}}>✓</span>}</div>
              <div style={{fontSize:11,lineHeight:1.5}}><b style={{display:"block",marginBottom:3,fontSize:12}}>{valide?"✓ HEURES ACCEPTÉES":"Je certifie exact le relevé ci-dessus"}</b>{!valide&&<span style={{color:C.gris}}>{getNom(m.id)} · {chantier?.nom} · {m.debut}–{m.fin} = <b>{fmtH(total)}</b><br/>En cochant, j'autorise la transmission à <b>{ag?.nom}</b>.</span>}{valide&&<span style={{color:C.vert,fontSize:10}}>Validé · {fmtH(total)} · {ag?.nom}</span>}</div>
            </div>)}
          </div>
        );})}
      </div>
      {!peutEnvoyer&&<div style={{margin:"0 0 8px",padding:"10px 14px",background:"#FFF0F0",border:`1px solid ${C.orange}`,fontSize:11,color:C.orange,fontWeight:700}}>⚠ En attente : {interimDansEquipe.filter(m=>!validationsInt[m.id]).map(m=>getNom(m.id)).join(", ")}</div>}
      <MBtn disabled={!peutEnvoyer} onClick={()=>peutEnvoyer&&onValider(validationsInt)}>✓ ENVOYER LE RAPPORT</MBtn>
    </MFormWrap>
  );
}

function Clock() {
  const [h,setH]=useState(heureFr());
  useEffect(()=>{const t=setInterval(()=>setH(heureFr()),30000);return()=>clearInterval(t);},[]);
  return <span>{h}</span>;
}

function Btn({children,onClick,variant,disabled,style}) {
  const base={fontFamily:FM,cursor:disabled?"not-allowed":"pointer",letterSpacing:"0.05em",fontWeight:700,border:"none"};
  const variants={
    default:{...base,fontSize:12,padding:"9px 16px",background:C.jaune,border:`1.5px solid ${C.encre}`,color:C.encre},
    ghost:{...base,fontSize:12,padding:"9px 14px",background:"transparent",border:`1.5px solid ${C.encre}`,color:C.encre},
    export:{...base,fontSize:12,padding:"10px 18px",background:C.encre,border:`1.5px solid ${C.encre}`,color:C.jaune},
    danger:{...base,fontSize:10,padding:"6px 12px",background:"transparent",border:`1.5px solid ${C.orange}`,color:C.orange},
    mini:{...base,fontSize:10,padding:"5px 10px",background:C.encre,color:C.jaune},
    "danger-mini":{...base,fontSize:10,padding:"5px 8px",background:"transparent",border:`1px solid ${C.orange}`,color:C.orange},
  };
  const v=variants[variant||"default"];
  return<button onClick={disabled?undefined:onClick} style={{...v,opacity:disabled?0.4:1,...(style||{})}}>{children}</button>;
}

function MBtn({children,onClick,variant,disabled}) {
  const base={margin:"6px 0 4px",padding:"16px",border:"none",fontFamily:FM,fontSize:13,fontWeight:700,letterSpacing:"0.1em",cursor:disabled?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,width:"100%"};
  if(disabled)return<button style={{...base,background:C.ligne,color:C.gris}} disabled>{children}</button>;
  if(variant==="alt")return<button onClick={onClick} style={{...base,background:"transparent",color:C.encre,border:`2px solid ${C.encre}`}}>{children}</button>;
  return<button onClick={onClick} style={{...base,background:C.encre,color:C.jaune}}>{children}</button>;
}

  return(
