const calcHeures = (p) => {
  const [h1,m1] = p.debut.split(":").map(Number);
  const [h2,m2] = p.fin.split(":").map(Number);
  const min = (h2*60+m2)-(h1*60+m1)-(p.pause||0);
  return Math.max(0, Math.round((min/60)*100)/100);
};

// Heures sup : calculées au niveau de la semaine (>35h), pas à la journée.
// Cette fonction retourne les heures effectives du pointage,
// le calcul du dépassement 35h se fait dans OngletPaie au niveau de la personne.
const calcHSup = (p) => 0; // placeholder — voir calcHSupSemaine

// Calcul des heures sup sur une liste de pointages d'une même semaine
const calcHSupSemaine = (ptgs) => {
  const totalEffectif = ptgs.reduce((s,p)=>s+calcHeures(p),0);
  return Math.max(0, Math.round((totalEffectif-35)*100)/100);
};

// Heures de nuit : minutes travaillées après 20h00
const calcHNuit = (p) => {
  const [h2,m2] = p.fin.split(":").map(Number);
  const finMin = h2*60+m2;
  const seuilNuit = 20*60; // 20h00
  if(finMin <= seuilNuit) return 0;
  const minNuit = finMin - seuilNuit;
  // On ne dépasse pas les heures effectives travaillées
  return Math.min(Math.round((minNuit/60)*100)/100, calcHeures(p));
};

// ============================================================
//  PERSISTANCE localStorage — conservation intégrale
// ============================================================
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}
function usePersist(key, init) {
  const [val, setVal] = useState(() => load(key, init));
  const setter = (v) => {
    const next = typeof v === "function" ? v(val) : v;
    setVal(next);
    save(key, next);
  };
  return [val, setter];
}

// ============================================================
//  UTILITAIRES SEMAINE ISO
// ============================================================
// Retourne { annee, semaine, cle } pour une date ISO
function infoSemaine(iso) {
  const d = new Date(iso + "T00:00:00");
  const j = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = j.getUTCDay() || 7;
  j.setUTCDate(j.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(j.getUTCFullYear(), 0, 1));
  const numSem = Math.ceil((((j - yearStart) / 86400000) + 1) / 7);
  const annee = j.getUTCFullYear();
  const sem = String(numSem).padStart(2, "0");
  // Lundi de la semaine
  const lundiD = new Date(iso + "T00:00:00");
  lundiD.setDate(lundiD.getDate() - (lundiD.getDay() || 7) + 1);
  const vendrediD = new Date(lundiD); vendrediD.setDate(lundiD.getDate() + 4);
  const fmt = (x) => x.toLocaleDateString("fr-FR", {day:"numeric", month:"short"});
  return {
    annee,
    semaine: numSem,
    cle: `${annee}-S${sem}`,
    label: `S${sem} — ${fmt(lundiD)} au ${fmt(vendrediD)} ${annee}`,
    labelCourt: `S${sem}`,
    moisNum: lundiD.getMonth() + 1,
    moisLabel: lundiD.toLocaleDateString("fr-FR", {month:"long", year:"numeric"}),
    lundi: lundiD.toISOString().slice(0,10),
    vendredi: vendrediD.toISOString().slice(0,10),
  };
}

// Semaine courante
function semaineCouranteCle() {
  return infoSemaine(new Date().toISOString().slice(0,10)).cle;
}

// Grouper des pointages par semaine → { "2026-S18": [...], ... }
function grouperParSemaine(pointages) {
  const map = {};
  pointages.forEach(p => {
    const { cle } = infoSemaine(p.date);
    if (!map[cle]) map[cle] = [];
    map[cle].push(p);
  });
  return map;
}

// ============================================================
//  CLAVIER PIN
// ============================================================
function PinPad({pin, setPin, onValider, erreur, setErreur}) {
  const ajouter = (c) => {
    if (pin.length >= 6) return;
    setErreur("");
    const nouveau = pin + c;
    setPin(nouveau);
  };
  const effacer = () => { setPin(pin.slice(0,-1)); setErreur(""); };

  return (
    <div>
      {/* Affichage du PIN masqué */}
      <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:20}}>
        {[0,1,2,3,4,5].map(i=>(
          <div key={i} style={{width:40,height:40,border:`2px solid ${pin.length>i?C.encre:C.ligne}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:700,background:pin.length>i?C.encre:C.papier,color:C.jaune}}>
            {pin.length>i?"●":""}
          </div>
        ))}
      </div>

      {erreur && <div style={{padding:"8px 12px",background:"#FFF0F0",border:`1px solid ${C.orange}`,color:C.orange,fontSize:12,marginBottom:12,textAlign:"center"}}>{erreur}</div>}

      {/* Touches */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>
        {["1","2","3","4","5","6","7","8","9"].map(c=>(
          <button key={c} onClick={()=>ajouter(c)} style={{padding:"18px",fontFamily:FT,fontSize:22,fontWeight:700,background:C.papier,border:`1.5px solid ${C.ligne}`,cursor:"pointer"}}>
            {c}
          </button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
        <button onClick={effacer} style={{padding:"18px",fontFamily:FM,fontSize:12,fontWeight:700,background:"transparent",border:`1.5px solid ${C.ligne}`,cursor:"pointer",color:C.gris}}>⌫</button>
        <button onClick={()=>ajouter("0")} style={{padding:"18px",fontFamily:FT,fontSize:22,fontWeight:700,background:C.papier,border:`1.5px solid ${C.ligne}`,cursor:"pointer"}}>0</button>
        <button onClick={onValider} style={{padding:"18px",fontFamily:FM,fontSize:12,fontWeight:700,background:C.encre,border:"none",color:C.jaune,cursor:"pointer"}}>OK ✓</button>
      </div>
    </div>
  );
}

function VueAdmin({pointages,setPointages,chantiers,setChantiers,salaries,setSalaries,interimaires,setInterimaires,absences,setAbsences}) {
  const [onglet, setOnglet] = useState("pointages");
  const auj = pointages.filter(p=>p.date===TODAY);
  const totalH = auj.reduce((s,p)=>s+calcHeures(p),0);
  const aValider = auj.filter(p=>!p.valide).length;

  // Compteurs intérimaires
  const intJour = [...new Set(auj.filter(p=>p.interim).map(p=>p.salarie))].length;

  const semaineCourante = (() => {
    const d=new Date(), day=d.getDay()||7;
    const lundi=new Date(d); lundi.setDate(d.getDate()-day+1);
    return Array.from({length:7},(_,i)=>{const x=new Date(lundi);x.setDate(lundi.getDate()+i);return x.toISOString().slice(0,10);});
  })();
  const ptgSemaine = pointages.filter(p=>semaineCourante.includes(p.date));
  const intSemaine = [...new Set(ptgSemaine.filter(p=>p.interim).map(p=>p.salarie))].length;

  const trouver = (id) => salaries.find(s=>s.id===id) || interimaires.find(i=>i.id===id);
  const valider = (id) => setPointages(pointages.map(p=>p.id===id?{...p,valide:true}:p));
  const validerTout = () => setPointages(pointages.map(p=>p.date===TODAY?{...p,valide:true}:p));
  const supprPointage = (id) => setPointages(pointages.filter(p=>p.id!==id));

  const tabs = [["pointages","Pointages"],["absences","Absences / Congés"],["salaries","Salariés"],["interim","Intérimaires"],["chantiers","Chantiers"],["paie","Rapport"],["archives","Archives 📁"]];

  return (
    <main style={{padding:"28px 32px",maxWidth:1500,margin:"0 auto"}}>
      {/* Bandeau date */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",paddingBottom:20,borderBottom:`1px solid ${C.ligne}`,marginBottom:24}}>
        <div>
          <div style={{fontSize:11,color:C.gris,letterSpacing:"0.2em",marginBottom:6}}>JOURNÉE EN COURS</div>
          <div style={{fontFamily:FT,fontSize:32,fontWeight:800,letterSpacing:"-0.02em"}}>{dateFr()}</div>
        </div>
        <Btn variant="export" onClick={()=>alert("Export Silae — à connecter en production")}>↓ EXPORT SILAE</Btn>
      </div>

      {/* KPI */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:14,marginBottom:28}}>
        <Kpi label="Pointages du jour" val={auj.length} sub="entrées aujourd'hui" accent={C.jaune}/>
        <Kpi label="Heures totales" val={fmtH(totalH)} sub={`${chantiers.filter(c=>c.actif).length} chantier(s) actif(s)`} accent="#3D5A80"/>
        <Kpi label="Salariés" val={salaries.length} sub="CHOK BÉTON enregistrés" accent={C.vert}/>
        <Kpi label="Intérimaires / jour" val={intJour} sub={`personnes différentes aujourd'hui`} accent={C.bleu}/>
        <Kpi label="Intérimaires / semaine" val={intSemaine} sub={`personnes différentes cette semaine`} accent="#6C3483"/>
        <Kpi label="À valider" val={aValider} sub="pointages en attente RH" accent={C.encre} alert={aValider>0}/>
      </div>

      {/* Onglets */}
      <div style={{display:"flex",borderBottom:`2px solid ${C.encre}`,marginBottom:24,flexWrap:"wrap"}}>
        {tabs.map(([k,l])=>(
          <button key={k} onClick={()=>setOnglet(k)} style={{fontFamily:FM,fontSize:12,fontWeight:onglet===k?700:500,padding:"12px 20px",background:"transparent",border:"none",cursor:"pointer",letterSpacing:"0.1em",color:onglet===k?C.encre:C.gris,borderBottom:onglet===k?`3px solid ${C.jaune}`:"3px solid transparent",marginBottom:-2}}>
            {l.toUpperCase()}
          </button>
        ))}
      </div>

      {onglet==="pointages" && <OngletPointages auj={auj} pointagesTous={pointages} setPointages={setPointages} chantiers={chantiers} salaries={salaries} interimaires={interimaires} trouver={trouver} aValider={aValider} valider={valider} validerTout={validerTout} supprPointage={supprPointage}/>}
      {onglet==="absences" && <OngletAbsences absences={absences} setAbsences={setAbsences} salaries={salaries} interimaires={interimaires} pointages={pointages}/>}
      {onglet==="salaries" && <OngletSalaries salaries={salaries} setSalaries={setSalaries} pointages={pointages}/>}
      {onglet==="interim" && <OngletInterim interimaires={interimaires} setInterimaires={setInterimaires} pointages={pointages} chantiers={chantiers}/>}
      {onglet==="chantiers" && <OngletChantiers chantiers={chantiers} setChantiers={setChantiers} pointages={pointages}/>}
      {onglet==="paie" && <OngletPaie pointages={pointages} absences={absences} salaries={salaries} interimaires={interimaires} chantiers={chantiers}/>}
      {onglet==="archives" && <OngletArchives pointages={pointages} absences={absences} salaries={salaries} interimaires={interimaires} chantiers={chantiers}/>}
    </main>
  );
}

// ---- Onglet Pointages ----
function OngletPointages({auj, pointagesTous, setPointages, chantiers, salaries, interimaires, trouver, aValider, valider, validerTout, supprPointage}) {
  const [filtre, setFiltre]   = useState("tous");
  const [editId, setEditId]   = useState(null); // id du pointage en cours d'édition
  const [editData, setEditData] = useState({});  // {debut, fin, pause, chantier}

  const liste = filtre==="tous" ? auj : auj.filter(p=>p.chantier===filtre);

  // ---- Alertes légales BTP ----
  // Durée max journalière : 10h effectives
  const alertesJour = auj.filter(p => calcHeures(p) > 10).map(p => ({
    id: p.id, niveau: "danger",
    msg: `${trouver(p.salarie)?.nom||p.salarie} — ${fmtH(calcHeures(p))}/jour (max légal : 10h)`
  }));

  // Durée hebdo : on prend toute la semaine courante
  const semaineCourante = (() => {
    const d=new Date(), day=d.getDay()||7;
    const lundi=new Date(d); lundi.setDate(d.getDate()-day+1);
    return Array.from({length:7},(_,i)=>{const x=new Date(lundi);x.setDate(lundi.getDate()+i);return x.toISOString().slice(0,10);});
  })();
  const ptgSem = pointagesTous.filter(p=>semaineCourante.includes(p.date));
  const personnesSem = [...new Set(ptgSem.map(p=>p.salarie))];
  const alertesSemaine = personnesSem.flatMap(id => {
    const total = ptgSem.filter(p=>p.salarie===id).reduce((s,p)=>s+calcHeures(p),0);
    if (total > 48) return [{ id, niveau:"danger", msg:`${trouver(id)?.nom||id} — ${fmtH(total)}/semaine (max légal absolu : 48h)` }];
    if (total > 44) return [{ id, niveau:"warn", msg:`${trouver(id)?.nom||id} — ${fmtH(total)}/semaine (seuil d'alerte : 44h)` }];
    return [];
  });

  const toutesAlertes = [...alertesJour, ...alertesSemaine];

  // ---- Edition inline ----
  const ouvrirEdit = (p) => {
    setEditId(p.id);
    setEditData({ debut: p.debut, fin: p.fin, pause: p.pause, chantier: p.chantier, commentaire: p.commentaire||"" });
  };
  const annulerEdit = () => { setEditId(null); setEditData({}); };
  const sauvegarderEdit = (id) => {
    setPointages(pointagesTous.map(p => p.id===id
      ? { ...p, ...editData, modifiePar:"RH", modifieLe: new Date().toISOString() }
      : p
    ));
    setEditId(null);
    setEditData({});
  };

  const iStyle = {padding:"6px 8px",background:C.papier,border:`1.5px solid ${C.encre}`,fontFamily:FM,fontSize:12,outline:"none",width:"100%",boxSizing:"border-box"};

  return (
    <Section titre="Pointages du jour" actions={
      <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
        <select value={filtre} onChange={e=>setFiltre(e.target.value)} style={selectStyle}>
          <option value="tous">Tous les chantiers</option>
          {chantiers.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}
        </select>
        {aValider>0 && <Btn onClick={validerTout}>✓ TOUT VALIDER ({aValider})</Btn>}
      </div>
    }>

      {/* Bandeau alertes légales */}
      {toutesAlertes.length>0 && (
        <div style={{marginBottom:16}}>
          {toutesAlertes.map((a,i)=>(
            <div key={i} style={{
              display:"flex", alignItems:"center", gap:12, padding:"10px 16px", marginBottom:6,
              background: a.niveau==="danger"?"#FFF0F0":"#FFF8E1",
              border:`1.5px solid ${a.niveau==="danger"?C.orange:"#F39C12"}`,
            }}>
              <span style={{fontSize:18}}>{a.niveau==="danger"?"🔴":"🟠"}</span>
              <div>
                <div style={{fontFamily:FM,fontSize:11,fontWeight:700,color:a.niveau==="danger"?C.orange:"#B7770D"}}>
                  {a.niveau==="danger"?"DÉPASSEMENT LÉGAL":"SEUIL D'ALERTE"}
                </div>
                <div style={{fontSize:12,color:C.encre,marginTop:2}}>{a.msg}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {liste.length===0
        ? <EmptyState>Aucun pointage aujourd'hui.<br/><small style={{color:C.gris}}>Les rapports arrivent depuis l'onglet Chef d'équipe.</small></EmptyState>
        : <TableWrap>
            <thead><tr>
              <Th>Date</Th><Th>Personne</Th><Th>Statut</Th><Th>Chantier</Th>
              <Th r>Début</Th><Th r>Fin</Th><Th r>Pause</Th><Th r>Total</Th><Th r>H.Nuit</Th>
              <Th>Commentaire</Th><Th>Val. intérimaire</Th><Th>État RH</Th><Th></Th>
            </tr></thead>
            <tbody>
              {liste.map(p=>{
                const pers  = trouver(p.salarie);
                const ch    = chantiers.find(c=>c.id===p.chantier);
                const ag    = p.interim ? AGENCES.find(a=>a.id===pers?.agence) : null;
                const dateCourte = p.date ? new Date(p.date+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}) : "—";
                const hTot  = calcHeures(p);
                const hNuit = calcHNuit(p);
                const alerte = hTot > 10 ? "danger" : null;
                const enEdition = editId === p.id;

                // Données affichées (edit ou lecture)
                const dispDebut   = enEdition ? editData.debut   : p.debut;
                const dispFin     = enEdition ? editData.fin     : p.fin;
                const dispPause   = enEdition ? editData.pause   : p.pause;
                const dispChant   = enEdition ? chantiers.find(c=>c.id===editData.chantier) : ch;
                const hEdit       = enEdition ? calcHeures({...p,...editData}) : hTot;

                return (
                  <tr key={p.id} style={{borderBottom:`1px solid ${C.ligne}`, background: alerte?"#FFF8F8": enEdition?"#FFFDE7":"transparent"}}>
                    <Td>
                      <span style={{fontSize:11,fontWeight:500}}>{dateCourte}</span>
                      {alerte && <div style={{fontSize:9,color:C.orange,fontWeight:700,marginTop:2}}>⚠ &gt;10h</div>}
                      {p.modifiePar && <div style={{fontSize:9,color:C.gris,marginTop:2}}>✎ Modifié RH</div>}
                    </Td>
                    <Td>
                      <b style={{fontSize:13}}>{pers?.nom||p.salarie}</b><br/>
                      <span style={{fontSize:11,color:C.gris}}>{pers?.poste||"—"}{p.chefNom?` · Chef: ${p.chefNom}`:""}</span>
                      {p.commentaire && <div style={{fontSize:10,color:"#6C3483",marginTop:3,fontStyle:"italic"}}>💬 {p.commentaire}</div>}
                    </Td>
                    <Td>
                      {p.interim
                        ? <span style={{fontSize:10,padding:"3px 8px",color:"#fff",fontWeight:700,background:ag?.couleur}}>{ag?.nom||"INTÉRIM"}</span>
                        : <span style={{fontSize:10,padding:"3px 8px",fontWeight:700,border:`1px solid ${C.encre}`}}>INTERNE</span>}
                    </Td>

                    {/* Chantier — éditable */}
                    <Td>
                      {enEdition
                        ? <select value={editData.chantier} onChange={e=>setEditData({...editData,chantier:e.target.value})} style={{...iStyle,width:160}}>
                            {chantiers.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}
                          </select>
                        : dispChant
                          ? <span style={{fontSize:11,padding:"3px 8px",fontWeight:700,background:dispChant.couleur,color:dispChant.couleur==="#F5C518"?"#0A0A0A":"#fff"}}>{dispChant.nom}</span>
                          : "—"
                      }
                    </Td>

                    {/* Début — éditable */}
                    <Td r>
                      {enEdition
                        ? <input type="time" value={editData.debut} onChange={e=>setEditData({...editData,debut:e.target.value})} style={{...iStyle,width:90,textAlign:"center"}}/>
                        : dispDebut}
                    </Td>

                    {/* Fin — éditable */}
                    <Td r>
                      {enEdition
                        ? <input type="time" value={editData.fin} onChange={e=>setEditData({...editData,fin:e.target.value})} style={{...iStyle,width:90,textAlign:"center"}}/>
                        : dispFin}
                    </Td>

                    {/* Pause — éditable */}
                    <Td r>
                      {enEdition
                        ? <input type="number" value={editData.pause} onChange={e=>setEditData({...editData,pause:parseInt(e.target.value)||0})} style={{...iStyle,width:70,textAlign:"center"}}/>
                        : `${dispPause}min`}
                    </Td>

                    <Td r>
                      <b style={{color: hEdit>10?C.orange:"inherit"}}>{fmtH(enEdition?hEdit:hTot)}</b>
                      {enEdition && hEdit>10 && <div style={{fontSize:9,color:C.orange,fontWeight:700}}>⚠ MAX 10h</div>}
                    </Td>
                    <Td r>{hNuit>0 ? <span style={{color:"#6C3483",fontWeight:700,fontSize:11}}>{fmtH(hNuit)}</span> : <span style={{color:C.ligne}}>—</span>}</Td>
                    {/* Commentaire */}
                    <Td>
                      {enEdition
                        ? <textarea value={editData.commentaire||""} onChange={e=>setEditData({...editData,commentaire:e.target.value})} placeholder="Commentaire..." rows={2} style={{...iStyle,width:160,resize:"vertical",fontSize:11}}/>
                        : p.commentaire
                          ? <span style={{fontSize:10,color:"#6C3483",fontStyle:"italic"}}>💬 {p.commentaire}</span>
                          : <span style={{color:C.ligne,fontSize:10}}>—</span>
                      }
                    </Td>
                    <Td>
                      {p.interim===true
                        ? p.valideParInterimaire
                          ? <span style={{color:C.vert,fontSize:10,fontWeight:700}}>✓ ACCEPTÉ<br/><span style={{fontWeight:400,fontSize:9}}>{p.horodatageValidation?new Date(p.horodatageValidation).toLocaleString("fr-FR",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}):""}</span></span>
                          : <span style={{color:C.orange,fontSize:10,fontWeight:700}}>⏳ EN ATTENTE</span>
                        : <span style={{color:C.gris,fontSize:10}}>—</span>}
                    </Td>
                    <Td>{p.valide?<span style={{color:C.vert,fontSize:11,fontWeight:700}}>● VALIDÉ RH</span>:<span style={{color:C.orange,fontSize:11,fontWeight:700}}>● ATTENTE RH</span>}</Td>
                    <Td>
                      {enEdition ? (
                        <div style={{display:"flex",gap:6,flexDirection:"column"}}>
                          <Btn variant="mini" onClick={()=>sauvegarderEdit(p.id)}>✓ SAUVER</Btn>
                          <Btn variant="ghost" onClick={annulerEdit}>ANNULER</Btn>
                        </div>
                      ) : (
                        <div style={{display:"flex",gap:6}}>
                          <Btn variant="ghost" onClick={()=>ouvrirEdit(p)}>✎</Btn>
                          {!p.valide && <Btn variant="mini" onClick={()=>valider(p.id)}>✓</Btn>}
                          <Btn variant="danger-mini" onClick={()=>supprPointage(p.id)}>✕</Btn>
                        </div>
                      )}
                    </Td>
                  </tr>
                );
              })}
            </tbody>
          </TableWrap>
      }

      {/* Légende alertes */}
      <div style={{marginTop:12,fontSize:11,color:C.gris,display:"flex",gap:20,flexWrap:"wrap"}}>
        <span>🔴 Dépassement légal absolu (&gt;10h/j ou &gt;48h/sem)</span>
        <span>🟠 Seuil d'alerte (&gt;44h/sem — moyenne 12 sem.)</span>
        <span>✎ Modifier les horaires d'un pointage</span>
      </div>
    </Section>
  );
}

// ---- Onglet Absences / Congés ----
function OngletAbsences({absences, setAbsences, salaries, interimaires, pointages}) {
  const [open, setOpen] = useState(false);
  const [personneId, setPersonneId] = useState("");
  const [dateDebut, setDateDebut] = useState(TODAY);
  const [dateFin, setDateFin] = useState(TODAY);
  const [type, setType] = useState(TYPES_ABSENCE[0].code);
  const [commentaire, setCommentaire] = useState("");
  const [err, setErr] = useState("");
  const [filtreType, setFiltreType] = useState("tous");
  const [filtrePersonne, setFiltrePersonne] = useState("tous");

  const tousPersonnes = [
    ...salaries.map(s=>({...s,_type:"interne"})),
    ...interimaires.map(i=>({...i,_type:"interim"})),
  ];

  const ajouter = () => {
    if (!personneId) { setErr("Sélectionnez une personne."); return; }
    if (dateDebut > dateFin) { setErr("La date de fin doit être après la date de début."); return; }
    const typeInfo = TYPES_ABSENCE.find(t=>t.code===type);
    setAbsences([...absences, {
      id: genId("A"),
      salarie: personneId,
      dateDebut, dateFin,
      type,
      typeLabel: typeInfo.label,
      typeIcone: typeInfo.icone,
      commentaire: commentaire.trim(),
      saisieParRH: true,
      saisieDate: new Date().toISOString(),
    }]);
    setPersonneId(""); setDateDebut(TODAY); setDateFin(TODAY);
    setType(TYPES_ABSENCE[0].code); setCommentaire("");
    setOpen(false); setErr("");
  };

  const supprimer = (id) => {
    if (!window.confirm("Supprimer cette absence ?")) return;
    setAbsences(absences.filter(a=>a.id!==id));
  };

  const getNom = (id) => tousPersonnes.find(p=>p.id===id)?.nom || id;
  const getType = (code) => TYPES_ABSENCE.find(t=>t.code===code);

  // Calcul nombre de jours ouvrés entre deux dates
  const nbJoursOuvres = (d1, d2) => {
    let count = 0;
    const cur = new Date(d1+"T00:00:00");
    const fin = new Date(d2+"T00:00:00");
    while (cur <= fin) {
      const j = cur.getDay();
      if (j!==0 && j!==6) count++;
      cur.setDate(cur.getDate()+1);
    }
    return count;
  };

  // Absences filtrées
  const listeFiltree = absences
    .filter(a => filtreType==="tous" || a.type===filtreType)
    .filter(a => filtrePersonne==="tous" || a.salarie===filtrePersonne)
    .sort((a,b) => b.dateDebut.localeCompare(a.dateDebut));

  // Stats par type
  const statParType = TYPES_ABSENCE.map(t=>({
    ...t,
    nb: absences.filter(a=>a.type===t.code).length,
    jours: absences.filter(a=>a.type===t.code).reduce((s,a)=>s+nbJoursOuvres(a.dateDebut,a.dateFin),0)
  })).filter(t=>t.nb>0);

  const fmtDate = (iso) => new Date(iso+"T00:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"});

  return (
    <Section titre={`Absences & Congés — ${absences.length} entrée(s)`} actions={
      <Btn onClick={()=>{setOpen(!open);setErr("");}}>{open?"✕ Annuler":"+ SAISIR UNE ABSENCE"}</Btn>
    }>

      {open && <FormInline>
        <div style={{fontFamily:FM,fontSize:10,letterSpacing:"0.2em",color:C.gris,fontWeight:700,marginBottom:12}}>NOUVELLE ABSENCE / CONGÉ</div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end",marginBottom:12}}>
          <Champ label="PERSONNE">
            <select value={personneId} onChange={e=>{setPersonneId(e.target.value);setErr("");}} style={selectStyle}>
              <option value="" disabled>— Sélectionner —</option>
              {salaries.length>0 && <optgroup label="── Salariés CHOK BÉTON">
                {salaries.map(s=><option key={s.id} value={s.id}>{s.nom}</option>)}
              </optgroup>}
              {interimaires.length>0 && <optgroup label="── Intérimaires">
                {interimaires.map(i=><option key={i.id} value={i.id}>{i.nom}</option>)}
              </optgroup>}
            </select>
          </Champ>
          <Champ label="TYPE D'ABSENCE">
            <select value={type} onChange={e=>setType(e.target.value)} style={selectStyle}>
              {TYPES_ABSENCE.map(t=><option key={t.code} value={t.code}>{t.icone} {t.label}</option>)}
            </select>
          </Champ>
          <Champ label="DATE DÉBUT">
            <input type="date" value={dateDebut} onChange={e=>setDateDebut(e.target.value)} style={inputStyle}/>
          </Champ>
          <Champ label="DATE FIN">
            <input type="date" value={dateFin} onChange={e=>setDateFin(e.target.value)} style={inputStyle}/>
          </Champ>
          {dateDebut && dateFin && dateDebut<=dateFin &&
            <div style={{padding:"0 0 2px",fontSize:12,color:C.gris,alignSelf:"flex-end"}}>
              → <b>{nbJoursOuvres(dateDebut,dateFin)}</b> jour(s) ouvré(s)
            </div>
          }
        </div>
        <div style={{display:"flex",gap:12,alignItems:"flex-end"}}>
          <Champ label="COMMENTAIRE (OPTIONNEL)" style={{flex:1}}>
            <input value={commentaire} onChange={e=>setCommentaire(e.target.value)} placeholder="Justificatif, remarque..." style={{...inputStyle,minWidth:300}}/>
          </Champ>
          <Btn onClick={ajouter}>ENREGISTRER</Btn>
        </div>
        {err && <ErrBox>{err}</ErrBox>}
      </FormInline>}

      {/* Bandeau stats */}
      {statParType.length>0 && (
        <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>
          {statParType.map(t=>(
            <div key={t.code} style={{padding:"10px 16px",background:C.papier,border:`1.5px solid ${t.couleur}`,display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>{t.icone}</span>
              <div>
                <div style={{fontSize:10,color:C.gris,letterSpacing:"0.1em",fontWeight:700}}>{t.label.toUpperCase()}</div>
                <div style={{fontFamily:FT,fontSize:18,fontWeight:800,marginTop:2}}>
                  {t.nb} <span style={{fontSize:12,fontWeight:400,color:C.gris}}>absent. · {t.jours}j ouvrés</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Filtres */}
      {absences.length>0 && (
        <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
          <select value={filtreType} onChange={e=>setFiltreType(e.target.value)} style={selectStyle}>
            <option value="tous">Tous les types</option>
            {TYPES_ABSENCE.map(t=><option key={t.code} value={t.code}>{t.icone} {t.label}</option>)}
          </select>
          <select value={filtrePersonne} onChange={e=>setFiltrePersonne(e.target.value)} style={selectStyle}>
            <option value="tous">Toutes les personnes</option>
            {salaries.map(s=><option key={s.id} value={s.id}>{s.nom}</option>)}
            {interimaires.map(i=><option key={i.id} value={i.id}>{i.nom}</option>)}
          </select>
          <span style={{fontSize:11,color:C.gris}}>{listeFiltree.length} résultat(s)</span>
        </div>
      )}

      {absences.length===0
        ? <EmptyState>Aucune absence enregistrée.<br/><span style={{color:C.gris,fontSize:12}}>Cliquez sur "+ SAISIR UNE ABSENCE" pour commencer.</span></EmptyState>
        : listeFiltree.length===0
          ? <EmptyState>Aucun résultat pour ces filtres.</EmptyState>
          : <TableWrap>
              <thead><tr>
                <Th>Personne</Th><Th>Type</Th><Th>Début</Th><Th>Fin</Th>
                <Th r>Jours ouvrés</Th><Th>Commentaire</Th><Th>Saisi le</Th><Th></Th>
              </tr></thead>
              <tbody>
                {listeFiltree.map(a=>{
                  const typeInfo = getType(a.type);
                  const jours = nbJoursOuvres(a.dateDebut, a.dateFin);
                  const personne = tousPersonnes.find(p=>p.id===a.salarie);
                  const ag = personne?._type==="interim" ? AGENCES.find(x=>x.id===personne.agence) : null;
                  return (
                    <tr key={a.id} style={{borderBottom:`1px solid ${C.ligne}`}}>
                      <Td>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{width:28,height:28,background:ag?ag.couleur:C.encre,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0}}>
                            {initiales(personne?.nom||a.salarie)}
                          </div>
                          <div>
                            <div style={{fontWeight:600,fontSize:13}}>{personne?.nom||a.salarie}</div>
                            {ag && <div style={{fontSize:9,color:ag.couleur,fontWeight:700}}>{ag.nom}</div>}
                          </div>
                        </div>
                      </Td>
                      <Td>
                        <span style={{display:"inline-flex",alignItems:"center",gap:6,padding:"4px 10px",background:typeInfo?.couleur+"22",border:`1px solid ${typeInfo?.couleur}`,fontSize:11,fontWeight:700,color:typeInfo?.couleur}}>
                          {typeInfo?.icone} {typeInfo?.label}
                        </span>
                      </Td>
                      <Td>{fmtDate(a.dateDebut)}</Td>
                      <Td>{fmtDate(a.dateFin)}</Td>
                      <Td r><b style={{fontFamily:FT,fontSize:16}}>{jours}</b> <span style={{fontSize:10,color:C.gris}}>j.</span></Td>
                      <Td>
                        {a.commentaire
                          ? <span style={{fontSize:11,color:"#6C3483",fontStyle:"italic"}}>💬 {a.commentaire}</span>
                          : <span style={{color:C.ligne}}>—</span>}
                      </Td>
                      <Td>
                        <span style={{fontSize:10,color:C.gris}}>
                          {a.saisieDate ? new Date(a.saisieDate).toLocaleDateString("fr-FR",{day:"numeric",month:"short"}) : "—"}
                          {a.saisieParRH && <span style={{marginLeft:4,color:C.bleu,fontWeight:700}}>· RH</span>}
                        </span>
                      </Td>
                      <Td><Btn variant="danger" onClick={()=>supprimer(a.id)}>SUPPR.</Btn></Td>
                    </tr>
                  );
                })}
              </tbody>
            </TableWrap>
      }

      <div style={{marginTop:12,padding:"10px 14px",background:"#FFF8E1",border:`1px solid ${C.ligne}`,fontSize:11,color:C.gris,lineHeight:1.6}}>
        💡 Les absences apparaissent dans le rapport détaillé et dans les archives de chaque semaine, en complément des pointages.
        Les jours ouvrés excluent samedis et dimanches.
      </div>
    </Section>
  );
}

// ---- Onglet Salariés ----
function OngletSalaries({salaries,setSalaries,pointages}) {
  const [open,setOpen] = useState(false);
  const [nom,setNom]   = useState("");
  const [poste,setPoste] = useState(POSTES[0]);
  const [err,setErr]   = useState("");

  const ajouter = () => {
    if(nom.trim().length<2){setErr("Nom trop court."); return;}
    if(salaries.some(s=>s.nom.toLowerCase()===nom.trim().toLowerCase())){setErr("Déjà enregistré."); return;}
    setSalaries([...salaries,{id:genId("S"),nom:nom.trim(),poste,equipe:"—",interne:true}]);
    setNom(""); setPoste(POSTES[0]); setOpen(false); setErr("");
  };
  const supprimer = (id) => {
    if(pointages.some(p=>p.salarie===id) && !window.confirm("Ce salarié a des pointages. Supprimer quand même ?")) return;
    setSalaries(salaries.filter(s=>s.id!==id));
  };

  return (
    <Section titre={`Salariés CHOK BÉTON — ${salaries.length}`} actions={
      <Btn onClick={()=>{setOpen(!open);setErr("");}}>{open?"✕ Annuler":"+ AJOUTER UN SALARIÉ"}</Btn>
    }>
      {open && <FormInline>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
          <Champ label="NOM COMPLET"><input value={nom} onChange={e=>{setNom(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&ajouter()} placeholder="Prénom Nom" style={inputStyle}/></Champ>
          <Champ label="POSTE"><select value={poste} onChange={e=>setPoste(e.target.value)} style={selectStyle}>{POSTES.map(p=><option key={p}>{p}</option>)}</select></Champ>
          <Btn onClick={ajouter}>AJOUTER</Btn>
        </div>
        {err && <ErrBox>{err}</ErrBox>}
      </FormInline>}

      {salaries.length===0
        ? <EmptyState>Aucun salarié. Cliquez sur "+ AJOUTER UN SALARIÉ".</EmptyState>
        : <TableWrap>
            <thead><tr><Th>Nom</Th><Th>Poste</Th><Th>ID</Th><Th r>Jours pointés</Th><Th></Th></tr></thead>
            <tbody>{salaries.map(s=>{
              const jours = pointages.filter(p=>p.salarie===s.id).length;
              return <tr key={s.id} style={{borderBottom:`1px solid ${C.ligne}`}}>
                <Td><div style={{display:"flex",alignItems:"center",gap:10}}><Avatar nom={s.nom}/><b>{s.nom}</b></div></Td>
                <Td><span style={{fontSize:10,padding:"3px 8px",fontWeight:700,border:`1px solid ${C.encre}`}}>{s.poste}</span></Td>
                <Td><span style={{fontSize:10,padding:"3px 8px",color:C.gris,border:`1px solid ${C.ligne}`}}>{s.id}</span></Td>
                <Td r>{jours}</Td>
                <Td><Btn variant="danger" onClick={()=>supprimer(s.id)}>SUPPRIMER</Btn></Td>
              </tr>;
            })}</tbody>
          </TableWrap>
      }
    </Section>
  );
}

// ---- Onglet Intérimaires ----
function OngletInterim({interimaires,setInterimaires,pointages,chantiers}) {
  const [open,setOpen]   = useState(false);
  const [nom,setNom]     = useState("");
  const [poste,setPoste] = useState("Manœuvre");
  const [agence,setAgence] = useState(AGENCES[0].id);
  const [err,setErr]     = useState("");

  const ajouter = () => {
    if(nom.trim().length<2){setErr("Nom trop court."); return;}
    if(interimaires.some(i=>i.nom.toLowerCase()===nom.trim().toLowerCase())){setErr("Déjà enregistré."); return;}
    setInterimaires([...interimaires,{id:genId("I"),nom:nom.trim(),poste,agence,accesPlateforme:false}]);
    setNom(""); setPoste("Manœuvre"); setAgence(AGENCES[0].id); setOpen(false); setErr("");
  };

  const toggleAcces = (id) => setInterimaires(interimaires.map(i=>i.id===id?{...i,accesPlateforme:!i.accesPlateforme}:i));
  const supprimer = (id) => {
    if(pointages.some(p=>p.salarie===id) && !window.confirm("Cet intérimaire a des pointages. Supprimer ?")) return;
    setInterimaires(interimaires.filter(i=>i.id!==id));
  };
  const stats = (id) => { const ps=pointages.filter(p=>p.salarie===id); return {j:ps.length, h:ps.reduce((s,p)=>s+calcHeures(p),0)}; };

  return (
    <Section titre={`Intérimaires — ${interimaires.length}`} actions={
      <Btn onClick={()=>{setOpen(!open);setErr("");}}>{open?"✕ Annuler":"+ AJOUTER UN INTÉRIMAIRE"}</Btn>
    }>
      {open && <FormInline>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
          <Champ label="NOM COMPLET"><input value={nom} onChange={e=>{setNom(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&ajouter()} placeholder="Prénom Nom" style={inputStyle}/></Champ>
          <Champ label="POSTE"><select value={poste} onChange={e=>setPoste(e.target.value)} style={selectStyle}>{POSTES.map(p=><option key={p}>{p}</option>)}</select></Champ>
          <Champ label="AGENCE"><select value={agence} onChange={e=>setAgence(e.target.value)} style={selectStyle}>{AGENCES.map(a=><option key={a.id} value={a.id}>{a.nom}</option>)}</select></Champ>
          <Btn onClick={ajouter}>AJOUTER</Btn>
        </div>
        {err && <ErrBox>{err}</ErrBox>}
      </FormInline>}

      {interimaires.length===0
        ? <EmptyState>Aucun intérimaire. Ajoutez-les ici ou depuis l'app chef d'équipe.</EmptyState>
        : <TableWrap>
            <thead><tr><Th>Nom</Th><Th>Poste</Th><Th>Agence</Th><Th r>Jours</Th><Th r>Heures</Th><Th></Th></tr></thead>
            <tbody>{interimaires.map(i=>{
              const ag=AGENCES.find(a=>a.id===i.agence); const s=stats(i.id);
              return <tr key={i.id} style={{borderBottom:`1px solid ${C.ligne}`}}>
                <Td><div style={{display:"flex",alignItems:"center",gap:10}}><Avatar nom={i.nom} bg={ag?.couleur} light/><b>{i.nom}</b></div></Td>
                <Td>{i.poste}</Td>
                <Td><span style={{fontSize:10,padding:"3px 8px",fontWeight:700,color:"#fff",background:ag?.couleur}}>{ag?.nom}</span></Td>
                <Td r>{s.j}</Td><Td r><b>{fmtH(s.h)}</b></Td>
                <Td><Btn variant="danger" onClick={()=>supprimer(i.id)}>SUPPRIMER</Btn></Td>
              </tr>;
            })}</tbody>
          </TableWrap>
      }
    </Section>
  );
}

// ---- Onglet Paie / Rapport détaillé ----
function OngletPaie({pointages,salaries,interimaires,chantiers}) {
  const [personneId, setPersonneId] = useState("tous");
  const [modeVue, setModeVue] = useState("semaine");

  const tousLesPersonnes = [
    ...salaries.map(s=>({...s,_type:"interne"})),
    ...interimaires.map(i=>({...i,_type:"interim"})),
  ];

  const plage = (() => {
    const d = new Date();
    if(modeVue==="semaine") {
      const day=d.getDay()||7;
      const lundi=new Date(d); lundi.setDate(d.getDate()-day+1);
      return Array.from({length:5},(_,i)=>{const x=new Date(lundi);x.setDate(lundi.getDate()+i);return x.toISOString().slice(0,10);});
    }
    if(modeVue==="mois") {
      const dates=[];
      const debut=new Date(d.getFullYear(),d.getMonth(),1);
      const fin=new Date(d.getFullYear(),d.getMonth()+1,0);
      for(let dt=new Date(debut);dt<=fin;dt.setDate(dt.getDate()+1)) dates.push(new Date(dt).toISOString().slice(0,10));
      return dates;
    }
    return [...new Set(pointages.map(p=>p.date))].sort();
  })();

  const fmtDate = (iso) => new Date(iso+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}).toUpperCase();

  const personnesFiltrees = personneId==="tous" ? tousLesPersonnes : tousLesPersonnes.filter(p=>p.id===personneId);
  const ptgPlage = pointages.filter(p=>plage.includes(p.date));

  const exportPDF = (cible) => {
    // On stocke la cible dans un attribut temporaire sur le body pour que le CSS print puisse l'utiliser
    document.body.setAttribute("data-print", cible);
    window.print();
    setTimeout(()=>document.body.removeAttribute("data-print"), 1000);
  };

  const th9 = {padding:"9px 16px",fontSize:9,letterSpacing:"0.15em",color:C.gris,fontWeight:500,borderBottom:`1px solid ${C.ligne}`,textTransform:"uppercase",whiteSpace:"nowrap"};

  return (
    <Section titre="Rapport détaillé — Heures & Chantiers" actions={
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <select value={personneId} onChange={e=>setPersonneId(e.target.value)} style={selectStyle}>
          <option value="tous">Toutes les personnes</option>
          {salaries.length>0 && <optgroup label="── Salariés CHOK BÉTON">
            {salaries.map(s=><option key={s.id} value={s.id}>{s.nom}</option>)}
          </optgroup>}
          {interimaires.length>0 && <optgroup label="── Intérimaires">
            {interimaires.map(i=><option key={i.id} value={i.id}>{i.nom}</option>)}
          </optgroup>}
        </select>
        {["semaine","mois","tout"].map(m=>(
          <button key={m} onClick={()=>setModeVue(m)} style={{fontFamily:FM,fontSize:11,padding:"8px 14px",background:modeVue===m?C.encre:"transparent",color:modeVue===m?C.jaune:C.encre,border:`1.5px solid ${C.encre}`,cursor:"pointer",fontWeight:modeVue===m?700:500,letterSpacing:"0.05em"}}>
            {{semaine:"SEMAINE",mois:"MOIS",tout:"TOUT"}[m]}
          </button>
        ))}
        <Btn variant="ghost" onClick={()=>exportPDF("interne")}>↓ PDF Salariés</Btn>
        <Btn variant="export" onClick={()=>exportPDF("interim")}>↓ PDF Intérimaires</Btn>
      </div>
    }>

      {/* Styles d'impression avec filtrage par type */}
      <style>{`
        @media print {
          header, footer, .no-print { display: none !important; }
          body { background: white !important; background-image: none !important; }
          main { padding: 0 !important; max-width: 100% !important; }
          .print-break { page-break-after: always; }
          @page { margin: 15mm; size: A4 landscape; }

          /* Masquer le groupe non sélectionné */
          body[data-print="interne"] .bloc-interim { display: none !important; }
          body[data-print="interim"] .bloc-interne { display: none !important; }

          /* En-tête PDF visible uniquement à l'impression */
          .print-header { display: block !important; margin-bottom: 20px; border-bottom: 2px solid #0A0A0A; padding-bottom: 12px; }
        }
        .print-header { display: none; }
      `}</style>

      {/* En-tête PDF */}
      <div className="print-header">
        <div style={{fontFamily:"sans-serif",fontSize:20,fontWeight:800}}>RAPPORT HEURE — CHOK BÉTON</div>
        <div style={{fontSize:12,color:"#888",marginTop:4}}>
          Généré le {new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"})}
          {" · "}Période : {modeVue.toUpperCase()}
        </div>
      </div>

      {tousLesPersonnes.length===0
        ? <EmptyState>Aucun salarié ni intérimaire enregistré.</EmptyState>
        : personnesFiltrees.map(p=>{
            const ag = p._type==="interim" ? AGENCES.find(a=>a.id===p.agence) : null;
            const ptgPersonne = ptgPlage.filter(x=>x.salarie===p.id);
            const totalH    = ptgPersonne.reduce((s,x)=>s+calcHeures(x),0);
            const totalNuit = ptgPersonne.reduce((s,x)=>s+calcHNuit(x),0);

            // Heures sup calculées semaine par semaine (>35h/semaine)
            const parSemaine = {};
            ptgPersonne.forEach(x=>{ const {cle}=infoSemaine(x.date); if(!parSemaine[cle]) parSemaine[cle]=[]; parSemaine[cle].push(x); });
            const totalSup = Object.values(parSemaine).reduce((acc,ptgs)=>acc+calcHSupSemaine(ptgs),0);

            // Semaine courante
            const semCle = semaineCouranteCle();
            const ptgSemCourante = parSemaine[semCle] || [];
            const totalSem35 = ptgSemCourante.reduce((s,x)=>s+calcHeures(x),0);
            const hSupSem = calcHSupSemaine(ptgSemCourante);

            const parDate = {};
            ptgPersonne.forEach(x=>{ if(!parDate[x.date]) parDate[x.date]=[]; parDate[x.date].push(x); });

            return (
              <div key={p.id} className={`print-break ${p._type==="interim"?"bloc-interim":"bloc-interne"}`} style={{background:C.papier,border:`1.5px solid ${C.encre}`,marginBottom:20,overflow:"hidden"}}>
                {/* En-tête personne */}
                <div style={{display:"flex",alignItems:"center",gap:14,padding:"14px 20px",borderBottom:`2px solid ${C.encre}`,background:C.fond,flexWrap:"wrap"}}>
                  <div style={{width:44,height:44,background:p._type==="interim"?ag?.couleur:C.encre,color:p._type==="interim"?"#fff":C.jaune,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,flexShrink:0}}>
                    {initiales(p.nom)}
                  </div>
                  <div style={{flex:1,minWidth:200}}>
                    <div style={{fontFamily:FT,fontSize:18,fontWeight:800,letterSpacing:"-0.01em"}}>{p.nom}</div>
                    <div style={{fontSize:11,color:C.gris,marginTop:2}}>
                      {p.poste}
                      {p._type==="interim" && <span style={{marginLeft:8,fontSize:10,padding:"2px 7px",fontWeight:700,color:"#fff",background:ag?.couleur}}>{ag?.nom}</span>}
                      <span style={{marginLeft:12,fontSize:10,padding:"2px 8px",background:C.fond,border:`1px solid ${C.ligne}`,color:C.gris,fontWeight:700}}>
                        {modeVue==="semaine" ? infoSemaine(TODAY).label : modeVue==="mois" ? new Date().toLocaleDateString("fr-FR",{month:"long",year:"numeric"}).toUpperCase() : "TOUTES SEMAINES"}
                      </span>
                    </div>
                  </div>
                  {/* KPI totaux */}
                  <div style={{display:"flex",gap:24,alignItems:"center",flexWrap:"wrap"}}>
                    {[
                      ["TOTAL PÉRIODE", fmtH(totalH), C.encre],
                      ["CETTE SEMAINE", fmtH(totalSem35), C.encre],
                      ...(totalSup>0 ? [["H. SUP (>7h/j)", "+"+fmtH(totalSup), C.orange]] : []),
                      ...(totalNuit>0 ? [["H. NUIT (>20h)", fmtH(totalNuit), "#6C3483"]] : []),
                      ["JOURS", ptgPersonne.length, C.encre],
                    ].map(([l,v,col])=>(
                      <div key={l} style={{textAlign:"center"}}>
                        <div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:3}}>{l}</div>
                        <div style={{fontFamily:FT,fontSize:22,fontWeight:800,color:col}}>{v}</div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Tableau jour par jour */}
                {ptgPersonne.length===0
                  ? <div style={{padding:"20px",fontSize:12,color:C.gris,fontStyle:"italic"}}>Aucun pointage sur cette période.</div>
                  : <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                      <thead>
                        <tr style={{background:C.fond}}>
                          <th style={{...th9,textAlign:"left"}}>Date</th>
                          <th style={{...th9,textAlign:"left"}}>Chantier</th>
                          <th style={{...th9,textAlign:"left"}}>Lieu</th>
                          <th style={{...th9,textAlign:"right"}}>Début</th>
                          <th style={{...th9,textAlign:"right"}}>Fin</th>
                          <th style={{...th9,textAlign:"right"}}>Pause</th>
                          <th style={{...th9,textAlign:"right"}}>Total</th>
                          <th style={{...th9,textAlign:"right",color:"#6C3483"}}>H. Nuit</th>
                          <th style={{...th9,textAlign:"center"}}>État</th>
                        </tr>
                      </thead>
                      <tbody>
                        {(() => {
                          const rows = [];
                          // Trier les semaines puis les dates dans chaque semaine
                          const semainesTriees = Object.entries(parSemaine).sort(([a],[b])=>b.localeCompare(a));
                          semainesTriees.forEach(([semCle, ptgsSem])=>{
                            const datesSem = [...new Set(ptgsSem.map(x=>x.date))].sort((a,b)=>b.localeCompare(a));
                            // Ligne séparateur semaine
                            const totalSemH = ptgsSem.reduce((s,x)=>s+calcHeures(x),0);
                            const supSem = calcHSupSemaine(ptgsSem);
                            // Lignes de pointages de la semaine
                            datesSem.forEach(date=>{
                              const lignes = ptgsSem.filter(x=>x.date===date);
                              const isWeekend = [0,6].includes(new Date(date+"T00:00:00").getDay());
                              lignes.forEach((x,idx)=>{
                                const ch=chantiers.find(c=>c.id===x.chantier);
                                const h=calcHeures(x);
                                const hNuit=calcHNuit(x);
                                rows.push(
                                  <tr key={x.id} style={{borderBottom:`1px solid ${C.ligne}`,background:isWeekend?"#FFF8E1":idx%2===0?C.papier:"#F8F6F0"}}>
                                    {idx===0
                                      ? <td rowSpan={lignes.length} style={{padding:"10px 16px",verticalAlign:"top",borderRight:`1px solid ${C.ligne}`,whiteSpace:"nowrap"}}>
                                          <div style={{fontWeight:700,fontSize:11}}>{fmtDate(date)}</div>
                                        </td>
                                      : null}
                                    <td style={{padding:"10px 16px",verticalAlign:"middle"}}>
                                      {ch ? <span style={{fontSize:11,padding:"3px 8px",fontWeight:700,background:ch.couleur,color:ch.couleur==="#F5C518"?"#0A0A0A":"#fff"}}>{ch.nom}</span> : <span style={{color:C.gris}}>—</span>}
                                    </td>
                                    <td style={{padding:"10px 16px",verticalAlign:"middle",fontSize:11,color:C.gris}}>{ch?`📍 ${ch.ville}`:"—"}</td>
                                    <td style={{padding:"10px 16px",verticalAlign:"middle",textAlign:"right",fontWeight:500}}>{x.debut}</td>
                                    <td style={{padding:"10px 16px",verticalAlign:"middle",textAlign:"right",fontWeight:500}}>{x.fin}</td>
                                    <td style={{padding:"10px 16px",verticalAlign:"middle",textAlign:"right",color:C.gris}}>{x.pause}min</td>
                                    <td style={{padding:"10px 16px",verticalAlign:"middle",textAlign:"right"}}>
                                      <b style={{fontFamily:FT,fontSize:15}}>{fmtH(h)}</b>
                                    </td>
                                    <td style={{padding:"10px 16px",verticalAlign:"middle",textAlign:"right"}}>
                                      {hNuit>0 ? <b style={{color:"#6C3483",fontSize:13}}>{fmtH(hNuit)}</b> : <span style={{color:C.ligne}}>—</span>}
                                    </td>
                                    <td style={{padding:"10px 16px",verticalAlign:"middle",textAlign:"center"}}>
                                      {x.valide ? <span style={{fontSize:10,color:C.vert,fontWeight:700}}>✓ VALIDÉ</span> : <span style={{fontSize:10,color:C.orange,fontWeight:700}}>⏳ ATTENTE</span>}
                                    </td>
                                  </tr>
                                );
                              });
                            });
                            // Ligne bilan de la semaine
                            rows.push(
                              <tr key={`sem-${semCle}`} style={{borderTop:`1.5px solid ${C.encre}`,background:"#F0F4F8"}}>
                                <td colSpan={6} style={{padding:"8px 16px",fontSize:10,fontWeight:700,color:C.gris,letterSpacing:"0.1em"}}>
                                  {infoSemaine(ptgsSem[0].date).label}
                                </td>
                                <td style={{padding:"8px 16px",textAlign:"right"}}>
                                  <b style={{fontFamily:FT,fontSize:15}}>{fmtH(totalSemH)}</b>
                                </td>
                                <td style={{padding:"8px 16px",textAlign:"right",fontSize:10,color:C.gris}}>
                                  {ptgsSem.reduce((s,x)=>s+calcHNuit(x),0)>0 ? fmtH(ptgsSem.reduce((s,x)=>s+calcHNuit(x),0)) : "—"}
                                </td>
                                <td style={{padding:"8px 16px",textAlign:"center"}}>
                                  {supSem>0
                                    ? <span style={{fontSize:11,fontWeight:700,color:C.orange}}>+{fmtH(supSem)} H.SUP</span>
                                    : <span style={{fontSize:10,color:C.vert,fontWeight:700}}>{fmtH(totalSemH)} / 35h ✓</span>
                                  }
                                </td>
                              </tr>
                            );
                          });
                          return rows;
                        })()}
                        {/* Ligne totaux globaux */}
                        <tr style={{borderTop:`2px solid ${C.encre}`,background:C.fond}}>
                          <td colSpan={6} style={{padding:"10px 16px",fontSize:11,fontWeight:700,letterSpacing:"0.05em"}}>TOTAL PÉRIODE</td>
                          <td style={{padding:"10px 16px",textAlign:"right"}}><b style={{fontFamily:FT,fontSize:18,fontWeight:800}}>{fmtH(totalH)}</b></td>
                          <td style={{padding:"10px 16px",textAlign:"right"}}>
                            {totalNuit>0 ? <b style={{fontFamily:FT,fontSize:16,color:"#6C3483"}}>{fmtH(totalNuit)}</b> : <span style={{color:C.ligne}}>—</span>}
                          </td>
                          <td style={{padding:"10px 16px",textAlign:"center"}}>
                            {totalSup>0 ? <b style={{fontFamily:FT,fontSize:16,color:C.orange}}>+{fmtH(totalSup)} H.SUP</b> : <span style={{color:C.ligne}}>—</span>}
                          </td>
                        </tr>
                        {/* Mention légale intérimaire */}
                        {p._type==="interim" && (
                          <tr>
                            <td colSpan={9} style={{padding:"10px 16px",fontSize:10,color:C.gris,borderTop:`1px solid ${C.ligne}`,fontStyle:"italic"}}>
                              Relevé de mission — {p.nom} · Agence {ag?.nom} · Période : {modeVue} · Généré le {new Date().toLocaleDateString("fr-FR")}
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                }
              </div>
            );
          })
      }
    </Section>
  );
}

// ============================================================
//  ONGLET ARCHIVES — navigation Année > Mois > Semaine
// ============================================================
function OngletArchives({pointages, salaries, interimaires, chantiers}) {
  const semCourante = semaineCouranteCle();

  // Construire l'arborescence complète des semaines passées
  const parSemaine = grouperParSemaine(pointages);

  // Toutes les semaines sauf la courante, triées du plus récent au plus ancien
  const semainesPassees = Object.keys(parSemaine)
    .filter(cle => cle < semCourante)
    .sort((a,b) => b.localeCompare(a));

  // Grouper par année puis par mois
  const arbre = {};
  semainesPassees.forEach(cle => {
    const info = infoSemaine(parSemaine[cle][0].date);
    if (!arbre[info.annee]) arbre[info.annee] = {};
    const moisKey = `${String(info.moisNum).padStart(2,"0")}-${info.moisLabel}`;
    if (!arbre[info.annee][moisKey]) arbre[info.annee][moisKey] = [];
    arbre[info.annee][moisKey].push(cle);
  });

  const [anneeOuverte, setAnneeOuverte] = useState(null);
  const [moisOuvert, setMoisOuvert] = useState(null);
  const [semSel, setSemSel] = useState(null);
  const [typePDF, setTypePDF] = useState(null); // "interne"|"interim"|null

  // Initialiser sur l'année la plus récente
  useEffect(() => {
    const annees = Object.keys(arbre).sort((a,b)=>b-a);
    if (annees.length && !anneeOuverte) setAnneeOuverte(annees[0]);
  }, [pointages.length]);

  const annees = Object.keys(arbre).sort((a,b) => b-a);

  // Calculs récap d'une semaine
  const recapSemaine = (cle) => {
    const ptgs = parSemaine[cle] || [];
    const nbInterne = [...new Set(ptgs.filter(p=>!p.interim).map(p=>p.salarie))].length;
    const nbInterim = [...new Set(ptgs.filter(p=>p.interim).map(p=>p.salarie))].length;
    const totalH = ptgs.reduce((s,p)=>s+calcHeures(p),0);
    const totalSup = calcHSupSemaine(ptgs);
    return {ptgs, nbInterne, nbInterim, totalH, totalSup};
  };

  const exportSemaine = (cle, cible) => {
    setSemSel(cle);
    setTypePDF(cible);
    setTimeout(()=>{ document.body.setAttribute("data-print", cible); window.print(); setTimeout(()=>{ document.body.removeAttribute("data-print"); setSemSel(null); setTypePDF(null); },500); },100);
  };

  const th9 = {padding:"8px 14px",fontSize:9,letterSpacing:"0.15em",color:C.gris,fontWeight:500,borderBottom:`1px solid ${C.ligne}`,textTransform:"uppercase",whiteSpace:"nowrap"};

  if (semainesPassees.length === 0) {
    return (
      <Section titre="Archives — Semaines passées">
        <EmptyState>Aucune semaine archivée pour le moment.<br/><span style={{color:C.gris,fontSize:12}}>Les semaines terminées apparaîtront ici automatiquement.</span></EmptyState>
      </Section>
    );
  }

  return (
    <Section titre="Archives — Semaines passées">
      <style>{`
        @media print {
          header, footer, .no-print { display: none !important; }
          body { background: white !important; background-image: none !important; }
          main { padding: 0 !important; max-width: 100% !important; }
          .print-break { page-break-after: always; }
          @page { margin: 15mm; size: A4 landscape; }
          body[data-print="interne"] .bloc-interim { display: none !important; }
          body[data-print="interim"] .bloc-interne { display: none !important; }
          .print-header-arch { display: block !important; margin-bottom: 16px; border-bottom: 2px solid #0A0A0A; padding-bottom: 10px; }
        }
        .print-header-arch { display: none; }
      `}</style>

      <div style={{display:"flex",gap:20,alignItems:"flex-start",flexWrap:"wrap"}}>

        {/* Panneau navigation gauche */}
        <div style={{width:280,flexShrink:0}}>
          {annees.map(annee => (
            <div key={annee} style={{marginBottom:8}}>
              {/* En-tête année */}
              <button onClick={()=>{ setAnneeOuverte(anneeOuverte===annee?null:annee); setMoisOuvert(null); setSemSel(null); }}
                style={{width:"100%",padding:"12px 16px",background:anneeOuverte===annee?C.encre:C.papier,border:`1.5px solid ${C.encre}`,color:anneeOuverte===annee?C.jaune:C.encre,fontFamily:FM,fontSize:13,fontWeight:700,cursor:"pointer",textAlign:"left",letterSpacing:"0.05em",display:"flex",justifyContent:"space-between"}}>
                <span>📅 {annee}</span>
                <span>{anneeOuverte===annee?"▲":"▼"}</span>
              </button>

              {anneeOuverte===annee && (
                <div style={{borderLeft:`3px solid ${C.jaune}`,marginLeft:12,paddingLeft:8}}>
                  {Object.keys(arbre[annee]).sort((a,b)=>b.localeCompare(a)).map(moisKey => {
                    const moisLabel = moisKey.split("-").slice(1).join("-");
                    const semsDuMois = arbre[annee][moisKey];
                    const ouvert = moisOuvert === moisKey;
                    return (
                      <div key={moisKey} style={{marginTop:4}}>
                        {/* En-tête mois */}
                        <button onClick={()=>{ setMoisOuvert(ouvert?null:moisKey); setSemSel(null); }}
                          style={{width:"100%",padding:"9px 14px",background:ouvert?"#F0F4F8":C.fond,border:`1px solid ${C.ligne}`,fontFamily:FM,fontSize:11,fontWeight:700,cursor:"pointer",textAlign:"left",color:C.encre,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <span style={{textTransform:"capitalize"}}>{moisLabel}</span>
                          <span style={{fontSize:10,color:C.gris}}>{semsDuMois.length} sem. {ouvert?"▲":"▼"}</span>
                        </button>

                        {ouvert && semsDuMois.map(cle => {
                          const info = infoSemaine(parSemaine[cle][0].date);
                          const r = recapSemaine(cle);
                          return (
                            <button key={cle} onClick={()=>setSemSel(semSel===cle?null:cle)}
                              style={{width:"100%",padding:"10px 14px",background:semSel===cle?C.jaune:C.papier,border:`1px solid ${semSel===cle?C.encre:C.ligne}`,fontFamily:FM,fontSize:11,cursor:"pointer",textAlign:"left",marginTop:2,borderLeft:semSel===cle?`4px solid ${C.encre}`:"4px solid transparent"}}>
                              <div style={{fontWeight:700,color:C.encre}}>{info.labelCourt} — {info.label.split("—")[1]?.trim()}</div>
                              <div style={{fontSize:9,color:C.gris,marginTop:3}}>
                                {r.ptgs.length} pointages · {fmtH(r.totalH)}
                                {r.nbInterim>0?` · ${r.nbInterim} intér.`:""}
                                {r.totalSup>0?<span style={{color:C.orange}}> · +{fmtH(r.totalSup)} sup</span>:""}
                              </div>
                            </button>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          ))}
        </div>

        {/* Contenu droite — détail semaine sélectionnée */}
        <div style={{flex:1,minWidth:0}}>
          {!semSel ? (
            <div style={{padding:"48px 24px",textAlign:"center",background:C.papier,border:`1.5px dashed ${C.ligne}`,color:C.gris,fontSize:13}}>
              ← Sélectionnez une semaine dans le panneau gauche pour afficher le détail.
            </div>
          ) : (
            <SemaineArchive
              cle={semSel}
              ptgs={parSemaine[semSel]||[]}
              salaries={salaries}
              interimaires={interimaires}
              chantiers={chantiers}
              onExport={exportSemaine}
            />
          )}
        </div>
      </div>
    </Section>
  );
}

// Composant détail d'une semaine archivée
function SemaineArchive({cle, ptgs, salaries, interimaires, chantiers, onExport}) {
  const info = infoSemaine(ptgs[0]?.date || TODAY);
  const tousLesPersonnes = [
    ...salaries.map(s=>({...s,_type:"interne"})),
    ...interimaires.map(i=>({...i,_type:"interim"})),
  ];
  const personnesPresentes = tousLesPersonnes.filter(p=>ptgs.some(x=>x.salarie===p.id));
  const totalH = ptgs.reduce((s,p)=>s+calcHeures(p),0);
  const totalSup = calcHSupSemaine(ptgs);
  const totalNuit = ptgs.reduce((s,p)=>s+calcHNuit(p),0);
  const nbInterim = [...new Set(ptgs.filter(p=>p.interim).map(p=>p.salarie))].length;
  const th9 = {padding:"8px 14px",fontSize:9,letterSpacing:"0.15em",color:C.gris,fontWeight:500,borderBottom:`1px solid ${C.ligne}`,textTransform:"uppercase",whiteSpace:"nowrap"};

  return (
    <div>
      {/* En-tête PDF */}
      <div className="print-header-arch">
        <div style={{fontFamily:"sans-serif",fontSize:18,fontWeight:800}}>RAPPORT HEURE — CHOK BÉTON</div>
        <div style={{fontSize:11,color:"#888",marginTop:4}}>{info.label} · Généré le {new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"})}</div>
      </div>

      {/* En-tête semaine */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontFamily:FT,fontSize:24,fontWeight:800,letterSpacing:"-0.02em"}}>{info.label}</div>
          <div style={{fontSize:11,color:C.gris,marginTop:4}}>
            {personnesPresentes.length} personnes · {ptgs.length} pointages
            {nbInterim>0 && <span> · <b>{nbInterim}</b> intérimaire(s)</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <Btn variant="ghost" onClick={()=>onExport(cle,"interne")}>↓ PDF Salariés</Btn>
          <Btn variant="export" onClick={()=>onExport(cle,"interim")}>↓ PDF Intérimaires</Btn>
        </div>
      </div>

      {/* KPI semaine */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
        {[
          ["TOTAL HEURES",fmtH(totalH),C.encre],
          ["H. SUPP. (>35h)",totalSup>0?"+"+fmtH(totalSup):"—",totalSup>0?C.orange:C.gris],
          ["H. NUIT (>20h)",totalNuit>0?fmtH(totalNuit):"—",totalNuit>0?"#6C3483":C.gris],
          ["INTÉRIMAIRES",nbInterim+" pers.",C.bleu],
        ].map(([l,v,col])=>(
          <div key={l} style={{background:C.papier,border:`1.5px solid ${C.encre}`,padding:"14px 16px"}}>
            <div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:6}}>{l}</div>
            <div style={{fontFamily:FT,fontSize:22,fontWeight:800,color:col}}>{v}</div>
          </div>
        ))}
      </div>

      {/* Tableau par personne */}
      {personnesPresentes.map(p => {
        const ag = p._type==="interim" ? AGENCES.find(a=>a.id===p.agence) : null;
        const mesP = ptgs.filter(x=>x.salarie===p.id).sort((a,b)=>a.date.localeCompare(b.date));
        const totalPH = mesP.reduce((s,x)=>s+calcHeures(x),0);
        const totalPNuit = mesP.reduce((s,x)=>s+calcHNuit(x),0);
        return (
          <div key={p.id} className={`print-break ${p._type==="interim"?"bloc-interim":"bloc-interne"}`}
            style={{background:C.papier,border:`1.5px solid ${C.encre}`,marginBottom:16,overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderBottom:`1.5px solid ${C.encre}`,background:C.fond,flexWrap:"wrap"}}>
              <div style={{width:38,height:38,background:p._type==="interim"?ag?.couleur:C.encre,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,flexShrink:0}}>
                {initiales(p.nom)}
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:15}}>{p.nom}</div>
                <div style={{fontSize:10,color:C.gris,marginTop:2}}>
                  {p.poste}
                  {p._type==="interim" && <span style={{marginLeft:8,fontSize:9,padding:"2px 6px",fontWeight:700,color:"#fff",background:ag?.couleur}}>{ag?.nom}</span>}
                  <span style={{marginLeft:8,fontSize:9,padding:"2px 6px",background:"#E8EEF4",color:C.gris,fontWeight:700}}>{info.labelCourt}</span>
                </div>
              </div>
              <div style={{display:"flex",gap:16}}>
                <div style={{textAlign:"center"}}><div style={{fontSize:9,color:C.gris,marginBottom:2}}>TOTAL</div><div style={{fontFamily:FT,fontSize:18,fontWeight:800}}>{fmtH(totalPH)}</div></div>
                {totalPNuit>0 && <div style={{textAlign:"center"}}><div style={{fontSize:9,color:C.gris,marginBottom:2}}>NUIT</div><div style={{fontFamily:FT,fontSize:18,fontWeight:800,color:"#6C3483"}}>{fmtH(totalPNuit)}</div></div>}
              </div>
            </div>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead>
                <tr style={{background:C.fond}}>
                  <th style={{...th9,textAlign:"left"}}>Date</th>
                  <th style={{...th9,textAlign:"left"}}>Chantier</th>
                  <th style={{...th9,textAlign:"left"}}>Lieu</th>
                  <th style={{...th9,textAlign:"right"}}>Début</th>
                  <th style={{...th9,textAlign:"right"}}>Fin</th>
                  <th style={{...th9,textAlign:"right"}}>Pause</th>
                  <th style={{...th9,textAlign:"right"}}>Total</th>
                  <th style={{...th9,textAlign:"right",color:"#6C3483"}}>H.Nuit</th>
                  <th style={{...th9,textAlign:"center"}}>État</th>
                </tr>
              </thead>
              <tbody>
                {mesP.map((x,idx)=>{
                  const ch=chantiers.find(c=>c.id===x.chantier);
                  const h=calcHeures(x); const hN=calcHNuit(x);
                  const isWE=[0,6].includes(new Date(x.date+"T00:00:00").getDay());
                  const fmtD=(iso)=>new Date(iso+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}).toUpperCase();
                  return (
                    <tr key={x.id} style={{borderBottom:`1px solid ${C.ligne}`,background:isWE?"#FFF8E1":idx%2===0?C.papier:"#F8F6F0"}}>
                      <td style={{padding:"9px 14px",fontSize:11,fontWeight:500,whiteSpace:"nowrap"}}>{fmtD(x.date)}</td>
                      <td style={{padding:"9px 14px"}}>{ch?<span style={{fontSize:11,padding:"3px 8px",fontWeight:700,background:ch.couleur,color:ch.couleur==="#F5C518"?"#0A0A0A":"#fff"}}>{ch.nom}</span>:<span style={{color:C.gris}}>—</span>}</td>
                      <td style={{padding:"9px 14px",fontSize:11,color:C.gris}}>{ch?`📍 ${ch.ville}`:"—"}</td>
                      <td style={{padding:"9px 14px",textAlign:"right",fontWeight:500}}>{x.debut}</td>
                      <td style={{padding:"9px 14px",textAlign:"right",fontWeight:500}}>{x.fin}</td>
                      <td style={{padding:"9px 14px",textAlign:"right",color:C.gris}}>{x.pause}min</td>
                      <td style={{padding:"9px 14px",textAlign:"right"}}><b style={{fontFamily:FT,fontSize:14}}>{fmtH(h)}</b></td>
                      <td style={{padding:"9px 14px",textAlign:"right"}}>{hN>0?<b style={{color:"#6C3483"}}>{fmtH(hN)}</b>:<span style={{color:C.ligne}}>—</span>}</td>
                      <td style={{padding:"9px 14px",textAlign:"center"}}>{x.valide?<span style={{fontSize:10,color:C.vert,fontWeight:700}}>✓</span>:<span style={{fontSize:10,color:C.orange,fontWeight:700}}>⏳</span>}</td>
                    </tr>
                  );
                })}
                <tr style={{borderTop:`2px solid ${C.encre}`,background:C.fond}}>
                  <td colSpan={6} style={{padding:"8px 14px",fontSize:10,fontWeight:700}}>TOTAL SEMAINE {info.labelCourt}</td>
                  <td style={{padding:"8px 14px",textAlign:"right"}}><b style={{fontFamily:FT,fontSize:16,fontWeight:800}}>{fmtH(totalPH)}</b></td>
                  <td style={{padding:"8px 14px",textAlign:"right"}}>{totalPNuit>0?<b style={{color:"#6C3483"}}>{fmtH(totalPNuit)}</b>:"—"}</td>
                  <td></td>
                </tr>
                {p._type==="interim" && (
                  <tr><td colSpan={9} style={{padding:"8px 14px",fontSize:9,color:C.gris,fontStyle:"italic",borderTop:`1px solid ${C.ligne}`}}>
                    Relevé de mission — {p.nom} · {ag?.nom} · {info.label} · Généré le {new Date().toLocaleDateString("fr-FR")}
                  </td></tr>
                )}
              </tbody>
            </table>
          </div>
        );
      })}
    </div>
  );
}

// ============================================================
//  VUE SALARIÉ — lecture seule, uniquement ses propres heures
// ============================================================
function VueSalarie({session, pointages, chantiers, salaries, interimaires}) {
  const personne = salaries.find(s=>s.id===session.personneId) || interimaires.find(i=>i.id===session.personneId);
  const ag = personne && interimaires.find(i=>i.id===personne.id) ? AGENCES.find(a=>a.id===personne.agence) : null;
  const mesPtg = pointages.filter(p=>p.salarie===session.personneId).sort((a,b)=>b.date.localeCompare(a.date));

  const totalTout = mesPtg.reduce((s,p)=>s+calcHeures(p),0);

  // Semaine courante
  const semaine = (() => {
    const d=new Date(), day=d.getDay()||7;
    const lundi=new Date(d); lundi.setDate(d.getDate()-day+1);
    return Array.from({length:5},(_,i)=>{const x=new Date(lundi);x.setDate(lundi.getDate()+i);return x.toISOString().slice(0,10);});
  })();
  const totalSem = mesPtg.filter(p=>semaine.includes(p.date)).reduce((s,p)=>s+calcHeures(p),0);
  const hSup = Math.max(0, totalSem - 35);

  const fmtDate = (iso) => new Date(iso+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"}).toUpperCase();

  if (!personne) return <div style={{padding:48,textAlign:"center",color:C.gris}}>Profil introuvable.</div>;

  return (
    <main style={{padding:"28px 32px",maxWidth:900,margin:"0 auto"}}>
      {/* En-tête personne */}
      <div style={{display:"flex",alignItems:"center",gap:20,padding:"24px",background:C.papier,border:`2px solid ${C.encre}`,marginBottom:24}}>
        <div style={{width:64,height:64,background:ag?ag.couleur:C.encre,color:ag?"#fff":C.jaune,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FT,fontWeight:800,fontSize:22,flexShrink:0}}>
          {initiales(personne.nom)}
        </div>
        <div style={{flex:1}}>
          <div style={{fontFamily:FT,fontSize:28,fontWeight:800,letterSpacing:"-0.02em"}}>{personne.nom}</div>
          <div style={{fontSize:12,color:C.gris,marginTop:4,display:"flex",alignItems:"center",gap:10}}>
            <span>{personne.poste}</span>
            {ag && <span style={{fontSize:10,padding:"2px 8px",fontWeight:700,color:"#fff",background:ag.couleur}}>{ag.nom}</span>}
          </div>
        </div>
        {/* KPI rapides */}
        <div style={{display:"flex",gap:24}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4}}>CETTE SEMAINE</div>
            <div style={{fontFamily:FT,fontSize:28,fontWeight:800}}>{fmtH(totalSem)}</div>
          </div>
          {hSup > 0 && <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4}}>H. SUP</div>
            <div style={{fontFamily:FT,fontSize:28,fontWeight:800,color:C.orange}}>+{fmtH(hSup)}</div>
          </div>}
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4}}>TOTAL</div>
            <div style={{fontFamily:FT,fontSize:28,fontWeight:800}}>{fmtH(totalTout)}</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4}}>JOURS</div>
            <div style={{fontFamily:FT,fontSize:28,fontWeight:800}}>{mesPtg.length}</div>
          </div>
        </div>
      </div>

      {/* Tableau de mes pointages */}
      <div style={{fontFamily:FM,fontSize:11,color:C.gris,letterSpacing:"0.2em",marginBottom:12}}>MES RAPPORTS D'HEURES</div>

      {mesPtg.length === 0
        ? <div style={{padding:"48px",textAlign:"center",background:C.papier,border:`1.5px dashed ${C.ligne}`,fontSize:14,color:C.gris}}>
            Aucun rapport d'heures enregistré pour le moment.
          </div>
        : <div style={{background:C.papier,border:`1.5px solid ${C.encre}`,overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr style={{background:C.fond}}>
                  {["Date","Chantier","Lieu","Début","Fin","Pause","Total","État"].map((h,i)=>(
                    <th key={h} style={{padding:"11px 16px",textAlign:i>2?"right":"left",fontSize:9,letterSpacing:"0.15em",color:C.gris,fontWeight:500,borderBottom:`1px solid ${C.ligne}`,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {mesPtg.map((p,idx)=>{
                  const ch = chantiers.find(c=>c.id===p.chantier);
                  const h = calcHeures(p);
                  const estAujourd = p.date === TODAY;
                  return (
                    <tr key={p.id} style={{borderBottom:`1px solid ${C.ligne}`,background:estAujourd?"#FFFDE7":idx%2===0?C.papier:"#F8F6F0"}}>
                      <td style={{padding:"12px 16px",whiteSpace:"nowrap"}}>
                        <div style={{fontWeight:estAujourd?700:500,fontSize:12}}>{fmtDate(p.date)}</div>
                        {estAujourd && <div style={{fontSize:10,color:C.vert,fontWeight:700,marginTop:2}}>AUJOURD'HUI</div>}
                      </td>
                      <td style={{padding:"12px 16px"}}>
                        {ch
                          ? <span style={{fontSize:11,padding:"3px 8px",fontWeight:700,background:ch.couleur,color:ch.couleur==="#F5C518"?"#0A0A0A":"#fff"}}>{ch.nom}</span>
                          : <span style={{color:C.gris}}>—</span>}
                      </td>
                      <td style={{padding:"12px 16px",fontSize:11,color:C.gris}}>{ch?`📍 ${ch.ville}`:"—"}</td>
                      <td style={{padding:"12px 16px",textAlign:"right",fontWeight:500}}>{p.debut}</td>
                      <td style={{padding:"12px 16px",textAlign:"right",fontWeight:500}}>{p.fin}</td>
                      <td style={{padding:"12px 16px",textAlign:"right",color:C.gris}}>{p.pause}min</td>
                      <td style={{padding:"12px 16px",textAlign:"right"}}>
                        <b style={{fontFamily:FT,fontSize:16}}>{fmtH(h)}</b>
                      </td>
                      <td style={{padding:"12px 16px",textAlign:"right"}}>
                        {p.valide
                          ? <span style={{fontSize:10,color:C.vert,fontWeight:700}}>✓ VALIDÉ</span>
                          : <span style={{fontSize:10,color:C.orange,fontWeight:700}}>⏳ EN ATTENTE</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr style={{borderTop:`2px solid ${C.encre}`,background:C.fond}}>
                  <td colSpan={6} style={{padding:"12px 16px",fontWeight:700,fontSize:11,letterSpacing:"0.05em"}}>TOTAL</td>
                  <td style={{padding:"12px 16px",textAlign:"right"}}><b style={{fontFamily:FT,fontSize:20,fontWeight:800}}>{fmtH(totalTout)}</b></td>
                  <td></td>
                </tr>
              </tfoot>
            </table>
          </div>
      }

      <div style={{marginTop:16,padding:"12px 16px",background:"#FFF8E1",border:`1px solid ${C.ligne}`,fontSize:11,color:C.gris,lineHeight:1.6}}>
        🔒 Vous consultez uniquement vos propres heures. Pour toute modification, contactez la RH.
      </div>
    </main>
  );
}
