// ============================================================
//  SUPABASE CONFIG — remplacez ces valeurs dans l'onglet Paramètres
//  ou directement ici pour un déploiement fixe
// ============================================================
const _SB_URL  = "";   // ex: "https://xxxx.supabase.co"
const _SB_KEY  = "";   // clé anon publique

function getSbClient() {
  const url = localStorage.getItem("chok_sb_url")  || _SB_URL;
  const key = localStorage.getItem("chok_sb_key")  || _SB_KEY;
  if (url && key && typeof supabase !== "undefined") {
    try { return supabase.createClient(url, key); } catch(e) { return null; }
  }
  return null;
}

// sb est recréé à chaque opération pour tenir compte des changements de config
const getSb = () => getSbClient();

// ============================================================
//  PERSISTANCE localStorage
// ============================================================
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}
function usePersist(key, init) {
  const [val, setVal] = useState(() => load(key, init));
  const setter = (v) => {
    const next = typeof v === "function" ? v(val) : v;
    setVal(next); save(key, next);
  };
  return [val, setter];
}

// ============================================================
//  SYNC SUPABASE — upsert + delete différentiel
// ============================================================
async function sbSync(table, newData, prevData = []) {
  const sb = getSb(); if (!sb) return;
  try {
    const newIds = new Set(newData.map(x => x.id));
    const delIds = prevData.map(x => x.id).filter(id => !newIds.has(id));
    if (delIds.length) await sb.from(table).delete().in('id', delIds);
    if (newData.length) await sb.from(table).upsert(newData, { onConflict: 'id' });
  } catch(e) { console.warn('Supabase sync:', table, e.message); }
}

async function sbLoad(table, lsKey, fallback = []) {
  const sb = getSb(); if (!sb) return load(lsKey, fallback);
  try {
    const { data, error } = await sb.from(table).select('*');
    if (!error && data) { save(lsKey, data); return data; }
  } catch {}
  return load(lsKey, fallback);
}

const calcHeures = (p) => {
  const [h1,m1] = p.debut.split(":").map(Number);
  const [h2,m2] = p.fin.split(":").map(Number);
  const min = (h2*60+m2)-(h1*60+m1)-(p.pause||0);
  return Math.max(0, Math.round((min/60)*100)/100);
};
const calcHSupSemaine = (ptgs) => {
  const total = ptgs.reduce((s,p)=>s+calcHeures(p),0);
  return Math.max(0, Math.round((total-35)*100)/100);
};
const calcHNuit = (p) => {
  const [h2,m2] = p.fin.split(":").map(Number);
  const finMin = h2*60+m2, seuil = 20*60;
  if (finMin <= seuil) return 0;
  return Math.min(Math.round(((finMin-seuil)/60)*100)/100, calcHeures(p));
};

function infoSemaine(iso) {
  const d = new Date(iso + "T00:00:00");
  const j = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = j.getUTCDay() || 7;
  j.setUTCDate(j.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(j.getUTCFullYear(), 0, 1));
  const numSem = Math.ceil((((j - yearStart) / 86400000) + 1) / 7);
  const annee = j.getUTCFullYear();
  const sem = String(numSem).padStart(2, "0");
  const lundiD = new Date(iso + "T00:00:00");
  lundiD.setDate(lundiD.getDate() - (lundiD.getDay() || 7) + 1);
  const vendrediD = new Date(lundiD); vendrediD.setDate(lundiD.getDate() + 4);
  const fmt = (x) => x.toLocaleDateString("fr-FR", {day:"numeric", month:"short"});
  return {
    annee, semaine: numSem, cle: `${annee}-S${sem}`,
    label: `S${sem} — ${fmt(lundiD)} au ${fmt(vendrediD)} ${annee}`,
    labelCourt: `S${sem}`, moisNum: lundiD.getMonth() + 1,
    moisLabel: lundiD.toLocaleDateString("fr-FR", {month:"long", year:"numeric"}),
    lundi: lundiD.toISOString().slice(0,10), vendredi: vendrediD.toISOString().slice(0,10),
  };
}

  const map = {};

}

function App() {

  const [interimaires, setInterimairesRaw] = useState(() => load("chok_interimaires", []));
  const [chantiers,    setChantiersRaw]    = useState(() => load("chok_chantiers", []));
  const [pointages,    setPointagesRaw]    = useState(() => load("chok_pointages", []));
  const [absences,     setAbsencesRaw]     = useState(() => load("chok_absences", []));
  const [appLoading,   setAppLoading]      = useState(false);
  const [syncState,    setSyncState]       = useState("idle"); // idle|syncing|ok|err

  // Refs pour accès courant sans recapture dans les callbacks
  const refs = {
    salaries:     useRef(salaries),
    interimaires: useRef(interimaires),
    chantiers:    useRef(chantiers),
    pointages:    useRef(pointages),
    absences:     useRef(absences),
  };
  useEffect(() => { refs.salaries.current     = salaries; },     [salaries]);
  useEffect(() => { refs.interimaires.current = interimaires; }, [interimaires]);
  useEffect(() => { refs.chantiers.current    = chantiers; },    [chantiers]);
  useEffect(() => { refs.pointages.current    = pointages; },    [pointages]);
  useEffect(() => { refs.absences.current     = absences; },     [absences]);

  // Chargement initial depuis Supabase
  const chargerDepuisSupabase = useCallback(async () => {
    const sb = getSb(); if (!sb) return;
    setAppLoading(true); setSyncState("syncing");
    try {
      const [s,i,c,p,a] = await Promise.all([
        sb.from("salaries").select("*"),
        sb.from("interimaires").select("*"),
        sb.from("chantiers").select("*"),
        sb.from("pointages").select("*"),
        sb.from("absences").select("*"),
      ]);
      if (!s.error) { setSalariesRaw(s.data);     save("chok_salaries",     s.data); }
      if (!i.error) { setInterimairesRaw(i.data); save("chok_interimaires", i.data); }
      if (!c.error) { setChantiersRaw(c.data);    save("chok_chantiers",    c.data); }
      if (!p.error) { setPointagesRaw(p.data);    save("chok_pointages",    p.data); }
      if (!a.error) { setAbsencesRaw(a.data);     save("chok_absences",     a.data); }
      setSyncState("ok");
    } catch(e) { setSyncState("err"); }
    finally { setAppLoading(false); }
  }, []);

  useEffect(() => { chargerDepuisSupabase(); }, []);

  // Factory de setter synchronisé
  function makeSetter(rawSetter, ref, lsKey, table) {
    return (v) => {
      const prev = ref.current;
      const next = typeof v === "function" ? v(prev) : v;
      ref.current = next;
      rawSetter(next);
      save(lsKey, next);
      setSyncState("syncing");
      sbSync(table, next, prev)
        .then(() => setSyncState("ok"))
        .catch(() => setSyncState("err"));
    };
  }

  const setSalaries     = makeSetter(setSalariesRaw,     refs.salaries,     "chok_salaries",     "salaries");
  const setInterimaires = makeSetter(setInterimairesRaw, refs.interimaires, "chok_interimaires", "interimaires");
  const setChantiers    = makeSetter(setChantiersRaw,    refs.chantiers,    "chok_chantiers",    "chantiers");
  const setPointages    = makeSetter(setPointagesRaw,    refs.pointages,    "chok_pointages",    "pointages");
  const setAbsences     = makeSetter(setAbsencesRaw,     refs.absences,     "chok_absences",     "absences");

  const [session, setSession] = useState(null);
  const seDeconnecter = () => setSession(null);

  const donnees = {
    salaries, setSalaries, interimaires, setInterimaires,
    chantiers, setChantiers, pointages, setPointages, absences, setAbsences,
  };

  const chargerDemo = () => {
    const sb = getSb();
    setSalaries(DEMO.salaries);
    setInterimaires(DEMO.interimaires);
    setChantiers(DEMO.chantiers);
    if (sb) {
      sbSync("salaries",     DEMO.salaries,     []);
      sbSync("interimaires", DEMO.interimaires, []);
      sbSync("chantiers",    DEMO.chantiers,    []);
    }
  };

  if (!session) return (
    <EcranConnexion
      salaries={salaries} interimaires={interimaires}
      pinRH={pinRH} pinChef={pinChef}
      onConnexion={setSession}
    />
  );

  return (
    <div>
      <Header session={session} onDeconnexion={seDeconnecter} syncState={syncState} sbActive={!!getSb()}/>
      {session.role === "rh"      && <VueAdmin {...donnees} pinRH={pinRH} setPinRH={setPinRH} pinChef={pinChef} setPinChef={setPinChef} onChargerDemo={chargerDemo} onReloadSupabase={chargerDepuisSupabase}/>}
      {session.role === "chef"    && <VueMobile {...donnees}/>}
      {session.role === "salarie" && <VueSalarie session={session} pointages={pointages} absences={absences} chantiers={chantiers} salaries={salaries} interimaires={interimaires}/>}
      <Footer/>
    </div>
  );
}

              <div><div>SALARIÉ / INTÉRIMAIRE</div><div style={{fontSize:10,fontWeight:400,color:C.gris,marginTop:3}}>Consulter mes propres heures</div></div>
            </button>
          </div>
        </div>
      )}
      {mode==="rh" && (
        <div style={{width:"100%",maxWidth:360}}>
          <div style={{fontFamily:FM,fontSize:11,color:C.gris,letterSpacing:"0.2em",textAlign:"center",marginBottom:20}}>CODE RH / ADMIN</div>
          <PinPad pin={pin} setPin={setPin} onValider={()=>validerPin(pinRH,"rh")} erreur={erreur} setErreur={setErreur}/>
          <button onClick={reset} style={{width:"100%",marginTop:12,padding:"12px",background:"transparent",border:`1px solid ${C.ligne}`,fontFamily:FM,fontSize:11,color:C.gris,cursor:"pointer"}}>← Retour</button>
        </div>
      )}
      {mode==="chef" && (
        <div style={{width:"100%",maxWidth:360}}>
          <div style={{fontFamily:FM,fontSize:11,color:C.gris,letterSpacing:"0.2em",textAlign:"center",marginBottom:20}}>CODE CHEF D'ÉQUIPE</div>
          <PinPad pin={pin} setPin={setPin} onValider={()=>validerPin(pinChef,"chef")} erreur={erreur} setErreur={setErreur}/>
          <button onClick={reset} style={{width:"100%",marginTop:12,padding:"12px",background:"transparent",border:`1px solid ${C.ligne}`,fontFamily:FM,fontSize:11,color:C.gris,cursor:"pointer"}}>← Retour</button>
        </div>
      )}
      {mode==="salarie" && (
        <div style={{width:"100%",maxWidth:360}}>
          <div style={{fontFamily:FM,fontSize:11,color:C.gris,letterSpacing:"0.2em",textAlign:"center",marginBottom:20}}>MON NOM</div>
          {toutesPersonnes.length===0
            ? <div style={{padding:"20px",background:"#FFF8E1",border:`1px solid ${C.ligne}`,fontSize:12,textAlign:"center",lineHeight:1.6}}>Aucun salarié enregistré.<br/>Demandez à la RH d'ajouter votre nom.</div>
            : <>
                <select value={personneId} onChange={e=>{setPersonneId(e.target.value);setErreur("");}} style={{width:"100%",padding:"16px",background:C.papier,border:`2px solid ${C.encre}`,fontFamily:FM,fontSize:14,outline:"none",marginBottom:12}}>
                  <option value="" disabled>— Sélectionnez votre nom —</option>
                  {salaries.length>0 && <optgroup label="── Salariés CHOK BÉTON">{salaries.map(s=><option key={s.id} value={s.id}>{s.nom}</option>)}</optgroup>}
                  {interimaires.length>0 && <optgroup label="── Intérimaires">{interimaires.map(i=>{const ag=AGENCES.find(a=>a.id===i.agence);return <option key={i.id} value={i.id}>{i.nom} ({ag?.nom})</option>;})}</optgroup>}
                </select>
                {erreur && <div style={{padding:"8px 12px",background:"#FFF0F0",border:`1px solid ${C.orange}`,color:C.orange,fontSize:12,marginBottom:12}}>{erreur}</div>}
                <button onClick={validerSalarie} style={{width:"100%",padding:"16px",background:C.encre,border:"none",color:C.jaune,fontFamily:FM,fontSize:13,fontWeight:700,letterSpacing:"0.1em",cursor:"pointer"}}>ACCÉDER À MES HEURES →</button>
              </>
          }
          <button onClick={reset} style={{width:"100%",marginTop:12,padding:"12px",background:"transparent",border:`1px solid ${C.ligne}`,fontFamily:FM,fontSize:11,color:C.gris,cursor:"pointer"}}>← Retour</button>
        </div>
      )}
    </div>
  );
}

function PinPad({pin, setPin, onValider, erreur, setErreur}) {
  const ajouter = (c) => { if(pin.length>=6) return; setErreur(""); const n=pin+c; setPin(n); };
  const effacer = () => { setPin(pin.slice(0,-1)); setErreur(""); };
  return (
    <div>
      <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:20}}>
        {[0,1,2,3,4,5].map(i=>(
          <div key={i} style={{width:40,height:40,border:`2px solid ${pin.length>i?C.encre:C.ligne}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:700,background:pin.length>i?C.encre:C.papier,color:C.jaune}}>
            {pin.length>i?"●":""}
          </div>
        ))}
      </div>
      {erreur && <div style={{padding:"8px 12px",background:"#FFF0F0",border:`1px solid ${C.orange}`,color:C.orange,fontSize:12,marginBottom:12,textAlign:"center"}}>{erreur}</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>
        {["1","2","3","4","5","6","7","8","9"].map(c=>(
          <button key={c} onClick={()=>ajouter(c)} style={{padding:"18px",fontFamily:FT,fontSize:22,fontWeight:700,background:C.papier,border:`1.5px solid ${C.ligne}`,cursor:"pointer"}}>{c}</button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
        <button onClick={effacer} style={{padding:"18px",fontFamily:FM,fontSize:12,fontWeight:700,background:"transparent",border:`1.5px solid ${C.ligne}`,cursor:"pointer",color:C.gris}}>⌫</button>
        <button onClick={()=>ajouter("0")} style={{padding:"18px",fontFamily:FT,fontSize:22,fontWeight:700,background:C.papier,border:`1.5px solid ${C.ligne}`,cursor:"pointer"}}>0</button>
        <button onClick={onValider} style={{padding:"18px",fontFamily:FM,fontSize:12,fontWeight:700,background:C.encre,border:"none",color:C.jaune,cursor:"pointer"}}>OK ✓</button>
      </div>
    </div>
  );
}

function VueAdmin({pointages,setPointages,chantiers,setChantiers,salaries,setSalaries,interimaires,setInterimaires,absences,setAbsences,pinRH,setPinRH,pinChef,setPinChef,onChargerDemo,onReloadSupabase}) {
  const [onglet, setOnglet] = useState("pointages");
  const auj = pointages.filter(p=>p.date===TODAY);
  const totalH = auj.reduce((s,p)=>s+calcHeures(p),0);
  const aValider = auj.filter(p=>!p.valide).length;
  const intJour = [...new Set(auj.filter(p=>p.interim).map(p=>p.salarie))].length;
  const semaineCourante = (() => {
    const d=new Date(), day=d.getDay()||7;
    const lundi=new Date(d); lundi.setDate(d.getDate()-day+1);
    return Array.from({length:7},(_,i)=>{const x=new Date(lundi);x.setDate(lundi.getDate()+i);return x.toISOString().slice(0,10);});
  })();
  const ptgSemaine = pointages.filter(p=>semaineCourante.includes(p.date));
  const intSemaine = [...new Set(ptgSemaine.filter(p=>p.interim).map(p=>p.salarie))].length;
  const trouver = (id) => salaries.find(s=>s.id===id)||interimaires.find(i=>i.id===id);
  const valider = (id) => setPointages(pointages.map(p=>p.id===id?{...p,valide:true}:p));
  const validerTout = () => setPointages(pointages.map(p=>p.date===TODAY?{...p,valide:true}:p));
  const supprPointage = (id) => setPointages(pointages.filter(p=>p.id!==id));
  const tabs = [
    ["pointages","Pointages"],["absences","Absences / Congés"],["salaries","Salariés"],
    ["interim","Intérimaires"],["chantiers","Chantiers"],["paie","Rapport"],
    ["archives","Archives 📁"],["parametres","⚙ Paramètres"],
  ];
  return (
    <main style={{padding:"28px 32px",maxWidth:1500,margin:"0 auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",paddingBottom:20,borderBottom:`1px solid ${C.ligne}`,marginBottom:24,flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontSize:11,color:C.gris,letterSpacing:"0.2em",marginBottom:6}}>JOURNÉE EN COURS</div>
          <div style={{fontFamily:FT,fontSize:32,fontWeight:800,letterSpacing:"-0.02em"}}>{dateFr()}</div>
        </div>
        <div style={{display:"flex",gap:10}}>
          {getSb() && <Btn variant="ghost" onClick={onReloadSupabase}>↻ Sync Supabase</Btn>}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:14,marginBottom:28}}>
        <Kpi label="Pointages du jour" val={auj.length} sub="entrées aujourd'hui" accent={C.jaune}/>
        <Kpi label="Heures totales" val={fmtH(totalH)} sub={`${chantiers.filter(c=>c.actif).length} chantier(s) actif(s)`} accent="#3D5A80"/>
        <Kpi label="Salariés" val={salaries.length} sub="CHOK BÉTON enregistrés" accent={C.vert}/>
        <Kpi label="Intérimaires / jour" val={intJour} sub="personnes différentes auj." accent={C.bleu}/>
        <Kpi label="Intérimaires / sem." val={intSemaine} sub="personnes cette semaine" accent="#6C3483"/>
        <Kpi label="À valider" val={aValider} sub="pointages en attente RH" accent={C.encre} alert={aValider>0}/>
      </div>
      <div className="admin-tabs">
        {tabs.map(([k,l])=>(
          <button key={k} onClick={()=>setOnglet(k)} style={{fontFamily:FM,fontSize:12,fontWeight:onglet===k?700:500,padding:"12px 20px",background:"transparent",border:"none",cursor:"pointer",letterSpacing:"0.1em",color:onglet===k?C.encre:C.gris,borderBottom:onglet===k?`3px solid ${C.jaune}`:"3px solid transparent",marginBottom:-2,whiteSpace:"nowrap"}}>
            {l.toUpperCase()}
          </button>
        ))}
      </div>
      {onglet==="pointages"  && <OngletPointages auj={auj} pointagesTous={pointages} setPointages={setPointages} chantiers={chantiers} salaries={salaries} interimaires={interimaires} trouver={trouver} aValider={aValider} valider={valider} validerTout={validerTout} supprPointage={supprPointage}/>}
      {onglet==="absences"   && <OngletAbsences absences={absences} setAbsences={setAbsences} salaries={salaries} interimaires={interimaires} pointages={pointages}/>}
      {onglet==="salaries"   && <OngletSalaries salaries={salaries} setSalaries={setSalaries} pointages={pointages}/>}
      {onglet==="interim"    && <OngletInterim interimaires={interimaires} setInterimaires={setInterimaires} pointages={pointages} chantiers={chantiers}/>}
      {onglet==="chantiers"  && <OngletChantiers chantiers={chantiers} setChantiers={setChantiers} pointages={pointages}/>}
      {onglet==="paie"       && <OngletPaie pointages={pointages} absences={absences} salaries={salaries} interimaires={interimaires} chantiers={chantiers}/>}
      {onglet==="archives"   && <OngletArchives pointages={pointages} absences={absences} salaries={salaries} interimaires={interimaires} chantiers={chantiers}/>}
      {onglet==="parametres" && <OngletParametres pinRH={pinRH} setPinRH={setPinRH} pinChef={pinChef} setPinChef={setPinChef} onChargerDemo={onChargerDemo}/>}
    </main>
  );
}

// ---- Onglet Pointages (inchangé dans la logique, même rendu) ----
function OngletPointages({auj,pointagesTous,setPointages,chantiers,salaries,interimaires,trouver,aValider,valider,validerTout,supprPointage}) {
  const [filtre,setFiltre]     = useState("tous");
  const [editId,setEditId]     = useState(null);
  const [editData,setEditData] = useState({});
  const liste = filtre==="tous" ? auj : auj.filter(p=>p.chantier===filtre);
  const alertesJour = auj.filter(p=>calcHeures(p)>10).map(p=>({id:p.id,niveau:"danger",msg:`${trouver(p.salarie)?.nom||p.salarie} — ${fmtH(calcHeures(p))}/jour (max légal : 10h)`}));
  const semaineCourante = (() => {
    const d=new Date(), day=d.getDay()||7;
    const lundi=new Date(d); lundi.setDate(d.getDate()-day+1);
    return Array.from({length:7},(_,i)=>{const x=new Date(lundi);x.setDate(lundi.getDate()+i);return x.toISOString().slice(0,10);});
  })();
  const ptgSem = pointagesTous.filter(p=>semaineCourante.includes(p.date));
  const personnesSem = [...new Set(ptgSem.map(p=>p.salarie))];
  const alertesSemaine = personnesSem.flatMap(id=>{
    const total=ptgSem.filter(p=>p.salarie===id).reduce((s,p)=>s+calcHeures(p),0);
    if(total>48) return [{id,niveau:"danger",msg:`${trouver(id)?.nom||id} — ${fmtH(total)}/semaine (max légal absolu : 48h)`}];
    if(total>44) return [{id,niveau:"warn",msg:`${trouver(id)?.nom||id} — ${fmtH(total)}/semaine (seuil d'alerte : 44h)`}];
    return [];
  });
  const toutesAlertes=[...alertesJour,...alertesSemaine];
  const ouvrirEdit=(p)=>{setEditId(p.id);setEditData({debut:p.debut,fin:p.fin,pause:p.pause,chantier:p.chantier,commentaire:p.commentaire||""});};
  const annulerEdit=()=>{setEditId(null);setEditData({});};
  const sauvegarderEdit=(id)=>{
    setPointages(pointagesTous.map(p=>p.id===id?{...p,...editData,modifiePar:"RH",modifieLe:new Date().toISOString()}:p));
    setEditId(null);setEditData({});
  };
  const iStyle={padding:"6px 8px",background:C.papier,border:`1.5px solid ${C.encre}`,fontFamily:FM,fontSize:12,outline:"none",width:"100%",boxSizing:"border-box"};
  return (
    <Section titre="Pointages du jour" actions={
      <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
        <select value={filtre} onChange={e=>setFiltre(e.target.value)} style={selectStyle}>
          <option value="tous">Tous les chantiers</option>
          {chantiers.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}
        </select>
        {aValider>0 && <Btn onClick={validerTout}>✓ TOUT VALIDER ({aValider})</Btn>}
      </div>
    }>
      {toutesAlertes.length>0 && (
        <div style={{marginBottom:16}}>
          {toutesAlertes.map((a,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",marginBottom:6,background:a.niveau==="danger"?"#FFF0F0":"#FFF8E1",border:`1.5px solid ${a.niveau==="danger"?C.orange:"#F39C12"}`}}>
              <span style={{fontSize:18}}>{a.niveau==="danger"?"🔴":"🟠"}</span>
              <div>
                <div style={{fontFamily:FM,fontSize:11,fontWeight:700,color:a.niveau==="danger"?C.orange:"#B7770D"}}>{a.niveau==="danger"?"DÉPASSEMENT LÉGAL":"SEUIL D'ALERTE"}</div>
                <div style={{fontSize:12,color:C.encre,marginTop:2}}>{a.msg}</div>
              </div>
            </div>
          ))}
        </div>
      )}
      {liste.length===0
        ? <EmptyState>Aucun pointage aujourd'hui.<br/><small style={{color:C.gris}}>Les rapports arrivent depuis l'onglet Chef d'équipe.</small></EmptyState>
        : <TableWrap>
            <thead><tr>
              <Th>Date</Th><Th>Personne</Th><Th>Statut</Th><Th>Chantier</Th>
              <Th r>Début</Th><Th r>Fin</Th><Th r>Pause</Th><Th r>Total</Th><Th r>H.Nuit</Th>
              <Th>Commentaire</Th><Th>Val. intérimaire</Th><Th>État RH</Th><Th></Th>
            </tr></thead>
            <tbody>
              {liste.map(p=>{
                const pers=trouver(p.salarie); const ch=chantiers.find(c=>c.id===p.chantier);
                const ag=p.interim?AGENCES.find(a=>a.id===pers?.agence):null;
                const dateCourte=p.date?new Date(p.date+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}):"—";
                const hTot=calcHeures(p); const hNuit=calcHNuit(p); const alerte=hTot>10?"danger":null;
                const enEdition=editId===p.id;
                const dispDebut=enEdition?editData.debut:p.debut; const dispFin=enEdition?editData.fin:p.fin;
                const dispPause=enEdition?editData.pause:p.pause; const dispChant=enEdition?chantiers.find(c=>c.id===editData.chantier):ch;
                const hEdit=enEdition?calcHeures({...p,...editData}):hTot;
                return (
                  <tr key={p.id} style={{borderBottom:`1px solid ${C.ligne}`,background:alerte?"#FFF8F8":enEdition?"#FFFDE7":"transparent"}}>
                    <Td><span style={{fontSize:11,fontWeight:500}}>{dateCourte}</span>{alerte&&<div style={{fontSize:9,color:C.orange,fontWeight:700,marginTop:2}}>⚠ &gt;10h</div>}{p.modifiePar&&<div style={{fontSize:9,color:C.gris,marginTop:2}}>✎ Modifié RH</div>}</Td>
                    <Td><b style={{fontSize:13}}>{pers?.nom||p.salarie}</b><br/><span style={{fontSize:11,color:C.gris}}>{pers?.poste||"—"}{p.chefNom?` · Chef: ${p.chefNom}`:""}</span></Td>
                    <Td>{p.interim?<span style={{fontSize:10,padding:"3px 8px",color:"#fff",fontWeight:700,background:ag?.couleur}}>{ag?.nom||"INTÉRIM"}</span>:<span style={{fontSize:10,padding:"3px 8px",fontWeight:700,border:`1px solid ${C.encre}`}}>INTERNE</span>}</Td>
                    <Td>{enEdition?<select value={editData.chantier} onChange={e=>setEditData({...editData,chantier:e.target.value})} style={{...iStyle,width:160}}>{chantiers.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}</select>:dispChant?<span style={{fontSize:11,padding:"3px 8px",fontWeight:700,background:dispChant.couleur,color:dispChant.couleur==="#F5C518"?"#0A0A0A":"#fff"}}>{dispChant.nom}</span>:"—"}</Td>
                    <Td r>{enEdition?<input type="time" value={editData.debut} onChange={e=>setEditData({...editData,debut:e.target.value})} style={{...iStyle,width:90,textAlign:"center"}}/>:dispDebut}</Td>
                    <Td r>{enEdition?<input type="time" value={editData.fin} onChange={e=>setEditData({...editData,fin:e.target.value})} style={{...iStyle,width:90,textAlign:"center"}}/>:dispFin}</Td>
                    <Td r>{enEdition?<input type="number" value={editData.pause} onChange={e=>setEditData({...editData,pause:parseInt(e.target.value)||0})} style={{...iStyle,width:70,textAlign:"center"}}/>:`${dispPause}min`}</Td>
                    <Td r><b style={{color:hEdit>10?C.orange:"inherit"}}>{fmtH(enEdition?hEdit:hTot)}</b>{enEdition&&hEdit>10&&<div style={{fontSize:9,color:C.orange,fontWeight:700}}>⚠ MAX 10h</div>}</Td>
                    <Td r>{hNuit>0?<span style={{color:"#6C3483",fontWeight:700,fontSize:11}}>{fmtH(hNuit)}</span>:<span style={{color:C.ligne}}>—</span>}</Td>
                    <Td>{enEdition?<textarea value={editData.commentaire||""} onChange={e=>setEditData({...editData,commentaire:e.target.value})} rows={2} style={{...iStyle,width:160,resize:"vertical",fontSize:11}}/>:p.commentaire?<span style={{fontSize:10,color:"#6C3483",fontStyle:"italic"}}>💬 {p.commentaire}</span>:<span style={{color:C.ligne,fontSize:10}}>—</span>}</Td>
                    <Td>{p.interim===true?p.valideParInterimaire?<span style={{color:C.vert,fontSize:10,fontWeight:700}}>✓ ACCEPTÉ</span>:<span style={{color:C.orange,fontSize:10,fontWeight:700}}>⏳ EN ATTENTE</span>:<span style={{color:C.gris,fontSize:10}}>—</span>}</Td>
                    <Td>{p.valide?<span style={{color:C.vert,fontSize:11,fontWeight:700}}>● VALIDÉ RH</span>:<span style={{color:C.orange,fontSize:11,fontWeight:700}}>● ATTENTE RH</span>}</Td>
                    <Td>{enEdition?<div style={{display:"flex",gap:6,flexDirection:"column"}}><Btn variant="mini" onClick={()=>sauvegarderEdit(p.id)}>✓ SAUVER</Btn><Btn variant="ghost" onClick={annulerEdit}>ANNULER</Btn></div>:<div style={{display:"flex",gap:6}}><Btn variant="ghost" onClick={()=>ouvrirEdit(p)}>✎</Btn>{!p.valide&&<Btn variant="mini" onClick={()=>valider(p.id)}>✓</Btn>}<Btn variant="danger-mini" onClick={()=>supprPointage(p.id)}>✕</Btn></div>}</Td>
                  </tr>
                );
              })}
            </tbody>
          </TableWrap>
      }
      <div style={{marginTop:12,fontSize:11,color:C.gris,display:"flex",gap:20,flexWrap:"wrap"}}>
        <span>🔴 Dépassement légal absolu (&gt;10h/j ou &gt;48h/sem)</span>
        <span>🟠 Seuil d'alerte (&gt;44h/sem)</span>
      </div>
    </Section>
  );
}

// ---- Onglet Absences ----
function OngletAbsences({absences,setAbsences,salaries,interimaires,pointages}) {
  const [open,setOpen]=useState(false); const [personneId,setPersonneId]=useState(""); const [dateDebut,setDateDebut]=useState(TODAY); const [dateFin,setDateFin]=useState(TODAY); const [type,setType]=useState(TYPES_ABSENCE[0].code); const [commentaire,setCommentaire]=useState(""); const [err,setErr]=useState(""); const [filtreType,setFiltreType]=useState("tous"); const [filtrePersonne,setFiltrePersonne]=useState("tous");
  const tousPersonnes=[...salaries.map(s=>({...s,_type:"interne"})),...interimaires.map(i=>({...i,_type:"interim"}))];
  const nbJoursOuvres=(d1,d2)=>{let count=0;const cur=new Date(d1+"T00:00:00");const fin=new Date(d2+"T00:00:00");while(cur<=fin){const j=cur.getDay();if(j!==0&&j!==6)count++;cur.setDate(cur.getDate()+1);}return count;};
  const ajouter=()=>{
    if(!personneId){setErr("Sélectionnez une personne.");return;}
    if(dateDebut>dateFin){setErr("La date de fin doit être après la date de début.");return;}
    const ti=TYPES_ABSENCE.find(t=>t.code===type);
    setAbsences([...absences,{id:genId("A"),salarie:personneId,dateDebut,dateFin,type,typeLabel:ti.label,typeIcone:ti.icone,commentaire:commentaire.trim(),saisieParRH:true,saisieDate:new Date().toISOString()}]);
    setPersonneId("");setDateDebut(TODAY);setDateFin(TODAY);setType(TYPES_ABSENCE[0].code);setCommentaire("");setOpen(false);setErr("");
  };
  const supprimer=(id)=>{if(!window.confirm("Supprimer cette absence ?"))return;setAbsences(absences.filter(a=>a.id!==id));};
  const getNom=(id)=>tousPersonnes.find(p=>p.id===id)?.nom||id;
  const getType=(code)=>TYPES_ABSENCE.find(t=>t.code===code);
  const listeFiltree=absences.filter(a=>filtreType==="tous"||a.type===filtreType).filter(a=>filtrePersonne==="tous"||a.salarie===filtrePersonne).sort((a,b)=>b.dateDebut.localeCompare(a.dateDebut));
  const statParType=TYPES_ABSENCE.map(t=>({...t,nb:absences.filter(a=>a.type===t.code).length,jours:absences.filter(a=>a.type===t.code).reduce((s,a)=>s+nbJoursOuvres(a.dateDebut,a.dateFin),0)})).filter(t=>t.nb>0);
  const fmtDate=(iso)=>new Date(iso+"T00:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"});
  return (
    <Section titre={`Absences & Congés — ${absences.length} entrée(s)`} actions={<Btn onClick={()=>{setOpen(!open);setErr("");}}>{open?"✕ Annuler":"+ SAISIR UNE ABSENCE"}</Btn>}>
      {open&&<FormInline>
        <div style={{fontFamily:FM,fontSize:10,letterSpacing:"0.2em",color:C.gris,fontWeight:700,marginBottom:12}}>NOUVELLE ABSENCE / CONGÉ</div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end",marginBottom:12}}>
          <Champ label="PERSONNE"><select value={personneId} onChange={e=>{setPersonneId(e.target.value);setErr("");}} style={selectStyle}><option value="" disabled>— Sélectionner —</option>{salaries.length>0&&<optgroup label="── Salariés CHOK BÉTON">{salaries.map(s=><option key={s.id} value={s.id}>{s.nom}</option>)}</optgroup>}{interimaires.length>0&&<optgroup label="── Intérimaires">{interimaires.map(i=><option key={i.id} value={i.id}>{i.nom}</option>)}</optgroup>}</select></Champ>
          <Champ label="TYPE D'ABSENCE"><select value={type} onChange={e=>setType(e.target.value)} style={selectStyle}>{TYPES_ABSENCE.map(t=><option key={t.code} value={t.code}>{t.icone} {t.label}</option>)}</select></Champ>
          <Champ label="DATE DÉBUT"><input type="date" value={dateDebut} onChange={e=>setDateDebut(e.target.value)} style={inputStyle}/></Champ>
          <Champ label="DATE FIN"><input type="date" value={dateFin} onChange={e=>setDateFin(e.target.value)} style={inputStyle}/></Champ>
          {dateDebut&&dateFin&&dateDebut<=dateFin&&<div style={{padding:"0 0 2px",fontSize:12,color:C.gris,alignSelf:"flex-end"}}>→ <b>{nbJoursOuvres(dateDebut,dateFin)}</b> j. ouvré(s)</div>}
        </div>
        <div style={{display:"flex",gap:12,alignItems:"flex-end"}}>
          <Champ label="COMMENTAIRE (OPTIONNEL)" style={{flex:1}}><input value={commentaire} onChange={e=>setCommentaire(e.target.value)} placeholder="Justificatif, remarque..." style={{...inputStyle,minWidth:300}}/></Champ>
          <Btn onClick={ajouter}>ENREGISTRER</Btn>
        </div>
        {err&&<ErrBox>{err}</ErrBox>}
      </FormInline>}
      {statParType.length>0&&<div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap"}}>{statParType.map(t=><div key={t.code} style={{padding:"10px 16px",background:C.papier,border:`1.5px solid ${t.couleur}`,display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:20}}>{t.icone}</span><div><div style={{fontSize:10,color:C.gris,letterSpacing:"0.1em",fontWeight:700}}>{t.label.toUpperCase()}</div><div style={{fontFamily:FT,fontSize:18,fontWeight:800,marginTop:2}}>{t.nb} <span style={{fontSize:12,fontWeight:400,color:C.gris}}>absent. · {t.jours}j ouvrés</span></div></div></div>)}</div>}
      {absences.length>0&&<div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}><select value={filtreType} onChange={e=>setFiltreType(e.target.value)} style={selectStyle}><option value="tous">Tous les types</option>{TYPES_ABSENCE.map(t=><option key={t.code} value={t.code}>{t.icone} {t.label}</option>)}</select><select value={filtrePersonne} onChange={e=>setFiltrePersonne(e.target.value)} style={selectStyle}><option value="tous">Toutes les personnes</option>{salaries.map(s=><option key={s.id} value={s.id}>{s.nom}</option>)}{interimaires.map(i=><option key={i.id} value={i.id}>{i.nom}</option>)}</select><span style={{fontSize:11,color:C.gris}}>{listeFiltree.length} résultat(s)</span></div>}
      {absences.length===0?<EmptyState>Aucune absence enregistrée.</EmptyState>:listeFiltree.length===0?<EmptyState>Aucun résultat.</EmptyState>:
        <TableWrap><thead><tr><Th>Personne</Th><Th>Type</Th><Th>Début</Th><Th>Fin</Th><Th r>Jours ouvrés</Th><Th>Commentaire</Th><Th>Saisi le</Th><Th></Th></tr></thead>
          <tbody>{listeFiltree.map(a=>{const ti=getType(a.type);const j=nbJoursOuvres(a.dateDebut,a.dateFin);const pers=tousPersonnes.find(p=>p.id===a.salarie);const ag=pers?._type==="interim"?AGENCES.find(x=>x.id===pers.agence):null;return(
            <tr key={a.id} style={{borderBottom:`1px solid ${C.ligne}`}}>
              <Td><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:28,height:28,background:ag?ag.couleur:C.encre,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0}}>{initiales(pers?.nom||a.salarie)}</div><div><div style={{fontWeight:600,fontSize:13}}>{pers?.nom||a.salarie}</div>{ag&&<div style={{fontSize:9,color:ag.couleur,fontWeight:700}}>{ag.nom}</div>}</div></div></Td>
              <Td><span style={{display:"inline-flex",alignItems:"center",gap:6,padding:"4px 10px",background:ti?.couleur+"22",border:`1px solid ${ti?.couleur}`,fontSize:11,fontWeight:700,color:ti?.couleur}}>{ti?.icone} {ti?.label}</span></Td>
              <Td>{fmtDate(a.dateDebut)}</Td><Td>{fmtDate(a.dateFin)}</Td>
              <Td r><b style={{fontFamily:FT,fontSize:16}}>{j}</b> <span style={{fontSize:10,color:C.gris}}>j.</span></Td>
              <Td>{a.commentaire?<span style={{fontSize:11,color:"#6C3483",fontStyle:"italic"}}>💬 {a.commentaire}</span>:<span style={{color:C.ligne}}>—</span>}</Td>
              <Td><span style={{fontSize:10,color:C.gris}}>{a.saisieDate?new Date(a.saisieDate).toLocaleDateString("fr-FR",{day:"numeric",month:"short"}):"—"}{a.saisieParRH&&<span style={{marginLeft:4,color:C.bleu,fontWeight:700}}>· RH</span>}</span></Td>
              <Td><Btn variant="danger" onClick={()=>supprimer(a.id)}>SUPPR.</Btn></Td>
            </tr>);})}</tbody>
        </TableWrap>}
      <div style={{marginTop:12,padding:"10px 14px",background:"#FFF8E1",border:`1px solid ${C.ligne}`,fontSize:11,color:C.gris,lineHeight:1.6}}>💡 Les absences apparaissent dans le rapport détaillé et les archives. Les jours ouvrés excluent samedis et dimanches.</div>
    </Section>
  );
}

// ---- Onglet Salariés — avec import en masse ----
function OngletSalaries({salaries,setSalaries,pointages}) {
  const [open,setOpen]           = useState(false);
  const [nom,setNom]             = useState("");
  const [poste,setPoste]         = useState(POSTES[0]);
  const [err,setErr]             = useState("");
  // Import en masse
  const [openImport,setOpenImport] = useState(false);
  const [texteImport,setTexteImport] = useState("");
  const [posteDefaut,setPosteDefaut] = useState("Manœuvre");
  const [previewImport,setPreviewImport] = useState(null);

  const ajouter=()=>{
    if(nom.trim().length<2){setErr("Nom trop court.");return;}
    if(salaries.some(s=>s.nom.toLowerCase()===nom.trim().toLowerCase())){setErr("Déjà enregistré.");return;}
    setSalaries([...salaries,{id:genId("S"),nom:nom.trim(),poste,equipe:"—",interne:true}]);
    setNom("");setPoste(POSTES[0]);setOpen(false);setErr("");
  };
  const supprimer=(id)=>{
    if(pointages.some(p=>p.salarie===id)&&!window.confirm("Ce salarié a des pointages. Supprimer quand même ?"))return;
    setSalaries(salaries.filter(s=>s.id!==id));
  };

  // Détection du poste depuis le texte
  const detecterPoste=(ligne)=>{
    const l=ligne.toLowerCase();
    if(l.includes(" ce ")||l.includes("chef")||l.endsWith(" ce")||l.includes("(ce)")||l.includes("chef d'équipe")) return "Chef d'équipe";
    if(l.includes(" man")||l.includes("manoeuvre")||l.includes("manœuvre")||l.includes("(man)")) return "Manœuvre";
    return posteDefaut;
  };
  const nettoyerNom=(ligne)=>{
    return ligne
      .replace(/\s*[\(\[]\s*(CE|chef|man|manoeuvre|manœuvre)[^\)\]]*[\)\]]\s*/gi,"")
      .replace(/\s+-\s+(CE|chef|man|manoeuvre|manœuvre)\s*$/gi,"")
      .replace(/\s+(CE|man)\s*$/gi,"")
      .trim();
  };

  const analyserImport=()=>{
    const lignes=texteImport.split("\n").map(l=>l.trim()).filter(l=>l.length>1);
    const preview=lignes.map(l=>({
      nom: nettoyerNom(l),
      poste: detecterPoste(l),
      doublon: salaries.some(s=>s.nom.toLowerCase()===nettoyerNom(l).toLowerCase()),
    })).filter(l=>l.nom.length>1);
    setPreviewImport(preview);
  };

  const confirmerImport=()=>{
    const nouveaux=previewImport.filter(l=>!l.doublon).map(l=>({id:genId("S"),nom:l.nom,poste:l.poste,equipe:"—",interne:true}));
    setSalaries([...salaries,...nouveaux]);
    setOpenImport(false); setTexteImport(""); setPreviewImport(null);
  };

  return (
    <Section titre={`Salariés CHOK BÉTON — ${salaries.length}`} actions={
      <div style={{display:"flex",gap:8}}>
        <Btn variant="ghost" onClick={()=>{setOpenImport(!openImport);setOpen(false);setPreviewImport(null);}}>
          {openImport?"✕ Annuler":"📋 IMPORTER UNE LISTE"}
        </Btn>
        <Btn onClick={()=>{setOpen(!open);setOpenImport(false);setErr("");}}>{open?"✕ Annuler":"+ AJOUTER"}</Btn>
      </div>
    }>

      {/* Ajout unitaire */}
      {open&&<FormInline>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
          <Champ label="NOM COMPLET"><input value={nom} onChange={e=>{setNom(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&ajouter()} placeholder="Prénom Nom" style={inputStyle}/></Champ>
          <Champ label="POSTE"><select value={poste} onChange={e=>setPoste(e.target.value)} style={selectStyle}>{POSTES.map(p=><option key={p}>{p}</option>)}</select></Champ>
          <Btn onClick={ajouter}>AJOUTER</Btn>
        </div>
        {err&&<ErrBox>{err}</ErrBox>}
      </FormInline>}

      {/* Import en masse */}
      {openImport&&<FormInline>
        <div style={{fontFamily:FM,fontSize:10,letterSpacing:"0.2em",color:C.gris,fontWeight:700,marginBottom:12}}>IMPORTER UNE LISTE DE SALARIÉS</div>
        <div style={{fontSize:12,color:C.gris,marginBottom:12,lineHeight:1.7}}>
          Collez les noms, un par ligne. Vous pouvez indiquer le poste après le nom :<br/>
          <code style={{background:C.fond,padding:"2px 6px",fontSize:11}}>Jean Dupont - CE</code> → Chef d'équipe &nbsp;|&nbsp;
          <code style={{background:C.fond,padding:"2px 6px",fontSize:11}}>Moussa Diallo</code> → poste par défaut
        </div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end",marginBottom:12}}>
          <Champ label="POSTE PAR DÉFAUT" style={{minWidth:200}}>
            <select value={posteDefaut} onChange={e=>setPosteDefaut(e.target.value)} style={selectStyle}>
              {POSTES.map(p=><option key={p}>{p}</option>)}
            </select>
          </Champ>
        </div>
        <textarea
          value={texteImport}
          onChange={e=>{setTexteImport(e.target.value);setPreviewImport(null);}}
          placeholder={"Martin Dubois - CE\nJean Bernard\nKarim Benali - Man\n..."}
          rows={8}
          style={{width:"100%",padding:"12px",background:C.fond,border:`1.5px solid ${C.encre}`,fontFamily:FM,fontSize:13,outline:"none",resize:"vertical",marginBottom:12}}
        />
        {!previewImport&&<Btn onClick={analyserImport} disabled={texteImport.trim().length<2}>ANALYSER ({texteImport.split("\n").filter(l=>l.trim().length>1).length} lignes)</Btn>}
        {previewImport&&(
          <div>
            <div style={{fontFamily:FM,fontSize:10,letterSpacing:"0.15em",color:C.gris,fontWeight:700,marginBottom:10}}>
              APERÇU — {previewImport.filter(l=>!l.doublon).length} à ajouter / {previewImport.filter(l=>l.doublon).length} doublon(s) ignoré(s)
            </div>
            <div style={{maxHeight:240,overflowY:"auto",border:`1px solid ${C.ligne}`,marginBottom:12}}>
              {previewImport.map((l,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 14px",borderBottom:`1px solid ${C.ligne}`,background:l.doublon?"#FFF8E1":C.papier,opacity:l.doublon?0.6:1}}>
                  <Avatar nom={l.nom}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:l.doublon?400:700}}>{l.nom}</div>
                    <div style={{fontSize:10,color:C.gris}}>{l.poste}</div>
                  </div>
                  {l.doublon?<span style={{fontSize:10,color:C.orange,fontWeight:700}}>DOUBLON</span>:<span style={{fontSize:10,color:C.vert,fontWeight:700}}>✓ NOUVEAU</span>}
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={confirmerImport} disabled={previewImport.filter(l=>!l.doublon).length===0}>
                ✓ IMPORTER {previewImport.filter(l=>!l.doublon).length} SALARIÉ(S)
              </Btn>
              <Btn variant="ghost" onClick={()=>setPreviewImport(null)}>Modifier</Btn>
            </div>
          </div>
        )}
      </FormInline>}

      {salaries.length===0
        ? <EmptyState>Aucun salarié. Cliquez sur "+ AJOUTER" ou "📋 IMPORTER UNE LISTE".</EmptyState>
        : <TableWrap>
            <thead><tr><Th>Nom</Th><Th>Poste</Th><Th>ID</Th><Th r>Jours pointés</Th><Th></Th></tr></thead>
            <tbody>{salaries.map(s=>{
              const jours=pointages.filter(p=>p.salarie===s.id).length;
              return <tr key={s.id} style={{borderBottom:`1px solid ${C.ligne}`}}>
                <Td><div style={{display:"flex",alignItems:"center",gap:10}}><Avatar nom={s.nom}/><b>{s.nom}</b></div></Td>
                <Td><span style={{fontSize:10,padding:"3px 8px",fontWeight:700,border:`1px solid ${C.encre}`}}>{s.poste}</span></Td>
                <Td><span style={{fontSize:10,padding:"3px 8px",color:C.gris,border:`1px solid ${C.ligne}`}}>{s.id}</span></Td>
                <Td r>{jours}</Td>
                <Td><Btn variant="danger" onClick={()=>supprimer(s.id)}>SUPPRIMER</Btn></Td>
              </tr>;
            })}</tbody>
          </TableWrap>
      }
    </Section>
  );
}

// ---- Onglet Intérimaires ----
function OngletInterim({interimaires,setInterimaires,pointages,chantiers}) {
  const [open,setOpen]=useState(false); const [nom,setNom]=useState(""); const [poste,setPoste]=useState("Manœuvre"); const [agence,setAgence]=useState(AGENCES[0].id); const [err,setErr]=useState("");
  const ajouter=()=>{
    if(nom.trim().length<2){setErr("Nom trop court.");return;}
    if(interimaires.some(i=>i.nom.toLowerCase()===nom.trim().toLowerCase())){setErr("Déjà enregistré.");return;}
    setInterimaires([...interimaires,{id:genId("I"),nom:nom.trim(),poste,agence,accesPlateforme:false}]);
    setNom("");setPoste("Manœuvre");setAgence(AGENCES[0].id);setOpen(false);setErr("");
  };
  const supprimer=(id)=>{
    if(pointages.some(p=>p.salarie===id)&&!window.confirm("Cet intérimaire a des pointages. Supprimer ?"))return;
    setInterimaires(interimaires.filter(i=>i.id!==id));
  };
  const stats=(id)=>{const ps=pointages.filter(p=>p.salarie===id);return{j:ps.length,h:ps.reduce((s,p)=>s+calcHeures(p),0)};};
  return (
    <Section titre={`Intérimaires — ${interimaires.length}`} actions={<Btn onClick={()=>{setOpen(!open);setErr("");}}>{open?"✕ Annuler":"+ AJOUTER UN INTÉRIMAIRE"}</Btn>}>

        <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
          <Champ label="NOM COMPLET"><input value={nom} onChange={e=>{setNom(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&ajouter()} placeholder="Prénom Nom" style={inputStyle}/></Champ>
          <Champ label="POSTE"><select value={poste} onChange={e=>setPoste(e.target.value)} style={selectStyle}>{POSTES.map(p=><option key={p}>{p}</option>)}</select></Champ>
          <Champ label="AGENCE"><select value={agence} onChange={e=>setAgence(e.target.value)} style={selectStyle}>{AGENCES.map(a=><option key={a.id} value={a.id}>{a.nom}</option>)}</select></Champ>
          <Btn onClick={ajouter}>AJOUTER</Btn>
        </div>
        {err&&<ErrBox>{err}</ErrBox>}
      </FormInline>}
      {interimaires.length===0?<EmptyState>Aucun intérimaire.</EmptyState>:
        <TableWrap><thead><tr><Th>Nom</Th><Th>Poste</Th><Th>Agence</Th><Th r>Jours</Th><Th r>Heures</Th><Th></Th></tr></thead>
          <tbody>{interimaires.map(i=>{const ag=AGENCES.find(a=>a.id===i.agence);const s=stats(i.id);return(
            <tr key={i.id} style={{borderBottom:`1px solid ${C.ligne}`}}>
              <Td><div style={{display:"flex",alignItems:"center",gap:10}}><Avatar nom={i.nom} bg={ag?.couleur} light/><b>{i.nom}</b></div></Td>
              <Td>{i.poste}</Td>
              <Td><span style={{fontSize:10,padding:"3px 8px",fontWeight:700,color:"#fff",background:ag?.couleur}}>{ag?.nom}</span></Td>
              <Td r>{s.j}</Td><Td r><b>{fmtH(s.h)}</b></Td>
              <Td><Btn variant="danger" onClick={()=>supprimer(i.id)}>SUPPRIMER</Btn></Td>
            </tr>);})}</tbody>
        </TableWrap>}
    </Section>
  );
}

          <div key={p.id} className={`print-break ${p._type==="interim"?"bloc-interim":"bloc-interne"}`} style={{background:C.papier,border:`1.5px solid ${C.encre}`,marginBottom:16,overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderBottom:`1.5px solid ${C.encre}`,background:C.fond,flexWrap:"wrap"}}>
              <div style={{width:38,height:38,background:p._type==="interim"?ag?.couleur:C.encre,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,flexShrink:0}}>{initiales(p.nom)}</div>
              <div style={{flex:1}}><div style={{fontWeight:700,fontSize:15}}>{p.nom}</div><div style={{fontSize:10,color:C.gris,marginTop:2}}>{p.poste}{p._type==="interim"&&<span style={{marginLeft:8,fontSize:9,padding:"2px 6px",fontWeight:700,color:"#fff",background:ag?.couleur}}>{ag?.nom}</span>}</div></div>
              <div style={{display:"flex",gap:16}}>
                <div style={{textAlign:"center"}}><div style={{fontSize:9,color:C.gris,marginBottom:2}}>TOTAL</div><div style={{fontFamily:FT,fontSize:18,fontWeight:800}}>{fmtH(totalPH)}</div></div>
                {totalPNuit>0&&<div style={{textAlign:"center"}}><div style={{fontSize:9,color:C.gris,marginBottom:2}}>NUIT</div><div style={{fontFamily:FT,fontSize:18,fontWeight:800,color:"#6C3483"}}>{fmtH(totalPNuit)}</div></div>}
              </div>
            </div>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr style={{background:C.fond}}>
              <th style={{...th9,textAlign:"left"}}>Date</th><th style={{...th9,textAlign:"left"}}>Chantier</th><th style={{...th9,textAlign:"left"}}>Lieu</th>
              <th style={{...th9,textAlign:"right"}}>Début</th><th style={{...th9,textAlign:"right"}}>Fin</th><th style={{...th9,textAlign:"right"}}>Pause</th>
              <th style={{...th9,textAlign:"right"}}>Total</th><th style={{...th9,textAlign:"right",color:"#6C3483"}}>H.Nuit</th><th style={{...th9,textAlign:"center"}}>État</th>
            </tr></thead>
            <tbody>{mesP.map((x,idx)=>{
              const ch=chantiers.find(c=>c.id===x.chantier); const h=calcHeures(x); const hN=calcHNuit(x);
              const isWE=[0,6].includes(new Date(x.date+"T00:00:00").getDay());
              const fmtD=(iso)=>new Date(iso+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}).toUpperCase();
              return(<tr key={x.id} style={{borderBottom:`1px solid ${C.ligne}`,background:isWE?"#FFF8E1":idx%2===0?C.papier:"#F8F6F0"}}>
                <td style={{padding:"9px 14px",fontSize:11,fontWeight:500,whiteSpace:"nowrap"}}>{fmtD(x.date)}</td>
                <td style={{padding:"9px 14px"}}>{ch?<span style={{fontSize:11,padding:"3px 8px",fontWeight:700,background:ch.couleur,color:ch.couleur==="#F5C518"?"#0A0A0A":"#fff"}}>{ch.nom}</span>:<span style={{color:C.gris}}>—</span>}</td>
                <td style={{padding:"9px 14px",fontSize:11,color:C.gris}}>{ch?`📍 ${ch.ville}`:"—"}</td>
                <td style={{padding:"9px 14px",textAlign:"right",fontWeight:500}}>{x.debut}</td><td style={{padding:"9px 14px",textAlign:"right",fontWeight:500}}>{x.fin}</td>
                <td style={{padding:"9px 14px",textAlign:"right",color:C.gris}}>{x.pause}min</td>
                <td style={{padding:"9px 14px",textAlign:"right"}}><b style={{fontFamily:FT,fontSize:14}}>{fmtH(h)}</b></td>
                <td style={{padding:"9px 14px",textAlign:"right"}}>{hN>0?<b style={{color:"#6C3483"}}>{fmtH(hN)}</b>:<span style={{color:C.ligne}}>—</span>}</td>
                <td style={{padding:"9px 14px",textAlign:"center"}}>{x.valide?<span style={{fontSize:10,color:C.vert,fontWeight:700}}>✓</span>:<span style={{fontSize:10,color:C.orange,fontWeight:700}}>⏳</span>}</td>
              </tr>);
            })}
            <tr style={{borderTop:`2px solid ${C.encre}`,background:C.fond}}>
              <td colSpan={6} style={{padding:"8px 14px",fontSize:10,fontWeight:700}}>TOTAL SEMAINE {info.labelCourt}</td>
              <td style={{padding:"8px 14px",textAlign:"right"}}><b style={{fontFamily:FT,fontSize:16,fontWeight:800}}>{fmtH(totalPH)}</b></td>
              <td style={{padding:"8px 14px",textAlign:"right"}}>{totalPNuit>0?<b style={{color:"#6C3483"}}>{fmtH(totalPNuit)}</b>:"—"}</td><td></td>
            </tr>
            {p._type==="interim"&&<tr><td colSpan={9} style={{padding:"8px 14px",fontSize:9,color:C.gris,fontStyle:"italic",borderTop:`1px solid ${C.ligne}`}}>Relevé de mission — {p.nom} · {ag?.nom} · {info.label} · Généré le {new Date().toLocaleDateString("fr-FR")}</td></tr>}
            </tbody></table>
          </div>
        );
      })}
    </div>
  );
}

// ---- Onglet Paramètres ----
function OngletParametres({pinRH,setPinRH,pinChef,setPinChef,onChargerDemo}) {
  const [newPinRH,setNewPinRH]     = useState("");
  const [newPinChef,setNewPinChef] = useState("");
  const [msgRH,setMsgRH]           = useState("");
  const [msgChef,setMsgChef]       = useState("");
  const [sbUrl,setSbUrl]           = useState(()=>localStorage.getItem("chok_sb_url")||"");
  const [sbKey,setSbKey]           = useState(()=>localStorage.getItem("chok_sb_key")||"");
  const [msgSb,setMsgSb]           = useState("");
  const [confirmDemo,setConfirmDemo] = useState(false);

  const changerPinRH=()=>{
    if(newPinRH.length<4){setMsgRH("❌ PIN trop court (min 4 chiffres).");return;}
    setPinRH(newPinRH);setNewPinRH("");setMsgRH("✓ Code RH mis à jour.");setTimeout(()=>setMsgRH(""),3000);
  };
  const changerPinChef=()=>{
    if(newPinChef.length<4){setMsgChef("❌ PIN trop court (min 4 chiffres).");return;}
    setPinChef(newPinChef);setNewPinChef("");setMsgChef("✓ Code Chef mis à jour.");setTimeout(()=>setMsgChef(""),3000);
  };
  const sauvegarderSb=()=>{
    localStorage.setItem("chok_sb_url",sbUrl.trim());
    localStorage.setItem("chok_sb_key",sbKey.trim());
    setMsgSb("✓ Config Supabase sauvegardée. Rechargez la page pour activer.");
    setTimeout(()=>setMsgSb(""),5000);
  };

  const sectionStyle={background:C.papier,border:`1.5px solid ${C.encre}`,padding:"24px",marginBottom:20};
  const labelStyle={fontFamily:FM,fontSize:10,letterSpacing:"0.18em",color:C.gris,fontWeight:700,display:"block",marginBottom:8};
  return(
    <Section titre="Paramètres">
      {/* PINs */}
      <div style={sectionStyle}>
        <div style={{fontFamily:FT,fontSize:18,fontWeight:700,marginBottom:20}}>🔐 Codes d'accès</div>
        <div style={{display:"flex",gap:32,flexWrap:"wrap"}}>
          <div>
            <label style={labelStyle}>NOUVEAU CODE RH / ADMIN</label>
            <div style={{display:"flex",gap:8}}>
              <input type="password" value={newPinRH} onChange={e=>setNewPinRH(e.target.value.replace(/\D/g,""))} maxLength={8} placeholder="Nouveau PIN (chiffres)" style={{...inputStyle,width:220}}/>
              <Btn onClick={changerPinRH}>CHANGER</Btn>
            </div>
            {msgRH&&<div style={{marginTop:8,fontSize:12,color:msgRH.startsWith("✓")?C.vert:C.orange}}>{msgRH}</div>}
            <div style={{marginTop:6,fontSize:11,color:C.gris}}>Code actuel : {"●".repeat(pinRH.length)} ({pinRH.length} chiffres)</div>
          </div>
          <div>
            <label style={labelStyle}>NOUVEAU CODE CHEF D'ÉQUIPE</label>
            <div style={{display:"flex",gap:8}}>
              <input type="password" value={newPinChef} onChange={e=>setNewPinChef(e.target.value.replace(/\D/g,""))} maxLength={8} placeholder="Nouveau PIN (chiffres)" style={{...inputStyle,width:220}}/>
              <Btn onClick={changerPinChef}>CHANGER</Btn>
            </div>
            {msgChef&&<div style={{marginTop:8,fontSize:12,color:msgChef.startsWith("✓")?C.vert:C.orange}}>{msgChef}</div>}
            <div style={{marginTop:6,fontSize:11,color:C.gris}}>Code actuel : {"●".repeat(pinChef.length)} ({pinChef.length} chiffres)</div>
          </div>
        </div>
      </div>

      {/* Supabase */}
      <div style={sectionStyle}>
        <div style={{fontFamily:FT,fontSize:18,fontWeight:700,marginBottom:8}}>☁ Connexion Supabase</div>
        <div style={{fontSize:12,color:C.gris,marginBottom:20,lineHeight:1.7}}>
          Supabase permet de partager les données entre tous les appareils en temps réel.<br/>
          Créez un projet gratuit sur <b>supabase.com</b>, copiez l'URL et la clé anon, et collez-les ici.
        </div>
        <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:12}}>

          <Btn onClick={sauvegarderSb}>SAUVEGARDER ET ACTIVER</Btn>

        {msgSb&&<div style={{marginTop:10,padding:"10px 14px",background:"#E8F5E9",border:`1px solid ${C.vert}`,fontSize:12,color:C.vert,fontWeight:700}}>{msgSb}</div>}
        <div style={{marginTop:16,padding:"12px 16px",background:C.fond,border:`1px solid ${C.ligne}`,fontSize:11,color:C.gris,lineHeight:1.8}}>

          <code style={{fontSize:10,display:"block",marginTop:8,lineHeight:2}}>
            create table salaries (id text primary key, nom text, poste text, equipe text, interne boolean);<br/>
            create table interimaires (id text primary key, nom text, poste text, agence text, acces_plateforme boolean);<br/>
            create table chantiers (id text primary key, nom text, ville text, client text, couleur text, actif boolean);<br/>
            create table pointages (id text primary key, salarie text, chantier text, date text, debut text, fin text, pause int, commentaire text, valide boolean, interim boolean, valide_par_interimaire boolean, horodatage_validation text, chef_nom text, modifie_par text, modifie_le text);<br/>
            create table absences (id text primary key, salarie text, date_debut text, date_fin text, type text, type_label text, type_icone text, commentaire text, saisie_par_rh boolean, saisie_date text);<br/>
            -- Désactiver RLS pour commencer (à sécuriser plus tard) :<br/>
            alter table salaries disable row level security;<br/>
            alter table interimaires disable row level security;<br/>
            alter table chantiers disable row level security;<br/>
            alter table pointages disable row level security;<br/>
            alter table absences disable row level security;
          </code>
        </div>
      </div>

      {/* Données démo */}
      <div style={sectionStyle}>
        <div style={{fontFamily:FT,fontSize:18,fontWeight:700,marginBottom:8}}>🧪 Données de démonstration</div>
        <div style={{fontSize:12,color:C.gris,marginBottom:16,lineHeight:1.7}}>Charge des salariés, intérimaires et chantiers fictifs pour tester l'application. Les données existantes ne sont <b>pas effacées</b>.</div>
        {!confirmDemo
          ?<Btn onClick={()=>setConfirmDemo(true)}>CHARGER LES DONNÉES DÉMO</Btn>
          :<div style={{display:"flex",gap:10,alignItems:"center"}}>

            <Btn onClick={()=>{onChargerDemo();setConfirmDemo(false);}}>OUI, CHARGER</Btn>
            <Btn variant="ghost" onClick={()=>setConfirmDemo(false)}>Annuler</Btn>
          </div>
        }
      </div>
    </Section>
  );
}
