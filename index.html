<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rapport Heure — CHOK BÉTON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #F2EFE9;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      color: #0A0A0A;
      background-image: repeating-linear-gradient(0deg, transparent 0, transparent 39px, rgba(10,10,10,0.025) 39px, rgba(10,10,10,0.025) 40px);
      min-height: 100vh;
    }
    input, select, button { font-family: inherit; }
    table { border-collapse: collapse; width: 100%; }
    button { cursor: pointer; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ============================================================
//  CONSTANTES
// ============================================================
const AGENCES = [
  { id: "AG-01", nom: "ARPEL", couleur: "#1B4F72" },
  { id: "AG-02", nom: "DEFI",  couleur: "#B7410E" },
];
const POSTES = ["Chef d'équipe","Manœuvre"];
const TODAY = new Date().toISOString().slice(0,10);

const COULEURS_CHANTIER = ["#F5C518","#E55934","#3D5A80","#2A9D8F","#9B5DE5","#E67E22"];

const calcHeures = (p) => {
  const [h1,m1] = p.debut.split(":").map(Number);
  const [h2,m2] = p.fin.split(":").map(Number);
  const min = (h2*60+m2)-(h1*60+m1)-(p.pause||0);
  return Math.max(0, Math.round((min/60)*100)/100);
};

// Heures sup : calculées au niveau de la semaine (>35h), pas à la journée.
// Cette fonction retourne les heures effectives du pointage,
// le calcul du dépassement 35h se fait dans OngletPaie au niveau de la personne.
const calcHSup = (p) => 0; // placeholder — voir calcHSupSemaine

// Calcul des heures sup sur une liste de pointages d'une même semaine
const calcHSupSemaine = (ptgs) => {
  const totalEffectif = ptgs.reduce((s,p)=>s+calcHeures(p),0);
  return Math.max(0, Math.round((totalEffectif-35)*100)/100);
};

// Heures de nuit : minutes travaillées après 20h00
const calcHNuit = (p) => {
  const [h2,m2] = p.fin.split(":").map(Number);
  const finMin = h2*60+m2;
  const seuilNuit = 20*60; // 20h00
  if(finMin <= seuilNuit) return 0;
  const minNuit = finMin - seuilNuit;
  // On ne dépasse pas les heures effectives travaillées
  return Math.min(Math.round((minNuit/60)*100)/100, calcHeures(p));
};

const fmtH = (n) => `${Math.floor(n)}h${String(Math.round((n%1)*60)).padStart(2,"0")}`;
const initiales = (nom) => nom.trim().split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase();
const genId = (p) => `${p}-${Date.now().toString(36).toUpperCase()}${Math.random().toString(36).slice(2,5).toUpperCase()}`;
const dateFr = () => new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"}).toUpperCase();
const heureFr = () => new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});

// ============================================================
//  COULEURS & TYPO
// ============================================================
const C = {
  fond:"#F2EFE9", encre:"#0A0A0A", jaune:"#F5C518", orange:"#E55934",
  vert:"#2A9D8F", gris:"#8A857A", ligne:"#D8D2C3", papier:"#FBFAF6", bleu:"#1B4F72",
};
const FT = "'Bricolage Grotesque', system-ui, sans-serif";
const FM = "'JetBrains Mono', ui-monospace, monospace";

// ============================================================
//  PERSISTANCE localStorage
// ============================================================
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}
function usePersist(key, init) {
  const [val, setVal] = useState(() => load(key, init));
  const setter = (v) => {
    const next = typeof v === "function" ? v(val) : v;
    setVal(next);
    save(key, next);
  };
  return [val, setter];
}

// ============================================================
//  CODES D'ACCÈS — modifiez ces valeurs selon vos besoins
// ============================================================
const PIN_RH   = "1234";   // Accès RH / Admin complet
const PIN_CHEF = "0000";   // Accès Chef d'équipe (saisie rapports)

// ============================================================
//  APP — gestion de session et routage par rôle
// ============================================================
function App() {
  const [salaries, setSalaries]         = usePersist("chok_salaries", []);
  const [interimaires, setInterimaires] = usePersist("chok_interimaires", []);
  const [chantiers, setChantiers]       = usePersist("chok_chantiers", []);
  const [pointages, setPointages]       = usePersist("chok_pointages", []);

  // session : { role: "rh"|"chef"|"salarie", personneId: null|"S-01"|"I-101" }
  const [session, setSession] = useState(null);

  const seDeconnecter = () => setSession(null);

  const donnees = {salaries,setSalaries,interimaires,setInterimaires,chantiers,setChantiers,pointages,setPointages};

  if (!session) return <EcranConnexion salaries={salaries} interimaires={interimaires} onConnexion={setSession} />;

  return (
    <div>
      <Header session={session} onDeconnexion={seDeconnecter} />
      {session.role === "rh" && <VueAdmin {...donnees} />}
      {session.role === "chef" && <VueMobile {...donnees} />}
      {session.role === "salarie" && <VueSalarie session={session} pointages={pointages} chantiers={chantiers} salaries={salaries} interimaires={interimaires} />}
      <Footer />
    </div>
  );
}

// ============================================================
//  ÉCRAN DE CONNEXION
// ============================================================
function EcranConnexion({salaries, interimaires, onConnexion}) {
  const [mode, setMode]     = useState(null); // "rh" | "chef" | "salarie"
  const [pin, setPin]       = useState("");
  const [personneId, setPersonneId] = useState("");
  const [erreur, setErreur] = useState("");

  // Seuls les salariés internes + intérimaires avec accesPlateforme peuvent se connecter
  const toutesPersonnes = [
    ...salaries.map(s=>({...s,_type:"interne"})),
    ...interimaires.filter(i=>i.accesPlateforme).map(i=>({...i,_type:"interim"})),
  ];

  const validerPin = (attendu, role) => {
    if (pin === attendu) {
      onConnexion({ role });
    } else {
      setErreur("Code incorrect. Réessayez.");
      setPin("");
    }
  };

  const validerSalarie = () => {
    if (!personneId) { setErreur("Sélectionnez votre nom."); return; }
    onConnexion({ role: "salarie", personneId });
  };

  const reset = () => { setMode(null); setPin(""); setPersonneId(""); setErreur(""); };

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      {/* Logo */}
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:48}}>
        <div style={{width:56,height:56,background:C.encre,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="30" height="30" viewBox="0 0 22 22" fill="none">
            <path d="M2 18 L11 4 L20 18 Z" stroke="#0A0A0A" strokeWidth="2" fill="#F5C518"/>
            <circle cx="11" cy="14" r="1.5" fill="#0A0A0A"/>
          </svg>
        </div>
        <div>
          <div style={{fontFamily:FT,fontWeight:800,fontSize:28,letterSpacing:"-0.02em",lineHeight:1}}>RAPPORT HEURE</div>
          <div style={{fontFamily:FM,fontSize:12,color:C.gris,letterSpacing:"0.2em",marginTop:4}}>CHOK BÉTON</div>
        </div>
      </div>

      {/* Choix du profil */}
      {!mode && (
        <div style={{width:"100%",maxWidth:420}}>
          <div style={{fontFamily:FM,fontSize:11,color:C.gris,letterSpacing:"0.2em",textAlign:"center",marginBottom:20}}>QUI ÊTES-VOUS ?</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>

            <button onClick={()=>setMode("rh")} style={{padding:"20px 24px",background:C.encre,border:"none",color:C.papier,fontFamily:FM,fontSize:13,fontWeight:700,letterSpacing:"0.1em",cursor:"pointer",display:"flex",alignItems:"center",gap:16,textAlign:"left"}}>
              <span style={{fontSize:28}}>🏢</span>
              <div>
                <div>RH / ADMIN</div>
                <div style={{fontSize:10,fontWeight:400,color:C.gris,marginTop:3}}>Accès complet — lecture et modification</div>
              </div>
            </button>

            <button onClick={()=>setMode("chef")} style={{padding:"20px 24px",background:C.jaune,border:`2px solid ${C.encre}`,color:C.encre,fontFamily:FM,fontSize:13,fontWeight:700,letterSpacing:"0.1em",cursor:"pointer",display:"flex",alignItems:"center",gap:16,textAlign:"left"}}>
              <span style={{fontSize:28}}>👷</span>
              <div>
                <div>CHEF D'ÉQUIPE</div>
                <div style={{fontSize:10,fontWeight:400,color:"#555",marginTop:3}}>Saisie des rapports d'heures</div>
              </div>
            </button>

            <button onClick={()=>setMode("salarie")} style={{padding:"20px 24px",background:C.papier,border:`2px solid ${C.encre}`,color:C.encre,fontFamily:FM,fontSize:13,fontWeight:700,letterSpacing:"0.1em",cursor:"pointer",display:"flex",alignItems:"center",gap:16,textAlign:"left"}}>
              <span style={{fontSize:28}}>👤</span>
              <div>
                <div>SALARIÉ / INTÉRIMAIRE</div>
                <div style={{fontSize:10,fontWeight:400,color:C.gris,marginTop:3}}>Consulter mes propres heures</div>
              </div>
            </button>

          </div>
        </div>
      )}

      {/* Saisie PIN — RH */}
      {mode === "rh" && (
        <div style={{width:"100%",maxWidth:360}}>
          <div style={{fontFamily:FM,fontSize:11,color:C.gris,letterSpacing:"0.2em",textAlign:"center",marginBottom:20}}>CODE RH / ADMIN</div>
          <PinPad pin={pin} setPin={setPin} onValider={()=>validerPin(PIN_RH,"rh")} erreur={erreur} setErreur={setErreur}/>
          <button onClick={reset} style={{width:"100%",marginTop:12,padding:"12px",background:"transparent",border:`1px solid ${C.ligne}`,fontFamily:FM,fontSize:11,color:C.gris,cursor:"pointer"}}>← Retour</button>
        </div>
      )}

      {/* Saisie PIN — Chef */}
      {mode === "chef" && (
        <div style={{width:"100%",maxWidth:360}}>
          <div style={{fontFamily:FM,fontSize:11,color:C.gris,letterSpacing:"0.2em",textAlign:"center",marginBottom:20}}>CODE CHEF D'ÉQUIPE</div>
          <PinPad pin={pin} setPin={setPin} onValider={()=>validerPin(PIN_CHEF,"chef")} erreur={erreur} setErreur={setErreur}/>
          <button onClick={reset} style={{width:"100%",marginTop:12,padding:"12px",background:"transparent",border:`1px solid ${C.ligne}`,fontFamily:FM,fontSize:11,color:C.gris,cursor:"pointer"}}>← Retour</button>
        </div>
      )}

      {/* Sélection nom — Salarié */}
      {mode === "salarie" && (
        <div style={{width:"100%",maxWidth:360}}>
          <div style={{fontFamily:FM,fontSize:11,color:C.gris,letterSpacing:"0.2em",textAlign:"center",marginBottom:20}}>MON NOM</div>
          {toutesPersonnes.length === 0
            ? <div style={{padding:"20px",background:"#FFF8E1",border:`1px solid ${C.ligne}`,fontSize:12,textAlign:"center",lineHeight:1.6}}>
                Aucun salarié enregistré.<br/>Demandez à la RH d'ajouter votre nom.
              </div>
            : <>
                <select value={personneId} onChange={e=>{setPersonneId(e.target.value);setErreur("");}}
                  style={{width:"100%",padding:"16px",background:C.papier,border:`2px solid ${C.encre}`,fontFamily:FM,fontSize:14,outline:"none",marginBottom:12}}>
                  <option value="" disabled>— Sélectionnez votre nom —</option>
                  {salaries.length>0 && <optgroup label="── Salariés CHOK BÉTON">
                    {salaries.map(s=><option key={s.id} value={s.id}>{s.nom}</option>)}
                  </optgroup>}
                  {interimaires.length>0 && <optgroup label="── Intérimaires">
                    {interimaires.map(i=>{const ag=AGENCES.find(a=>a.id===i.agence);return <option key={i.id} value={i.id}>{i.nom} ({ag?.nom})</option>;})}
                  </optgroup>}
                </select>
                {erreur && <div style={{padding:"8px 12px",background:"#FFF0F0",border:`1px solid ${C.orange}`,color:C.orange,fontSize:12,marginBottom:12}}>{erreur}</div>}
                <button onClick={validerSalarie} style={{width:"100%",padding:"16px",background:C.encre,border:"none",color:C.jaune,fontFamily:FM,fontSize:13,fontWeight:700,letterSpacing:"0.1em",cursor:"pointer"}}>
                  ACCÉDER À MES HEURES →
                </button>
              </>
          }
          <button onClick={reset} style={{width:"100%",marginTop:12,padding:"12px",background:"transparent",border:`1px solid ${C.ligne}`,fontFamily:FM,fontSize:11,color:C.gris,cursor:"pointer"}}>← Retour</button>
        </div>
      )}
    </div>
  );
}

// ============================================================
//  CLAVIER PIN
// ============================================================
function PinPad({pin, setPin, onValider, erreur, setErreur}) {
  const ajouter = (c) => {
    if (pin.length >= 6) return;
    setErreur("");
    const nouveau = pin + c;
    setPin(nouveau);
  };
  const effacer = () => { setPin(pin.slice(0,-1)); setErreur(""); };

  return (
    <div>
      {/* Affichage du PIN masqué */}
      <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:20}}>
        {[0,1,2,3,4,5].map(i=>(
          <div key={i} style={{width:40,height:40,border:`2px solid ${pin.length>i?C.encre:C.ligne}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:700,background:pin.length>i?C.encre:C.papier,color:C.jaune}}>
            {pin.length>i?"●":""}
          </div>
        ))}
      </div>

      {erreur && <div style={{padding:"8px 12px",background:"#FFF0F0",border:`1px solid ${C.orange}`,color:C.orange,fontSize:12,marginBottom:12,textAlign:"center"}}>{erreur}</div>}

      {/* Touches */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>
        {["1","2","3","4","5","6","7","8","9"].map(c=>(
          <button key={c} onClick={()=>ajouter(c)} style={{padding:"18px",fontFamily:FT,fontSize:22,fontWeight:700,background:C.papier,border:`1.5px solid ${C.ligne}`,cursor:"pointer"}}>
            {c}
          </button>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
        <button onClick={effacer} style={{padding:"18px",fontFamily:FM,fontSize:12,fontWeight:700,background:"transparent",border:`1.5px solid ${C.ligne}`,cursor:"pointer",color:C.gris}}>⌫</button>
        <button onClick={()=>ajouter("0")} style={{padding:"18px",fontFamily:FT,fontSize:22,fontWeight:700,background:C.papier,border:`1.5px solid ${C.ligne}`,cursor:"pointer"}}>0</button>
        <button onClick={onValider} style={{padding:"18px",fontFamily:FM,fontSize:12,fontWeight:700,background:C.encre,border:"none",color:C.jaune,cursor:"pointer"}}>OK ✓</button>
      </div>
    </div>
  );
}

// ============================================================
//  HEADER — affiche le rôle connecté et bouton déconnexion
// ============================================================
function Header({session, onDeconnexion}) {
  const [heure, setHeure] = useState(heureFr());
  useEffect(() => { const t = setInterval(()=>setHeure(heureFr()),30000); return ()=>clearInterval(t); },[]);

  const roleLabel = {rh:"RH / ADMIN", chef:"CHEF D'ÉQUIPE", salarie:"MON ESPACE"}[session.role];
  const roleColor = {rh:C.vert, chef:C.jaune, salarie:C.ardoise}[session.role] || C.vert;

  return (
    <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 32px",borderBottom:`2px solid ${C.encre}`,background:C.papier}}>
      <div style={{flex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:40,height:40,background:C.encre,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
              <path d="M2 18 L11 4 L20 18 Z" stroke="#0A0A0A" strokeWidth="2" fill="#F5C518"/>
              <circle cx="11" cy="14" r="1.5" fill="#0A0A0A"/>
            </svg>
          </div>
          <div>
            <div style={{fontFamily:FT,fontWeight:800,fontSize:16,letterSpacing:"0.02em",lineHeight:1}}>RAPPORT HEURE</div>
            <div style={{fontFamily:FM,fontSize:10,color:C.gris,letterSpacing:"0.15em",marginTop:3}}>CHOK BÉTON</div>
          </div>
        </div>
      </div>

      {/* Rôle actif */}
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 16px",background:C.fond,border:`1.5px solid ${C.encre}`}}>
        <div style={{width:8,height:8,borderRadius:"50%",background:roleColor,boxShadow:`0 0 0 3px ${roleColor}44`}}/>
        <span style={{fontFamily:FM,fontSize:11,fontWeight:700,letterSpacing:"0.1em"}}>{roleLabel}</span>
      </div>

      <div style={{flex:1,display:"flex",justifyContent:"flex-end",gap:12,alignItems:"center"}}>
        <span style={{fontFamily:FM,fontSize:11,color:C.gris}}>{heure}</span>
        <button onClick={onDeconnexion} style={{fontFamily:FM,fontSize:11,padding:"8px 14px",background:"transparent",border:`1.5px solid ${C.encre}`,color:C.encre,cursor:"pointer",letterSpacing:"0.05em",fontWeight:700}}>
          DÉCONNEXION →
        </button>
      </div>
    </header>
  );
}

// ============================================================
//  VUE ADMIN
// ============================================================
function VueAdmin({pointages,setPointages,chantiers,setChantiers,salaries,setSalaries,interimaires,setInterimaires}) {
  const [onglet, setOnglet] = useState("pointages");
  const auj = pointages.filter(p=>p.date===TODAY);
  const totalH = auj.reduce((s,p)=>s+calcHeures(p),0);
  const aValider = auj.filter(p=>!p.valide).length;
  const intJour = auj.filter(p=>p.interim).length;

  const trouver = (id) => salaries.find(s=>s.id===id) || interimaires.find(i=>i.id===id);
  const valider = (id) => setPointages(pointages.map(p=>p.id===id?{...p,valide:true}:p));
  const validerTout = () => setPointages(pointages.map(p=>p.date===TODAY?{...p,valide:true}:p));
  const supprPointage = (id) => setPointages(pointages.filter(p=>p.id!==id));

  const tabs = [["pointages","Pointages"],["salaries","Salariés"],["interim","Intérimaires"],["chantiers","Chantiers"],["paie","Paie"]];

  return (
    <main style={{padding:"28px 32px",maxWidth:1500,margin:"0 auto"}}>
      {/* Bandeau date */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",paddingBottom:20,borderBottom:`1px solid ${C.ligne}`,marginBottom:24}}>
        <div>
          <div style={{fontSize:11,color:C.gris,letterSpacing:"0.2em",marginBottom:6}}>JOURNÉE EN COURS</div>
          <div style={{fontFamily:FT,fontSize:32,fontWeight:800,letterSpacing:"-0.02em"}}>{dateFr()}</div>
        </div>
        <Btn variant="export" onClick={()=>alert("Export Silae — à connecter en production")}>↓ EXPORT SILAE</Btn>
      </div>

      {/* KPI */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:14,marginBottom:28}}>
        <Kpi label="Pointages du jour" val={auj.length} sub="entrées" accent={C.jaune}/>
        <Kpi label="Heures totales" val={fmtH(totalH)} sub={`${chantiers.filter(c=>c.actif).length} chantier(s)`} accent="#3D5A80"/>
        <Kpi label="Salariés" val={salaries.length} sub="enregistrés" accent={C.vert}/>
        <Kpi label="Intérimaires" val={intJour} sub={`/ ${interimaires.length} fichés`} accent={C.bleu}/>
        <Kpi label="À valider" val={aValider} sub="en attente" accent={C.encre} alert={aValider>0}/>
      </div>

      {/* Onglets */}
      <div style={{display:"flex",borderBottom:`2px solid ${C.encre}`,marginBottom:24,flexWrap:"wrap"}}>
        {tabs.map(([k,l])=>(
          <button key={k} onClick={()=>setOnglet(k)} style={{fontFamily:FM,fontSize:12,fontWeight:onglet===k?700:500,padding:"12px 20px",background:"transparent",border:"none",cursor:"pointer",letterSpacing:"0.1em",color:onglet===k?C.encre:C.gris,borderBottom:onglet===k?`3px solid ${C.jaune}`:"3px solid transparent",marginBottom:-2}}>
            {l.toUpperCase()}
          </button>
        ))}
      </div>

      {onglet==="pointages" && <OngletPointages auj={auj} chantiers={chantiers} trouver={trouver} aValider={aValider} valider={valider} validerTout={validerTout} supprPointage={supprPointage}/>}
      {onglet==="salaries" && <OngletSalaries salaries={salaries} setSalaries={setSalaries} pointages={pointages}/>}
      {onglet==="interim" && <OngletInterim interimaires={interimaires} setInterimaires={setInterimaires} pointages={pointages} chantiers={chantiers}/>}
      {onglet==="chantiers" && <OngletChantiers chantiers={chantiers} setChantiers={setChantiers} pointages={pointages}/>}
      {onglet==="paie" && <OngletPaie pointages={pointages} salaries={salaries} interimaires={interimaires} chantiers={chantiers}/>}
    </main>
  );
}

// ---- Onglet Pointages ----
function OngletPointages({auj,chantiers,trouver,aValider,valider,validerTout,supprPointage}) {
  const [filtre,setFiltre] = useState("tous");
  const liste = filtre==="tous" ? auj : auj.filter(p=>p.chantier===filtre);
  return (
    <Section titre="Pointages du jour" actions={
      <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
        <select value={filtre} onChange={e=>setFiltre(e.target.value)} style={selectStyle}>
          <option value="tous">Tous les chantiers</option>
          {chantiers.map(c=><option key={c.id} value={c.id}>{c.nom}</option>)}
        </select>
        {aValider>0 && <Btn onClick={validerTout}>✓ TOUT VALIDER ({aValider})</Btn>}
      </div>
    }>
      {liste.length===0
        ? <EmptyState>Aucun pointage aujourd'hui.<br/><small style={{color:C.gris}}>Les rapports arrivent depuis l'onglet Chef d'équipe.</small></EmptyState>
        : <TableWrap>
            <thead><tr>
              <Th>Date</Th><Th>Personne</Th><Th>Statut</Th><Th>Chantier</Th>
              <Th r>Début</Th><Th r>Fin</Th><Th r>Pause</Th><Th r>Total</Th><Th r>H.Nuit</Th>
              <Th>Val. intérimaire</Th><Th>État RH</Th><Th></Th>
            </tr></thead>
            <tbody>
              {liste.map(p=>{
                const pers = trouver(p.salarie);
                const ch = chantiers.find(c=>c.id===p.chantier);
                const ag = p.interim ? AGENCES.find(a=>a.id===pers?.agence) : null;
                const dateCourte = p.date ? new Date(p.date+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}) : "—";
                const hTot = calcHeures(p);
                const hNuit = calcHNuit(p);
                return (
                  <tr key={p.id} style={{borderBottom:`1px solid ${C.ligne}`}}>
                    <Td><span style={{fontSize:11,fontWeight:500}}>{dateCourte}</span></Td>
                    <Td><b style={{fontSize:13}}>{pers?.nom||p.salarie}</b><br/><span style={{fontSize:11,color:C.gris}}>{pers?.poste||"—"}{p.chefNom?` · Chef: ${p.chefNom}`:""}</span></Td>
                    <Td>{p.interim
                      ? <span style={{fontSize:10,padding:"3px 8px",color:"#fff",fontWeight:700,background:ag?.couleur}}>{ag?.nom||"INTÉRIM"}</span>
                      : <span style={{fontSize:10,padding:"3px 8px",fontWeight:700,border:`1px solid ${C.encre}`}}>INTERNE</span>}
                    </Td>
                    <Td>{ch ? <span style={{fontSize:11,padding:"3px 8px",fontWeight:700,background:ch.couleur,color:ch.couleur==="#F5C518"?"#0A0A0A":"#fff"}}>{ch.nom}</span> : "—"}</Td>
                    <Td r>{p.debut}</Td><Td r>{p.fin}</Td><Td r>{p.pause}min</Td>
                    <Td r><b>{fmtH(hTot)}</b></Td>
                    <Td r>{hNuit>0 ? <span style={{color:"#6C3483",fontWeight:700,fontSize:11}}>{fmtH(hNuit)}</span> : <span style={{color:C.ligne}}>—</span>}</Td>
                    <Td>
                      {p.interim===true
                        ? p.valideParInterimaire
                          ? <span style={{color:C.vert,fontSize:10,fontWeight:700}}>✓ ACCEPTÉ<br/><span style={{fontWeight:400,fontSize:9}}>{p.horodatageValidation?new Date(p.horodatageValidation).toLocaleString("fr-FR",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}):""}</span></span>
                          : <span style={{color:C.orange,fontSize:10,fontWeight:700}}>⏳ EN ATTENTE</span>
                        : <span style={{color:C.gris,fontSize:10}}>—</span>
                      }
                    </Td>
                    <Td>{p.valide?<span style={{color:C.vert,fontSize:11,fontWeight:700}}>● VALIDÉ RH</span>:<span style={{color:C.orange,fontSize:11,fontWeight:700}}>● ATTENTE RH</span>}</Td>
                    <Td>
                      <div style={{display:"flex",gap:6}}>
                        {!p.valide && <Btn variant="mini" onClick={()=>valider(p.id)}>VALIDER</Btn>}
                        <Btn variant="danger-mini" onClick={()=>supprPointage(p.id)}>✕</Btn>
                      </div>
                    </Td>
                  </tr>
                );
              })}
            </tbody>
          </TableWrap>
      }
    </Section>
  );
}

// ---- Onglet Salariés ----
function OngletSalaries({salaries,setSalaries,pointages}) {
  const [open,setOpen] = useState(false);
  const [nom,setNom]   = useState("");
  const [poste,setPoste] = useState(POSTES[0]);
  const [err,setErr]   = useState("");

  const ajouter = () => {
    if(nom.trim().length<2){setErr("Nom trop court."); return;}
    if(salaries.some(s=>s.nom.toLowerCase()===nom.trim().toLowerCase())){setErr("Déjà enregistré."); return;}
    setSalaries([...salaries,{id:genId("S"),nom:nom.trim(),poste,equipe:"—",interne:true}]);
    setNom(""); setPoste(POSTES[0]); setOpen(false); setErr("");
  };
  const supprimer = (id) => {
    if(pointages.some(p=>p.salarie===id) && !window.confirm("Ce salarié a des pointages. Supprimer quand même ?")) return;
    setSalaries(salaries.filter(s=>s.id!==id));
  };

  return (
    <Section titre={`Salariés CHOK BÉTON — ${salaries.length}`} actions={
      <Btn onClick={()=>{setOpen(!open);setErr("");}}>{open?"✕ Annuler":"+ AJOUTER UN SALARIÉ"}</Btn>
    }>
      {open && <FormInline>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
          <Champ label="NOM COMPLET"><input value={nom} onChange={e=>{setNom(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&ajouter()} placeholder="Prénom Nom" style={inputStyle}/></Champ>
          <Champ label="POSTE"><select value={poste} onChange={e=>setPoste(e.target.value)} style={selectStyle}>{POSTES.map(p=><option key={p}>{p}</option>)}</select></Champ>
          <Btn onClick={ajouter}>AJOUTER</Btn>
        </div>
        {err && <ErrBox>{err}</ErrBox>}
      </FormInline>}

      {salaries.length===0
        ? <EmptyState>Aucun salarié. Cliquez sur "+ AJOUTER UN SALARIÉ".</EmptyState>
        : <TableWrap>
            <thead><tr><Th>Nom</Th><Th>Poste</Th><Th>ID</Th><Th r>Jours pointés</Th><Th></Th></tr></thead>
            <tbody>{salaries.map(s=>{
              const jours = pointages.filter(p=>p.salarie===s.id).length;
              return <tr key={s.id} style={{borderBottom:`1px solid ${C.ligne}`}}>
                <Td><div style={{display:"flex",alignItems:"center",gap:10}}><Avatar nom={s.nom}/><b>{s.nom}</b></div></Td>
                <Td><span style={{fontSize:10,padding:"3px 8px",fontWeight:700,border:`1px solid ${C.encre}`}}>{s.poste}</span></Td>
                <Td><span style={{fontSize:10,padding:"3px 8px",color:C.gris,border:`1px solid ${C.ligne}`}}>{s.id}</span></Td>
                <Td r>{jours}</Td>
                <Td><Btn variant="danger" onClick={()=>supprimer(s.id)}>SUPPRIMER</Btn></Td>
              </tr>;
            })}</tbody>
          </TableWrap>
      }
    </Section>
  );
}

function OngletInterim({interimaires,setInterimaires,pointages,chantiers}) {
  const [open,setOpen]   = useState(false);

  const [poste,setPoste] = useState("Manœuvre");
  const [agence,setAgence] = useState(AGENCES[0].id);
  const [err,setErr]     = useState("");

  const ajouter = () => {
    if(nom.trim().length<2){setErr("Nom trop court."); return;}
    if(interimaires.some(i=>i.nom.toLowerCase()===nom.trim().toLowerCase())){setErr("Déjà enregistré."); return;}
    setInterimaires([...interimaires,{id:genId("I"),nom:nom.trim(),poste,agence,accesPlateforme:false}]);
    setNom(""); setPoste("Manœuvre"); setAgence(AGENCES[0].id); setOpen(false); setErr("");
  };

  const toggleAcces = (id) => setInterimaires(interimaires.map(i=>i.id===id?{...i,accesPlateforme:!i.accesPlateforme}:i));
  const supprimer = (id) => {
    if(pointages.some(p=>p.salarie===id) && !window.confirm("Cet intérimaire a des pointages. Supprimer ?")) return;
    setInterimaires(interimaires.filter(i=>i.id!==id));
  };
  const stats = (id) => { const ps=pointages.filter(p=>p.salarie===id); return {j:ps.length, h:ps.reduce((s,p)=>s+calcHeures(p),0)}; };

  return (
    <Section titre={`Intérimaires — ${interimaires.length}`} actions={
      <Btn onClick={()=>{setOpen(!open);setErr("");}}>{open?"✕ Annuler":"+ AJOUTER UN INTÉRIMAIRE"}</Btn>

          <Champ label="POSTE"><select value={poste} onChange={e=>setPoste(e.target.value)} style={selectStyle}>{POSTES.map(p=><option key={p}>{p}</option>)}</select></Champ>
          <Champ label="AGENCE"><select value={agence} onChange={e=>setAgence(e.target.value)} style={selectStyle}>{AGENCES.map(a=><option key={a.id} value={a.id}>{a.nom}</option>)}</select></Champ>
          <Btn onClick={ajouter}>AJOUTER</Btn>
        </div>
        {err && <ErrBox>{err}</ErrBox>}
      </FormInline>}

      {interimaires.length===0
        ? <EmptyState>Aucun intérimaire. Ajoutez-les ici ou depuis l'app chef d'équipe.</EmptyState>
        : <TableWrap>
            <thead><tr><Th>Nom</Th><Th>Poste</Th><Th>Agence</Th><Th r>Jours</Th><Th r>Heures</Th><Th></Th></tr></thead>
            <tbody>{interimaires.map(i=>{
              const ag=AGENCES.find(a=>a.id===i.agence); const s=stats(i.id);
              return <tr key={i.id} style={{borderBottom:`1px solid ${C.ligne}`}}>
                <Td><div style={{display:"flex",alignItems:"center",gap:10}}><Avatar nom={i.nom} bg={ag?.couleur} light/><b>{i.nom}</b></div></Td>
                <Td>{i.poste}</Td>
                <Td><span style={{fontSize:10,padding:"3px 8px",fontWeight:700,color:"#fff",background:ag?.couleur}}>{ag?.nom}</span></Td>
                <Td r>{s.j}</Td><Td r><b>{fmtH(s.h)}</b></Td>
                <Td><Btn variant="danger" onClick={()=>supprimer(i.id)}>SUPPRIMER</Btn></Td>
              </tr>;
            })}</tbody>
          </TableWrap>
      }
    </Section>
  );
}

// ---- Onglet Paie / Rapport détaillé ----
function OngletPaie({pointages,salaries,interimaires,chantiers}) {
  const [personneId, setPersonneId] = useState("tous");
  const [modeVue, setModeVue] = useState("semaine");

  const tousLesPersonnes = [
    ...salaries.map(s=>({...s,_type:"interne"})),
    ...interimaires.map(i=>({...i,_type:"interim"})),
  ];

  const plage = (() => {
    const d = new Date();
    if(modeVue==="semaine") {
      const day=d.getDay()||7;
      const lundi=new Date(d); lundi.setDate(d.getDate()-day+1);
      return Array.from({length:5},(_,i)=>{const x=new Date(lundi);x.setDate(lundi.getDate()+i);return x.toISOString().slice(0,10);});
    }
    if(modeVue==="mois") {
      const dates=[];
      const debut=new Date(d.getFullYear(),d.getMonth(),1);
      const fin=new Date(d.getFullYear(),d.getMonth()+1,0);
      for(let dt=new Date(debut);dt<=fin;dt.setDate(dt.getDate()+1)) dates.push(new Date(dt).toISOString().slice(0,10));
      return dates;
    }
    return [...new Set(pointages.map(p=>p.date))].sort();
  })();

  const fmtDate = (iso) => new Date(iso+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"}).toUpperCase();

  const personnesFiltrees = personneId==="tous" ? tousLesPersonnes : tousLesPersonnes.filter(p=>p.id===personneId);
  const ptgPlage = pointages.filter(p=>plage.includes(p.date));

  const exportPDF = () => {
    window.print();
  };

  const th9 = {padding:"9px 16px",fontSize:9,letterSpacing:"0.15em",color:C.gris,fontWeight:500,borderBottom:`1px solid ${C.ligne}`,textTransform:"uppercase",whiteSpace:"nowrap"};

  return (
    <Section titre="Rapport détaillé — Heures & Chantiers" actions={
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <select value={personneId} onChange={e=>setPersonneId(e.target.value)} style={selectStyle}>
          <option value="tous">Toutes les personnes</option>
          {salaries.length>0 && <optgroup label="── Salariés CHOK BÉTON">
            {salaries.map(s=><option key={s.id} value={s.id}>{s.nom}</option>)}
          </optgroup>}
          {interimaires.length>0 && <optgroup label="── Intérimaires">
            {interimaires.map(i=><option key={i.id} value={i.id}>{i.nom}</option>)}
          </optgroup>}
        </select>
        {["semaine","mois","tout"].map(m=>(
          <button key={m} onClick={()=>setModeVue(m)} style={{fontFamily:FM,fontSize:11,padding:"8px 14px",background:modeVue===m?C.encre:"transparent",color:modeVue===m?C.jaune:C.encre,border:`1.5px solid ${C.encre}`,cursor:"pointer",fontWeight:modeVue===m?700:500,letterSpacing:"0.05em"}}>
            {{semaine:"SEMAINE",mois:"MOIS",tout:"TOUT"}[m]}
          </button>
        ))}
        <Btn variant="export" onClick={exportPDF}>↓ EXPORTER PDF</Btn>
      </div>
    }>

      {/* Styles d'impression injectés une seule fois */}
      <style>{`
        @media print {
          header, footer, .no-print { display: none !important; }
          body { background: white !important; background-image: none !important; }
          main { padding: 0 !important; max-width: 100% !important; }
          .print-break { page-break-after: always; }
          @page { margin: 15mm; size: A4 landscape; }
        }
      `}</style>

      {/* En-tête imprimable */}
      <div className="no-print" style={{display:"none"}}/>
      <div id="print-header" style={{display:"none"}}>
        <div style={{fontFamily:FT,fontSize:20,fontWeight:800}}>RAPPORT HEURE — CHOK BÉTON</div>
        <div style={{fontSize:12,color:C.gris}}>
          Généré le {new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"})} · Période : {modeVue.toUpperCase()}
        </div>
      </div>

      {tousLesPersonnes.length===0
        ? <EmptyState>Aucun salarié ni intérimaire enregistré.</EmptyState>
        : personnesFiltrees.map(p=>{
            const ag = p._type==="interim" ? AGENCES.find(a=>a.id===p.agence) : null;
            const ptgPersonne = ptgPlage.filter(x=>x.salarie===p.id);
            const totalH    = ptgPersonne.reduce((s,x)=>s+calcHeures(x),0);
            const totalNuit = ptgPersonne.reduce((s,x)=>s+calcHNuit(x),0);

            // Heures sup calculées semaine par semaine (>35h/semaine)
            // On groupe les pointages par numéro de semaine ISO
            const getNumSemaine = (iso) => {
              const d = new Date(iso+"T00:00:00");
              const j = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
              const dayNum = j.getUTCDay() || 7;
              j.setUTCDate(j.getUTCDate() + 4 - dayNum);
              const yearStart = new Date(Date.UTC(j.getUTCFullYear(),0,1));
              return `${j.getUTCFullYear()}-S${Math.ceil((((j-yearStart)/86400000)+1)/7).toString().padStart(2,"0")}`;
            };
            const parSemaine = {};
            ptgPersonne.forEach(x=>{ const s=getNumSemaine(x.date); if(!parSemaine[s]) parSemaine[s]=[]; parSemaine[s].push(x); });
            const totalSup = Object.values(parSemaine).reduce((acc,ptgs)=>acc+calcHSupSemaine(ptgs),0);

            // Semaine courante pour l'affichage "cette semaine"
            const semCle = getNumSemaine(TODAY);
            const ptgSemCourante = parSemaine[semCle] || [];
            const totalSem35 = ptgSemCourante.reduce((s,x)=>s+calcHeures(x),0);
            const hSupSem = calcHSupSemaine(ptgSemCourante);

            const parDate = {};
            ptgPersonne.forEach(x=>{ if(!parDate[x.date]) parDate[x.date]=[]; parDate[x.date].push(x); });

            return (
              <div key={p.id} className="print-break" style={{background:C.papier,border:`1.5px solid ${C.encre}`,marginBottom:20,overflow:"hidden"}}>
                {/* En-tête personne */}
                <div style={{display:"flex",alignItems:"center",gap:14,padding:"14px 20px",borderBottom:`2px solid ${C.encre}`,background:C.fond,flexWrap:"wrap"}}>
                  <div style={{width:44,height:44,background:p._type==="interim"?ag?.couleur:C.encre,color:p._type==="interim"?"#fff":C.jaune,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,flexShrink:0}}>
                    {initiales(p.nom)}
                  </div>
                  <div style={{flex:1,minWidth:200}}>
                    <div style={{fontFamily:FT,fontSize:18,fontWeight:800,letterSpacing:"-0.01em"}}>{p.nom}</div>
                    <div style={{fontSize:11,color:C.gris,marginTop:2}}>
                      {p.poste}
                      {p._type==="interim" && <span style={{marginLeft:8,fontSize:10,padding:"2px 7px",fontWeight:700,color:"#fff",background:ag?.couleur}}>{ag?.nom}</span>}
                    </div>
                  </div>
                  {/* KPI totaux */}
                  <div style={{display:"flex",gap:24,alignItems:"center",flexWrap:"wrap"}}>
                    {[
                      ["TOTAL PÉRIODE", fmtH(totalH), C.encre],
                      ["CETTE SEMAINE", fmtH(totalSem35), C.encre],
                      ...(totalSup>0 ? [["H. SUP (>7h/j)", "+"+fmtH(totalSup), C.orange]] : []),
                      ...(totalNuit>0 ? [["H. NUIT (>20h)", fmtH(totalNuit), "#6C3483"]] : []),
                      ["JOURS", ptgPersonne.length, C.encre],
                    ].map(([l,v,col])=>(
                      <div key={l} style={{textAlign:"center"}}>
                        <div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:3}}>{l}</div>
                        <div style={{fontFamily:FT,fontSize:22,fontWeight:800,color:col}}>{v}</div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Tableau jour par jour */}
                {ptgPersonne.length===0
                  ? <div style={{padding:"20px",fontSize:12,color:C.gris,fontStyle:"italic"}}>Aucun pointage sur cette période.</div>
                  : <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                      <thead>
                        <tr style={{background:C.fond}}>
                          <th style={{...th9,textAlign:"left"}}>Date</th>
                          <th style={{...th9,textAlign:"left"}}>Chantier</th>
                          <th style={{...th9,textAlign:"left"}}>Lieu</th>
                          <th style={{...th9,textAlign:"right"}}>Début</th>
                          <th style={{...th9,textAlign:"right"}}>Fin</th>
                          <th style={{...th9,textAlign:"right"}}>Pause</th>
                          <th style={{...th9,textAlign:"right"}}>Total</th>
                          <th style={{...th9,textAlign:"right",color:"#6C3483"}}>H. Nuit</th>
                          <th style={{...th9,textAlign:"center"}}>État</th>
                        </tr>
                      </thead>
                      <tbody>
                        {(() => {
                          const rows = [];
                          // Trier les semaines puis les dates dans chaque semaine
                          const semainesTriees = Object.entries(parSemaine).sort(([a],[b])=>b.localeCompare(a));
                          semainesTriees.forEach(([semCle, ptgsSem])=>{
                            const datesSem = [...new Set(ptgsSem.map(x=>x.date))].sort((a,b)=>b.localeCompare(a));
                            // Ligne séparateur semaine
                            const totalSemH = ptgsSem.reduce((s,x)=>s+calcHeures(x),0);
                            const supSem = calcHSupSemaine(ptgsSem);
                            // Lignes de pointages de la semaine
                            datesSem.forEach(date=>{
                              const lignes = ptgsSem.filter(x=>x.date===date);
                              const isWeekend = [0,6].includes(new Date(date+"T00:00:00").getDay());
                              lignes.forEach((x,idx)=>{
                                const ch=chantiers.find(c=>c.id===x.chantier);
                                const h=calcHeures(x);
                                const hNuit=calcHNuit(x);
                                rows.push(
                                  <tr key={x.id} style={{borderBottom:`1px solid ${C.ligne}`,background:isWeekend?"#FFF8E1":idx%2===0?C.papier:"#F8F6F0"}}>
                                    {idx===0
                                      ? <td rowSpan={lignes.length} style={{padding:"10px 16px",verticalAlign:"top",borderRight:`1px solid ${C.ligne}`,whiteSpace:"nowrap"}}>
                                          <div style={{fontWeight:700,fontSize:11}}>{fmtDate(date)}</div>
                                        </td>
                                      : null}
                                    <td style={{padding:"10px 16px",verticalAlign:"middle"}}>
                                      {ch ? <span style={{fontSize:11,padding:"3px 8px",fontWeight:700,background:ch.couleur,color:ch.couleur==="#F5C518"?"#0A0A0A":"#fff"}}>{ch.nom}</span> : <span style={{color:C.gris}}>—</span>}
                                    </td>
                                    <td style={{padding:"10px 16px",verticalAlign:"middle",fontSize:11,color:C.gris}}>{ch?`📍 ${ch.ville}`:"—"}</td>
                                    <td style={{padding:"10px 16px",verticalAlign:"middle",textAlign:"right",fontWeight:500}}>{x.debut}</td>
                                    <td style={{padding:"10px 16px",verticalAlign:"middle",textAlign:"right",fontWeight:500}}>{x.fin}</td>
                                    <td style={{padding:"10px 16px",verticalAlign:"middle",textAlign:"right",color:C.gris}}>{x.pause}min</td>
                                    <td style={{padding:"10px 16px",verticalAlign:"middle",textAlign:"right"}}>
                                      <b style={{fontFamily:FT,fontSize:15}}>{fmtH(h)}</b>
                                    </td>
                                    <td style={{padding:"10px 16px",verticalAlign:"middle",textAlign:"right"}}>
                                      {hNuit>0 ? <b style={{color:"#6C3483",fontSize:13}}>{fmtH(hNuit)}</b> : <span style={{color:C.ligne}}>—</span>}
                                    </td>
                                    <td style={{padding:"10px 16px",verticalAlign:"middle",textAlign:"center"}}>
                                      {x.valide ? <span style={{fontSize:10,color:C.vert,fontWeight:700}}>✓ VALIDÉ</span> : <span style={{fontSize:10,color:C.orange,fontWeight:700}}>⏳ ATTENTE</span>}
                                    </td>
                                  </tr>
                                );
                              });
                            });
                            // Ligne bilan de la semaine
                            rows.push(
                              <tr key={`sem-${semCle}`} style={{borderTop:`1.5px solid ${C.encre}`,background:"#F0F4F8"}}>
                                <td colSpan={6} style={{padding:"8px 16px",fontSize:10,fontWeight:700,color:C.gris,letterSpacing:"0.1em"}}>
                                  SEMAINE {semCle.split("-S")[1]} · {semCle.split("-S")[0]}
                                </td>
                                <td style={{padding:"8px 16px",textAlign:"right"}}>
                                  <b style={{fontFamily:FT,fontSize:15}}>{fmtH(totalSemH)}</b>
                                </td>
                                <td style={{padding:"8px 16px",textAlign:"right",fontSize:10,color:C.gris}}>
                                  {ptgsSem.reduce((s,x)=>s+calcHNuit(x),0)>0 ? fmtH(ptgsSem.reduce((s,x)=>s+calcHNuit(x),0)) : "—"}
                                </td>
                                <td style={{padding:"8px 16px",textAlign:"center"}}>
                                  {supSem>0
                                    ? <span style={{fontSize:11,fontWeight:700,color:C.orange}}>+{fmtH(supSem)} H.SUP</span>
                                    : <span style={{fontSize:10,color:C.vert,fontWeight:700}}>{fmtH(totalSemH)} / 35h ✓</span>
                                  }
                                </td>
                              </tr>
                            );
                          });
                          return rows;
                        })()}
                        {/* Ligne totaux globaux */}
                        <tr style={{borderTop:`2px solid ${C.encre}`,background:C.fond}}>
                          <td colSpan={6} style={{padding:"10px 16px",fontSize:11,fontWeight:700,letterSpacing:"0.05em"}}>TOTAL PÉRIODE</td>
                          <td style={{padding:"10px 16px",textAlign:"right"}}><b style={{fontFamily:FT,fontSize:18,fontWeight:800}}>{fmtH(totalH)}</b></td>
                          <td style={{padding:"10px 16px",textAlign:"right"}}>
                            {totalNuit>0 ? <b style={{fontFamily:FT,fontSize:16,color:"#6C3483"}}>{fmtH(totalNuit)}</b> : <span style={{color:C.ligne}}>—</span>}
                          </td>
                          <td style={{padding:"10px 16px",textAlign:"center"}}>
                            {totalSup>0 ? <b style={{fontFamily:FT,fontSize:16,color:C.orange}}>+{fmtH(totalSup)} H.SUP</b> : <span style={{color:C.ligne}}>—</span>}
                          </td>
                        </tr>
                        {/* Mention légale intérimaire */}
                        {p._type==="interim" && (
                          <tr>
                            <td colSpan={9} style={{padding:"10px 16px",fontSize:10,color:C.gris,borderTop:`1px solid ${C.ligne}`,fontStyle:"italic"}}>
                              Relevé de mission — {p.nom} · Agence {ag?.nom} · Période : {modeVue} · Généré le {new Date().toLocaleDateString("fr-FR")}
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                }
              </div>
            );
          })
      }
    </Section>
  );
}

function VueSalarie({session, pointages, chantiers, salaries, interimaires}) {
  const personne = salaries.find(s=>s.id===session.personneId) || interimaires.find(i=>i.id===session.personneId);
  const ag = personne && interimaires.find(i=>i.id===personne.id) ? AGENCES.find(a=>a.id===personne.agence) : null;
  const mesPtg = pointages.filter(p=>p.salarie===session.personneId).sort((a,b)=>b.date.localeCompare(a.date));

  const totalTout = mesPtg.reduce((s,p)=>s+calcHeures(p),0);

  // Semaine courante
  const semaine = (() => {
    const d=new Date(), day=d.getDay()||7;
    const lundi=new Date(d); lundi.setDate(d.getDate()-day+1);
    return Array.from({length:5},(_,i)=>{const x=new Date(lundi);x.setDate(lundi.getDate()+i);return x.toISOString().slice(0,10);});
  })();
  const totalSem = mesPtg.filter(p=>semaine.includes(p.date)).reduce((s,p)=>s+calcHeures(p),0);
  const hSup = Math.max(0, totalSem - 35);

  const fmtDate = (iso) => new Date(iso+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"}).toUpperCase();

  if (!personne) return <div style={{padding:48,textAlign:"center",color:C.gris}}>Profil introuvable.</div>;

  return (
    <main style={{padding:"28px 32px",maxWidth:900,margin:"0 auto"}}>
      {/* En-tête personne */}
      <div style={{display:"flex",alignItems:"center",gap:20,padding:"24px",background:C.papier,border:`2px solid ${C.encre}`,marginBottom:24}}>
        <div style={{width:64,height:64,background:ag?ag.couleur:C.encre,color:ag?"#fff":C.jaune,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FT,fontWeight:800,fontSize:22,flexShrink:0}}>
          {initiales(personne.nom)}
        </div>
        <div style={{flex:1}}>
          <div style={{fontFamily:FT,fontSize:28,fontWeight:800,letterSpacing:"-0.02em"}}>{personne.nom}</div>
          <div style={{fontSize:12,color:C.gris,marginTop:4,display:"flex",alignItems:"center",gap:10}}>
            <span>{personne.poste}</span>
            {ag && <span style={{fontSize:10,padding:"2px 8px",fontWeight:700,color:"#fff",background:ag.couleur}}>{ag.nom}</span>}
          </div>
        </div>
        {/* KPI rapides */}
        <div style={{display:"flex",gap:24}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4}}>CETTE SEMAINE</div>
            <div style={{fontFamily:FT,fontSize:28,fontWeight:800}}>{fmtH(totalSem)}</div>
          </div>
          {hSup > 0 && <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4}}>H. SUP</div>
            <div style={{fontFamily:FT,fontSize:28,fontWeight:800,color:C.orange}}>+{fmtH(hSup)}</div>
          </div>}
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4}}>TOTAL</div>
            <div style={{fontFamily:FT,fontSize:28,fontWeight:800}}>{fmtH(totalTout)}</div>
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4}}>JOURS</div>
            <div style={{fontFamily:FT,fontSize:28,fontWeight:800}}>{mesPtg.length}</div>
          </div>
        </div>
      </div>

      {/* Tableau de mes pointages */}
      <div style={{fontFamily:FM,fontSize:11,color:C.gris,letterSpacing:"0.2em",marginBottom:12}}>MES RAPPORTS D'HEURES</div>

      {mesPtg.length === 0
        ? <div style={{padding:"48px",textAlign:"center",background:C.papier,border:`1.5px dashed ${C.ligne}`,fontSize:14,color:C.gris}}>
            Aucun rapport d'heures enregistré pour le moment.
          </div>
        : <div style={{background:C.papier,border:`1.5px solid ${C.encre}`,overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr style={{background:C.fond}}>
                  {["Date","Chantier","Lieu","Début","Fin","Pause","Total","État"].map((h,i)=>(
                    <th key={h} style={{padding:"11px 16px",textAlign:i>2?"right":"left",fontSize:9,letterSpacing:"0.15em",color:C.gris,fontWeight:500,borderBottom:`1px solid ${C.ligne}`,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {mesPtg.map((p,idx)=>{
                  const ch = chantiers.find(c=>c.id===p.chantier);
                  const h = calcHeures(p);
                  const estAujourd = p.date === TODAY;
                  return (
                    <tr key={p.id} style={{borderBottom:`1px solid ${C.ligne}`,background:estAujourd?"#FFFDE7":idx%2===0?C.papier:"#F8F6F0"}}>
                      <td style={{padding:"12px 16px",whiteSpace:"nowrap"}}>
                        <div style={{fontWeight:estAujourd?700:500,fontSize:12}}>{fmtDate(p.date)}</div>
                        {estAujourd && <div style={{fontSize:10,color:C.vert,fontWeight:700,marginTop:2}}>AUJOURD'HUI</div>}
                      </td>
                      <td style={{padding:"12px 16px"}}>
                        {ch
                          ? <span style={{fontSize:11,padding:"3px 8px",fontWeight:700,background:ch.couleur,color:ch.couleur==="#F5C518"?"#0A0A0A":"#fff"}}>{ch.nom}</span>
                          : <span style={{color:C.gris}}>—</span>}
                      </td>
                      <td style={{padding:"12px 16px",fontSize:11,color:C.gris}}>{ch?`📍 ${ch.ville}`:"—"}</td>
                      <td style={{padding:"12px 16px",textAlign:"right",fontWeight:500}}>{p.debut}</td>
                      <td style={{padding:"12px 16px",textAlign:"right",fontWeight:500}}>{p.fin}</td>
                      <td style={{padding:"12px 16px",textAlign:"right",color:C.gris}}>{p.pause}min</td>
                      <td style={{padding:"12px 16px",textAlign:"right"}}>
                        <b style={{fontFamily:FT,fontSize:16}}>{fmtH(h)}</b>
                      </td>
                      <td style={{padding:"12px 16px",textAlign:"right"}}>
                        {p.valide
                          ? <span style={{fontSize:10,color:C.vert,fontWeight:700}}>✓ VALIDÉ</span>
                          : <span style={{fontSize:10,color:C.orange,fontWeight:700}}>⏳ EN ATTENTE</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr style={{borderTop:`2px solid ${C.encre}`,background:C.fond}}>
                  <td colSpan={6} style={{padding:"12px 16px",fontWeight:700,fontSize:11,letterSpacing:"0.05em"}}>TOTAL</td>
                  <td style={{padding:"12px 16px",textAlign:"right"}}><b style={{fontFamily:FT,fontSize:20,fontWeight:800}}>{fmtH(totalTout)}</b></td>
                  <td></td>
                </tr>
              </tfoot>
            </table>
          </div>
      }

      <div style={{marginTop:16,padding:"12px 16px",background:"#FFF8E1",border:`1px solid ${C.ligne}`,fontSize:11,color:C.gris,lineHeight:1.6}}>
        🔒 Vous consultez uniquement vos propres heures. Pour toute modification, contactez la RH.
      </div>
    </main>
  );
}

            <div style={{fontFamily:FT,fontSize:22,fontWeight:800,letterSpacing:"-0.02em",lineHeight:1.1,marginTop:4}}>CHOK BÉTON</div>
            <div style={{fontSize:10,color:C.gris,letterSpacing:"0.08em",marginTop:4}}>
              {new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"}).toUpperCase()}

          {etape==="nouveau-interim" && <MNouvelInt onAnnuler={()=>setEtape("equipe")} onCreer={i=>{setInterimaires([...interimaires,i]);setEquipe([...equipe,{id:i.id,type:"interim",debut:"08:00",fin:"16:00",pause:60}]);setEtape("equipe");}}/>}
          {etape==="pointage"    && <MPointage chantier={chantierSel} chef={chefSel} equipe={equipe} setEquipe={setEquipe} salaries={salaries} interimaires={interimaires} onRetour={()=>setEtape("equipe")} onValider={(validationsInt)=>{

              pause:m.pause,
              valide:false,
              interim:m.type==="interim",

            setPointages([...pointages,...nouveaux]);

        </div>
      </aside>
    </main>
  );
}

  const [chSel,setChSel] = useState(null);

  const actifs = chantiers.filter(c=>c.actif);
  // Le chef peut être un salarié OU un intérimaire
  const tousChefs = [
    ...salaries.map(s=>({...s, _type:"interne"})),
    ...interimaires.map(i=>({...i, _type:"interim"})),
  ];
  const ok = chSel && chefId;
  const trouverChef = (id) => tousChefs.find(p=>p.id===id);
  return (
    <>
      <div style={{padding:"0 24px 14px"}}>
        <div style={{fontSize:10,color:C.gris,letterSpacing:"0.2em",marginBottom:10}}>CHANTIER DU JOUR</div>
        {actifs.length===0
          ? <div style={{padding:"10px 12px",background:"#FFF8E1",border:`1px solid ${C.ligne}`,fontSize:11,lineHeight:1.5}}>Aucun chantier actif. Créez-en un ci-dessous ou dans l'onglet Admin.</div>
          : <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {actifs.map(c=>(
                <button key={c.id} onClick={()=>setChSel(c)} style={{background:chSel?.id===c.id?C.papier:C.fond,border:`1.5px solid ${chSel?.id===c.id?C.encre:C.ligne}`,borderLeft:`5px solid ${c.couleur}`,padding:"10px 12px",cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center",fontFamily:FM}}>
                  <div><div style={{fontSize:12,fontWeight:700}}>{c.nom}</div><div style={{fontSize:10,color:C.gris,marginTop:2}}>{c.ville}</div></div>
                  {chSel?.id===c.id && <span style={{color:C.vert,fontWeight:700}}>✓</span>}
                </button>
              ))}
            </div>
        }
      </div>
      <div style={{padding:"0 24px 14px"}}>
        <div style={{fontSize:10,color:C.gris,letterSpacing:"0.2em",marginBottom:10}}>CHEF D'ÉQUIPE</div>
        {tousChefs.length===0
          ? <div style={{padding:"10px 12px",background:"#FFF8E1",border:`1px solid ${C.ligne}`,fontSize:11}}>Aucun salarié ni intérimaire. Ajoutez-en depuis l'onglet Admin.</div>
          : <select value={chefId} onChange={e=>setChefId(e.target.value)} style={{...selectStyle,width:"100%"}}>
              <option value="" disabled>— Qui est le chef aujourd'hui ? —</option>
              {salaries.length>0 && <optgroup label="── Salariés CHOK BÉTON">
                {salaries.map(s=><option key={s.id} value={s.id}>{s.nom} · {s.poste}</option>)}
              </optgroup>}
              {interimaires.length>0 && <optgroup label="── Intérimaires">
                {interimaires.map(i=>{const ag=AGENCES.find(a=>a.id===i.agence); return <option key={i.id} value={i.id}>{i.nom} · {ag?.nom}</option>;})}
              </optgroup>}
            </select>
        }
      </div>
      <div style={{flex:1}}/>
      <MBtn variant="alt" onClick={onNouveau}>+ NOUVEAU CHANTIER</MBtn>
      <MBtn disabled={!ok} onClick={()=>ok&&onSuite(chSel,trouverChef(chefId))}>→ COMPOSER L'ÉQUIPE</MBtn>
    </>
  );
}

function MNouveauChantier({onAnnuler,onCreer}) {
  const [nom,setNom]     = useState("");
  const [ville,setVille] = useState("");
  const [client,setClient] = useState("");
  const [couleur,setCouleur] = useState(COULEURS_CHANTIER[0]);
  const ok = nom.length>2;
  return (
    <MFormWrap titre="NOUVEAU CHANTIER" onRetour={onAnnuler}>
      <MChamp label="NOM DU CHANTIER"><input value={nom} onChange={e=>setNom(e.target.value)} placeholder="Résidence Belle Vue" style={mInputStyle}/></MChamp>
      <MChamp label="VILLE"><input value={ville} onChange={e=>setVille(e.target.value)} placeholder="Ex : Villeurbanne" style={mInputStyle}/></MChamp>
      <MChamp label="CLIENT (OPTIONNEL)"><input value={client} onChange={e=>setClient(e.target.value)} placeholder="Ex : Vinci" style={mInputStyle}/></MChamp>
      <MChamp label="COULEUR">
        <div style={{display:"flex",gap:8}}>
          {COULEURS_CHANTIER.map(c=><button key={c} onClick={()=>setCouleur(c)} style={{width:32,height:32,background:c,border:"none",cursor:"pointer",outline:couleur===c?"3px solid #0A0A0A":"none",outlineOffset:2}}/>)}
        </div>
      </MChamp>
      <MBtn disabled={!ok} onClick={()=>ok&&onCreer({id:genId("C"),nom,ville:ville||"—",client:client||"—",couleur,actif:true})}>✓ CRÉER LE CHANTIER</MBtn>
    </MFormWrap>
  );
}

function MEquipe({chantier,chef,salaries,interimaires,equipe,setEquipe,onRetour,onSuite,onAjoutInt}) {
  useEffect(()=>{
    if(chef && !equipe.find(m=>m.id===chef.id))
      setEquipe([{id:chef.id,type:"interne",debut:"08:00",fin:"16:00",pause:60}]);
  },[chef]);

  const add = (id,type) => { if(!equipe.find(m=>m.id===id)) setEquipe([...equipe,{id,type,debut:"08:00",fin:"16:00",pause:60}]); };
  const del = (id) => { if(id!==chef?.id) setEquipe(equipe.filter(m=>m.id!==id)); };

  const getNom = (id) => { const s=salaries.find(x=>x.id===id); if(s) return s.nom; const i=interimaires.find(x=>x.id===id); return i?i.nom:id; };
  const getAg = (id) => { const i=interimaires.find(x=>x.id===id); return i?AGENCES.find(a=>a.id===i.agence):null; };

  const autreSal = salaries.filter(s=>s.id!==chef?.id&&!equipe.find(m=>m.id===s.id));
  const autreInt = interimaires.filter(i=>!equipe.find(m=>m.id===i.id));

  return (
    <MFormWrap titre="ÉQUIPE DU JOUR" onRetour={onRetour}>
      <ChantierBandeau chantier={chantier}/>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {equipe.map(m=>{
          const ag=m.type==="interim"?getAg(m.id):null;
          return (
            <div key={m.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 10px",background:C.fond,border:`1.5px solid ${C.ligne}`}}>
              <div style={{width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:11,flexShrink:0,background:m.id===chef?.id?"#0A0A0A":ag?.couleur||"#3D5A80",color:"#fff"}}>{initiales(getNom(m.id))}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700}}>{getNom(m.id)}</div>
                <div style={{fontSize:10,color:C.gris,marginTop:1}}>{m.id===chef?.id?"Chef d'équipe · TOI":m.type==="interim"?`INTÉRIM · ${ag?.nom||""}`:"Salarié interne"}</div>
              </div>
              {m.id!==chef?.id && <button onClick={()=>del(m.id)} style={{background:"transparent",border:`1px solid ${C.gris}`,color:C.gris,width:26,height:26,cursor:"pointer",fontSize:16,lineHeight:1,flexShrink:0}}>×</button>}
            </div>
          );
        })}

        {autreSal.length>0 && <select defaultValue="" onChange={e=>{if(e.target.value){add(e.target.value,"interne");e.target.value="";}}} style={{...mInputStyle,marginTop:4}}>
          <option value="" disabled>+ Ajouter un salarié CHOK BÉTON</option>
          {autreSal.map(s=><option key={s.id} value={s.id}>{s.nom} · {s.poste}</option>)}
        </select>}

        {autreInt.length>0 && <select defaultValue="" onChange={e=>{if(e.target.value){add(e.target.value,"interim");e.target.value="";}}} style={mInputStyle}>
          <option value="" disabled>+ Ajouter un intérimaire</option>
          {autreInt.map(i=>{const ag=AGENCES.find(a=>a.id===i.agence);return <option key={i.id} value={i.id}>{i.nom} · {ag?.nom}</option>;})}
        </select>}

        <button onClick={onAjoutInt} style={{padding:"11px",background:"transparent",border:`1.5px dashed ${C.encre}`,fontFamily:FM,fontSize:11,fontWeight:700,color:C.encre,cursor:"pointer"}}>
          + NOUVEL INTÉRIMAIRE (pas encore fiché)
        </button>
      </div>
      <MBtn disabled={equipe.length===0} onClick={()=>equipe.length>0&&onSuite()}>→ SAISIR LES HORAIRES</MBtn>
    </MFormWrap>
  );
}

function MNouvelInt({onAnnuler,onCreer}) {
  const [nom,setNom]     = useState("");
  const [poste,setPoste] = useState("Manœuvre");
  const [agence,setAgence] = useState(AGENCES[0].id);
  const ok = nom.trim().length>2;
  return (
    <MFormWrap titre="NOUVEL INTÉRIMAIRE" onRetour={onAnnuler}>
      <MChamp label="NOM COMPLET"><input value={nom} onChange={e=>setNom(e.target.value)} placeholder="Prénom Nom" style={mInputStyle}/></MChamp>
      <MChamp label="POSTE"><select value={poste} onChange={e=>setPoste(e.target.value)} style={mInputStyle}>{POSTES.map(p=><option key={p}>{p}</option>)}</select></MChamp>
      <MChamp label="AGENCE"><select value={agence} onChange={e=>setAgence(e.target.value)} style={mInputStyle}>{AGENCES.map(a=><option key={a.id} value={a.id}>{a.nom}</option>)}</select></MChamp>
      <div style={{padding:"10px 12px",background:"#FFF8E1",border:`1px solid ${C.ligne}`,fontSize:11,lineHeight:1.5}}>💡 Il sera ajouté à la base RH pour les prochaines fois.</div>
      <MBtn disabled={!ok} onClick={()=>ok&&onCreer({id:genId("I"),nom:nom.trim(),poste,agence})}>✓ AJOUTER À L'ÉQUIPE</MBtn>
    </MFormWrap>
  );
}

function MPointage({chantier,chef,equipe,setEquipe,salaries,interimaires,onRetour,onValider}) {
  const getNom = (id) => { const s=salaries.find(x=>x.id===id); if(s) return s.nom; const i=interimaires.find(x=>x.id===id); return i?i.nom:id; };
  const getAg  = (id) => { const i=interimaires.find(x=>x.id===id); return i?AGENCES.find(a=>a.id===i.agence):null; };
  const upd = (id,k,v) => setEquipe(equipe.map(m=>m.id===id?{...m,[k]:k==="pause"?parseInt(v)||0:v}:m));

  // Validation intérimaires : chaque intérimaire doit cocher sa case
  const [validationsInt, setValidationsInt] = useState({});
  const interimDansEquipe = equipe.filter(m=>m.type==="interim");
  const tousInterimValides = interimDansEquipe.every(m=>validationsInt[m.id]);
  const peutEnvoyer = tousInterimValides || interimDansEquipe.length===0;

  const toggleValidInt = (id) => setValidationsInt(prev=>({...prev,[id]:!prev[id]}));

  return (
    <MFormWrap titre="HORAIRES PAR PERSONNE" onRetour={onRetour}>
      <ChantierBandeau chantier={chantier}/>

      <div style={{overflowY:"auto",flex:1,padding:"0 0 8px"}}>
        {equipe.map(m=>{
          const isChef=m.id===chef?.id;
          const isInt=m.type==="interim";
          const ag=isInt?getAg(m.id):null;
          const total=calcHeures(m);
          const valide=validationsInt[m.id];
          return (
            <div key={m.id} style={{marginBottom:12,padding:"12px",background:C.fond,border:`1.5px solid ${isInt&&valide?C.vert:C.ligne}`}}>
              {/* En-tête membre */}
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <div style={{width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:11,flexShrink:0,background:isChef?"#0A0A0A":ag?.couleur||"#3D5A80",color:"#fff"}}>{initiales(getNom(m.id))}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700}}>{getNom(m.id)}</div>
                  <div style={{fontSize:10,color:C.gris}}>{isChef?"CHEF D'ÉQUIPE":isInt?`INTÉRIM · ${ag?.nom}`:"SALARIÉ CHOK BÉTON"}</div>
                </div>
                <div style={{fontFamily:FT,fontSize:16,fontWeight:800,background:C.encre,color:C.jaune,padding:"3px 10px"}}>{fmtH(total)}</div>
              </div>

              {/* Horaires */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:isInt?12:0}}>
                {[["DÉBUT","time","debut"],["FIN","time","fin"],["PAUSE (min)","number","pause"]].map(([l,t,k])=>(
                  <div key={k}>
                    <div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4,fontWeight:700}}>{l}</div>
                    <input type={t} value={m[k]} onChange={e=>upd(m.id,k,e.target.value)} style={{width:"100%",padding:"10px 8px",background:C.papier,border:`1.5px solid ${C.ligne}`,fontFamily:FM,fontSize:13,outline:"none",textAlign:"center",fontWeight:700,boxSizing:"border-box"}}/>
                  </div>
                ))}
              </div>

              {/* Case à cocher validation intérimaire */}
              {isInt && (
                <div
                  onClick={()=>toggleValidInt(m.id)}
                  style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px",background:valide?"#E8F5E9":"#FFF8E1",border:`1.5px solid ${valide?C.vert:C.orange}`,cursor:"pointer",marginTop:4}}
                >
                  {/* Checkbox custom */}
                  <div style={{width:22,height:22,border:`2px solid ${valide?C.vert:C.orange}`,background:valide?C.vert:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                    {valide && <span style={{color:"#fff",fontSize:14,fontWeight:700,lineHeight:1}}>✓</span>}
                  </div>
                  <div style={{fontSize:11,lineHeight:1.5,color:C.encre}}>
                    <b style={{display:"block",marginBottom:3,fontSize:12}}>
                      {valide ? "✓ HEURES ACCEPTÉES" : "Je soussigné(e) certifie exact le relevé d'heures ci-dessus"}
                    </b>
                    {!valide && <span style={{color:C.gris}}>
                      {getNom(m.id)} · {chantier?.nom} · {m.debut}–{m.fin} ({m.pause}min pause) = <b>{fmtH(total)}</b><br/>
                      En cochant cette case, j'atteste que ces horaires sont exacts et j'autorise leur transmission à l'agence <b>{ag?.nom}</b>.
                    </span>}
                    {valide && <span style={{color:C.vert,fontSize:10}}>
                      {getNom(m.id)} a validé · {fmtH(total)} · Transmis à {ag?.nom}
                    </span>}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {!peutEnvoyer && (
        <div style={{margin:"0 0 8px",padding:"10px 14px",background:"#FFF0F0",border:`1px solid ${C.orange}`,fontSize:11,color:C.orange,fontWeight:700}}>
          ⚠ En attente de la validation de {interimDansEquipe.filter(m=>!validationsInt[m.id]).map(m=>getNom(m.id)).join(", ")}
        </div>
      )}

      <MBtn disabled={!peutEnvoyer} onClick={()=>peutEnvoyer&&onValider(validationsInt)}>✓ ENVOYER LE RAPPORT</MBtn>
    </MFormWrap>
  );
}

function MConfirm({chantier,equipe,onReset}) {
  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"28px 24px 8px"}}>
      <div style={{width:68,height:68,background:C.vert,color:C.papier,display:"flex",alignItems:"center",justifyContent:"center",fontSize:34,fontWeight:700,marginBottom:18}}>✓</div>
      <div style={{fontFamily:FT,fontSize:20,fontWeight:800,letterSpacing:"-0.02em",textAlign:"center"}}>RAPPORT ENVOYÉ</div>
      <div style={{fontSize:12,color:C.gris,textAlign:"center",marginTop:8,lineHeight:1.6}}>{equipe.length} pointage(s) transmis<br/>en attente de validation RH.</div>
      <div style={{width:"100%",marginTop:18,padding:14,background:C.fond,fontSize:11}}>
        <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0"}}><span>Chantier</span><b>{chantier?.nom}</b></div>
        <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0"}}><span>Équipe</span><b>{equipe.length} pers.</b></div>
        <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0"}}><span>État</span><b style={{color:C.orange}}>EN ATTENTE VALIDATION</b></div>
      </div>
      <MBtn onClick={onReset}>RETOUR ACCUEIL</MBtn>
    </div>
  );
}

// ============================================================
//  COMPOSANTS UTILITAIRES
// ============================================================
function Clock() {
  const [h,setH] = useState(heureFr());
  useEffect(()=>{ const t=setInterval(()=>setH(heureFr()),30000); return()=>clearInterval(t); },[]);
  return <span>{h}</span>;
}

function Kpi({label,val,sub,accent,alert}) {
  return (
    <div style={{background:alert?"#FFF8E1":C.papier,padding:"18px 16px 20px",position:"relative",border:`1.5px solid ${C.encre}`,overflow:"hidden"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:5,background:accent}}/>
      <div style={{fontSize:10,color:C.gris,letterSpacing:"0.18em",marginTop:5,marginBottom:12}}>{label.toUpperCase()}</div>
      <div style={{fontFamily:FT,fontSize:30,fontWeight:800,lineHeight:1,letterSpacing:"-0.03em"}}>{val}</div>
      <div style={{fontSize:10,color:C.gris,marginTop:8}}>{sub}</div>
    </div>
  );
}

function Avatar({nom,bg,light}) {
  return <div style={{width:32,height:32,background:bg||C.encre,color:light?"#fff":C.jaune,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:11,flexShrink:0}}>{initiales(nom)}</div>;
}

function Section({titre,actions,children}) {
  return (
    <section style={{marginBottom:32}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:12}}>
        <h2 style={{fontFamily:FT,fontSize:22,fontWeight:700,letterSpacing:"-0.01em",margin:0}}>{titre}</h2>
        {actions}
      </div>
      {children}
    </section>
  );
}

function TableWrap({children}) {
  return <div style={{background:C.papier,border:`1.5px solid ${C.encre}`,overflowX:"auto"}}><table>{children}</table></div>;
}
function Th({children,r}) { return <th style={{textAlign:r?"right":"left",padding:"11px 14px",fontSize:10,letterSpacing:"0.15em",color:C.gris,fontWeight:500,borderBottom:`1px solid ${C.ligne}`,background:C.fond,textTransform:"uppercase",whiteSpace:"nowrap"}}>{children}</th>; }
function Td({children,r}) { return <td style={{padding:"12px 14px",verticalAlign:"middle",textAlign:r?"right":"left"}}>{children}</td>; }

function EmptyState({children}) {
  return <div style={{padding:"48px 24px",textAlign:"center",background:C.papier,border:`1.5px dashed ${C.ligne}`,fontSize:14,lineHeight:1.8}}>{children}</div>;
}

function FormInline({children}) {
  return <div style={{background:C.papier,border:`1.5px solid ${C.encre}`,padding:"16px 20px",marginBottom:20}}>{children}</div>;
}

function Champ({label,children}) {
  return <div style={{display:"flex",flexDirection:"column",gap:6,flex:1,minWidth:180}}>
    <label style={{fontSize:10,color:C.gris,letterSpacing:"0.18em",fontWeight:700}}>{label}</label>
    {children}
  </div>;
}

function ErrBox({children}) {
  return <div style={{marginTop:10,padding:"8px 12px",background:"#FFF0F0",border:`1px solid ${C.orange}`,color:C.orange,fontSize:12}}>{children}</div>;
}

function Btn({children,onClick,variant,disabled,style}) {
  const base = {fontFamily:FM,cursor:disabled?"not-allowed":"pointer",letterSpacing:"0.05em",fontWeight:700,border:"none"};
  const variants = {
    default:{...base,fontSize:12,padding:"9px 16px",background:C.jaune,border:`1.5px solid ${C.encre}`,color:C.encre},
    ghost:{...base,fontSize:12,padding:"9px 14px",background:"transparent",border:`1.5px solid ${C.encre}`,color:C.encre},
    export:{...base,fontSize:12,padding:"10px 18px",background:C.encre,border:`1.5px solid ${C.encre}`,color:C.jaune},
    danger:{...base,fontSize:10,padding:"6px 12px",background:"transparent",border:`1.5px solid ${C.orange}`,color:C.orange},
    mini:{...base,fontSize:10,padding:"5px 10px",background:C.encre,color:C.jaune},
    "danger-mini":{...base,fontSize:10,padding:"5px 8px",background:"transparent",border:`1px solid ${C.orange}`,color:C.orange},
  };
  const v = variants[variant||"default"];
  return <button onClick={disabled?undefined:onClick} style={{...v,opacity:disabled?0.4:1,...(style||{})}}>{children}</button>;
}

// Mobile helpers
function MBtn({children,onClick,variant,disabled}) {
  const base = {margin:"6px 24px 8px",padding:"17px",border:"none",fontFamily:FM,fontSize:13,fontWeight:700,letterSpacing:"0.1em",cursor:disabled?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10};
  if(disabled) return <button style={{...base,background:C.ligne,color:C.gris}} disabled>{children}</button>;
  if(variant==="alt") return <button onClick={onClick} style={{...base,background:"transparent",color:C.encre,border:`2px solid ${C.encre}`,padding:"15px 24px"}}>{children}</button>;
  return <button onClick={onClick} style={{...base,background:C.encre,color:C.jaune}}>{children}</button>;
}

function MFormWrap({titre,onRetour,children}) {
  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"0 24px 12px",display:"flex",alignItems:"center",gap:14,borderBottom:`1px solid ${C.ligne}`,marginBottom:14,flexShrink:0}}>
        <button onClick={onRetour} style={{background:"transparent",border:"none",color:C.encre,fontFamily:FM,fontSize:12,cursor:"pointer",padding:0}}>← Annuler</button>
        <span style={{fontFamily:FM,fontSize:11,letterSpacing:"0.2em",color:C.gris,fontWeight:700}}>{titre}</span>
      </div>
      <div style={{padding:"0 24px",display:"flex",flexDirection:"column",gap:14,overflowY:"auto",flex:1}}>
        {children}
      </div>
    </div>
  );
}

function MChamp({label,children}) {
  return <div><div style={{fontSize:10,color:C.gris,letterSpacing:"0.2em",marginBottom:6,fontWeight:700}}>{label}</div>{children}</div>;
}

function ChantierBandeau({chantier}) {
  return (
    <div style={{padding:"10px 12px",background:C.fond,borderLeft:`5px solid ${chantier?.couleur||C.gris}`,flexShrink:0}}>
      <div style={{fontSize:9,color:C.gris,letterSpacing:"0.2em"}}>CHANTIER</div>
      <div style={{fontFamily:FT,fontSize:15,fontWeight:700,marginTop:3}}>{chantier?.nom}</div>
      <div style={{fontSize:10,color:C.gris,marginTop:3}}>{chantier?.ville}</div>
    </div>
  );
}

// Styles partagés
const inputStyle = {padding:"10px 12px",background:"#F2EFE9",border:`1.5px solid #D8D2C3`,fontFamily:FM,fontSize:13,outline:"none",width:"100%",boxSizing:"border-box"};
const selectStyle = {padding:"10px 12px",background:"#F2EFE9",border:`1.5px solid #D8D2C3`,fontFamily:FM,fontSize:13,outline:"none",width:"100%",boxSizing:"border-box"};
const mInputStyle = {width:"100%",padding:"11px 12px",background:"#F2EFE9",border:`1.5px solid #D8D2C3`,fontFamily:FM,fontSize:13,outline:"none",boxSizing:"border-box"};

// ============================================================
//  FOOTER
// ============================================================
function Footer() {
  return (
    <footer style={{borderTop:`2px solid #0A0A0A`,padding:"14px 32px",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11,color:C.gris,letterSpacing:"0.05em",flexWrap:"wrap",gap:12}}>
      <span style={{fontWeight:700,color:C.encre}}>RAPPORT HEURE CHOK BÉTON — v0.9</span>
      <span style={{fontStyle:"italic",fontSize:10}}>Données stockées localement · Prochaine étape : Supabase</span>
    </footer>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
