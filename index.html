function VueMobile({chantiers,setChantiers,salaries,interimaires,setInterimaires,pointages,setPointages}) {
  const [etape,setEtape]       = useState("accueil");
  const [chantierSel,setCh]    = useState(null);
  const [chefSel,setChef]      = useState(null);
  const [equipe,setEquipe]     = useState([]);
  const [dateRapport,setDate]  = useState(TODAY);

  const reset=()=>{setEtape("accueil");setCh(null);setChef(null);setEquipe([]);setDate(TODAY);};

  // Options de date : aujourd'hui, hier, avant-hier
  const optionsDates=Array.from({length:3},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-i);
    const iso=d.toISOString().slice(0,10);
    const label=i===0?"Aujourd'hui":i===1?"Hier":"Avant-hier";
    return {iso,label};
  });

  return(
    <div className="phone-shell-outer">
      {/* Cadre téléphone */}
      <div className="phone-shell">
        {/* Encoche */}
        <div style={{position:"absolute",top:22,left:"50%",transform:"translateX(-50%)",width:110,height:28,background:"#0A0A0A",borderRadius:16,zIndex:2}}/>
        <div className="phone-inner">
          {/* Status bar */}
          <div style={{display:"flex",justifyContent:"space-between",padding:"16px 28px 6px",fontSize:12,fontWeight:700}}>
            <Clock/><span>📶 · 🔋</span>
          </div>
          {/* Header mobile */}
          <div style={{padding:"6px 28px 14px"}}>
            <div style={{fontSize:10,color:C.gris,letterSpacing:"0.2em"}}>RAPPORT HEURE</div>
            <div style={{fontFamily:FT,fontSize:22,fontWeight:800,letterSpacing:"-0.02em",lineHeight:1.1,marginTop:4}}>CHOK BÉTON</div>
            <div style={{fontSize:10,color:C.gris,letterSpacing:"0.08em",marginTop:4}}>
              {new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"}).toUpperCase()}
            </div>
          </div>

          {etape==="accueil"     && <MAccueil chantiers={chantiers} salaries={salaries} interimaires={interimaires} optionsDates={optionsDates} dateRapport={dateRapport} setDate={setDate} onNouveau={()=>setEtape("nouveau-chantier")} onSuite={(ch,chef)=>{setCh(ch);setChef(chef);setEtape("equipe");}}/>}
          {etape==="nouveau-chantier" && <MNouveauChantier onAnnuler={()=>setEtape("accueil")} onCreer={c=>{setChantiers([...chantiers,c]);setEtape("accueil");}}/>}
          {etape==="equipe"      && <MEquipe chantier={chantierSel} chef={chefSel} salaries={salaries} interimaires={interimaires} equipe={equipe} setEquipe={setEquipe} onRetour={()=>setEtape("accueil")} onSuite={()=>setEtape("pointage")} onAjoutInt={()=>setEtape("nouveau-interim")}/>}
          {etape==="nouveau-interim" && <MNouvelInt onAnnuler={()=>setEtape("equipe")} onCreer={i=>{setInterimaires([...interimaires,i]);setEquipe([...equipe,{id:i.id,type:"interim",debut:"08:00",fin:"16:00",pause:60}]);setEtape("equipe");}}/>}
          {etape==="pointage"    && <MPointage chantier={chantierSel} chef={chefSel} equipe={equipe} setEquipe={setEquipe} salaries={salaries} interimaires={interimaires} onRetour={()=>setEtape("equipe")} onValider={(validationsInt)=>{
            const now=new Date().toISOString();
            const nouveaux=equipe.map(m=>({
              id:genId("P"), salarie:m.id, chantier:chantierSel.id,
              date:dateRapport, debut:m.debut, fin:m.fin, pause:m.pause,
              commentaire:m.commentaire||"", valide:false, interim:m.type==="interim",
              valideParInterimaire:m.type==="interim"?validationsInt[m.id]===true:null,
              horodatageValidation:m.type==="interim"&&validationsInt[m.id]?now:null,
              chefNom:chefSel?.nom||"—",
            }));
            setPointages([...pointages,...nouveaux]);
            // Sauvegarder la mémoire du chef
            if(chefSel?.id){
              save(`chok_last_${chefSel.id}`,{chantierId:chantierSel.id,equipeIds:equipe.map(m=>m.id),date:dateRapport,ts:Date.now()});
            }
            setEtape("confirm");
          }}/>}
          {etape==="confirm" && <MConfirm chantier={chantierSel} equipe={equipe} dateRapport={dateRapport} onReset={reset}/>}
        </div>
        {/* Barre de navigation */}
        <div style={{position:"absolute",bottom:24,left:"50%",transform:"translateX(-50%)",width:130,height:4,background:"#fff",borderRadius:2,opacity:0.5}}/>
      </div>

      {/* Aside instructions — masqué sur mobile réel */}
      <aside className="phone-aside">
        <div style={{display:"inline-block",fontSize:10,letterSpacing:"0.2em",background:C.encre,color:C.jaune,padding:"5px 10px",fontWeight:700,marginBottom:16}}>VUE CHEF D'ÉQUIPE</div>
        <h3 style={{fontFamily:FT,fontSize:30,fontWeight:800,letterSpacing:"-0.02em",lineHeight:1.1,margin:"0 0 16px"}}>Rapport des heures du jour</h3>
        <p style={{fontSize:14,lineHeight:1.65,marginBottom:24}}>Sélectionne le chantier, compose l'équipe, et saisis les horaires <b>de chaque personne séparément</b>.</p>
        {[["1","Choisir le chantier et la date"],["2","Sélectionner son équipe"],["3","Saisir les horaires par personne"],["4","Envoyer pour validation RH"]].map(([n,l])=>(
          <div key={n} style={{fontSize:13,lineHeight:1.6,display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <span style={{width:22,height:22,background:C.encre,color:C.jaune,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>{n}</span>{l}
          </div>
        ))}
        <div style={{marginTop:24,padding:"14px 18px",background:C.jaune,fontSize:12,lineHeight:1.6,border:`1.5px solid ${C.encre}`}}>
          💡 L'appli mémorise le dernier chantier et l'équipe pour chaque chef d'équipe.
        </div>
      </aside>
    </div>
  );
}

// ---- MAccueil — avec mémoire chef et sélection date ----
function MAccueil({chantiers,salaries,interimaires,optionsDates,dateRapport,setDate,onNouveau,onSuite}) {
  const [chSel,setChSel]     = useState(null);
  const [chefId,setChefId]   = useState("");
  const [dernierRapport,setDernierRapport] = useState(null);
  const [proposerReprise,setProposerReprise] = useState(false);
  const actifs=chantiers.filter(c=>c.actif);
  const tousChefs=[...salaries.map(s=>({...s,_type:"interne"})),...interimaires.map(i=>({...i,_type:"interim"}))];
  const trouverChef=(id)=>tousChefs.find(p=>p.id===id);

  // Quand le chef se sélectionne, charger sa mémoire
  const onChefChange=(id)=>{
    setChefId(id);
    const last=load(`chok_last_${id}`,null);
    if(last && last.ts && (Date.now()-last.ts < 30*24*60*60*1000)) {
      setDernierRapport(last);
      // Pré-sélectionner le dernier chantier si toujours actif
      const ch=chantiers.find(c=>c.id===last.chantierId&&c.actif);
      if(ch){setChSel(ch);setProposerReprise(true);}
      else setProposerReprise(false);
    } else {
      setDernierRapport(null); setProposerReprise(false);
    }
  };

  const ok=chSel&&chefId;

  return(
    <>
      <div style={{padding:"0 24px",overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:16}}>

        {/* Sélection de la date */}
        <div>
          <div style={{fontSize:10,color:C.gris,letterSpacing:"0.2em",marginBottom:8,fontWeight:700}}>DATE DU RAPPORT</div>
          <div style={{display:"flex",gap:6}}>
            {optionsDates.map(o=>(
              <button key={o.iso} onClick={()=>setDate(o.iso)} style={{flex:1,padding:"10px 4px",background:dateRapport===o.iso?C.encre:C.fond,border:`1.5px solid ${dateRapport===o.iso?C.encre:C.ligne}`,color:dateRapport===o.iso?C.jaune:C.encre,fontFamily:FM,fontSize:10,fontWeight:700,cursor:"pointer",textAlign:"center"}}>
                {o.label}
              </button>
            ))}
          </div>
        </div>

        {/* Chef d'équipe — en premier pour mémoire */}
        <div>
          <div style={{fontSize:10,color:C.gris,letterSpacing:"0.2em",marginBottom:8,fontWeight:700}}>CHEF D'ÉQUIPE</div>
          {tousChefs.length===0
            ?<div style={{padding:"10px 12px",background:"#FFF8E1",border:`1px solid ${C.ligne}`,fontSize:11}}>Aucun salarié. Ajoutez-en depuis Admin.</div>
            :<select value={chefId} onChange={e=>onChefChange(e.target.value)} style={{...selectStyle,width:"100%"}}>
              <option value="" disabled>— Qui est le chef aujourd'hui ? —</option>
              {salaries.length>0&&<optgroup label="── Salariés CHOK BÉTON">{salaries.map(s=><option key={s.id} value={s.id}>{s.nom} · {s.poste}</option>)}</optgroup>}
              {interimaires.length>0&&<optgroup label="── Intérimaires">{interimaires.map(i=>{const ag=AGENCES.find(a=>a.id===i.agence);return<option key={i.id} value={i.id}>{i.nom} · {ag?.nom}</option>;})}</optgroup>}
            </select>
          }
        </div>

        {/* Proposition de reprise */}
        {proposerReprise&&dernierRapport&&(
          <div style={{padding:"12px",background:"#FFFDE7",border:`2px solid ${C.jaune}`}}>
            <div style={{fontSize:10,color:C.gris,letterSpacing:"0.15em",fontWeight:700,marginBottom:4}}>💾 DERNIER RAPPORT MÉMORISÉ</div>
            <div style={{fontSize:12,fontWeight:700,marginBottom:6}}>{chantiers.find(c=>c.id===dernierRapport.chantierId)?.nom} · {dernierRapport.equipeIds?.length} personne(s)</div>
            <div style={{fontSize:11,color:C.gris,marginBottom:8}}>Chantier et équipe pré-sélectionnés. Modifiez si besoin à l'étape suivante.</div>
          </div>
        )}

        {/* Chantier */}
        <div>
          <div style={{fontSize:10,color:C.gris,letterSpacing:"0.2em",marginBottom:8,fontWeight:700}}>CHANTIER DU JOUR</div>
          {actifs.length===0
            ?<div style={{padding:"10px 12px",background:"#FFF8E1",border:`1px solid ${C.ligne}`,fontSize:11,lineHeight:1.5}}>Aucun chantier actif.</div>
            :<div style={{display:"flex",flexDirection:"column",gap:6}}>
              {actifs.map(c=>(
                <button key={c.id} onClick={()=>setChSel(c)} style={{background:chSel?.id===c.id?C.papier:C.fond,border:`1.5px solid ${chSel?.id===c.id?C.encre:C.ligne}`,borderLeft:`5px solid ${c.couleur}`,padding:"10px 12px",cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center",fontFamily:FM}}>
                  <div><div style={{fontSize:12,fontWeight:700}}>{c.nom}</div><div style={{fontSize:10,color:C.gris,marginTop:2}}>{c.ville}</div></div>
                  {chSel?.id===c.id&&<span style={{color:C.vert,fontWeight:700}}>✓</span>}
                </button>
              ))}
            </div>
          }
        </div>
      </div>

      <MBtn variant="alt" onClick={onNouveau}>+ NOUVEAU CHANTIER</MBtn>
      <MBtn disabled={!ok} onClick={()=>ok&&onSuite(chSel,trouverChef(chefId))}>→ COMPOSER L'ÉQUIPE</MBtn>
    </>
  );
}

function MNouveauChantier({onAnnuler,onCreer}) {
  const [nom,setNom]=useState(""); const [ville,setVille]=useState(""); const [client,setClient]=useState(""); const [couleur,setCouleur]=useState(COULEURS_CHANTIER[0]);
  const ok=nom.length>2;
  return(
    <MFormWrap titre="NOUVEAU CHANTIER" onRetour={onAnnuler}>
      <MChamp label="NOM DU CHANTIER"><input value={nom} onChange={e=>setNom(e.target.value)} placeholder="Résidence Belle Vue" style={mInputStyle}/></MChamp>
      <MChamp label="VILLE"><input value={ville} onChange={e=>setVille(e.target.value)} placeholder="Ex : Villeurbanne" style={mInputStyle}/></MChamp>
      <MChamp label="CLIENT (OPTIONNEL)"><input value={client} onChange={e=>setClient(e.target.value)} placeholder="Ex : Vinci" style={mInputStyle}/></MChamp>
      <MChamp label="COULEUR"><div style={{display:"flex",gap:8}}>{COULEURS_CHANTIER.map(c=><button key={c} onClick={()=>setCouleur(c)} style={{width:32,height:32,background:c,border:"none",cursor:"pointer",outline:couleur===c?"3px solid #0A0A0A":"none",outlineOffset:2}}/>)}</div></MChamp>
      <MBtn disabled={!ok} onClick={()=>ok&&onCreer({id:genId("C"),nom,ville:ville||"—",client:client||"—",couleur,actif:true})}>✓ CRÉER LE CHANTIER</MBtn>
    </MFormWrap>
  );
}

function MEquipe({chantier,chef,salaries,interimaires,equipe,setEquipe,onRetour,onSuite,onAjoutInt}) {
  useEffect(()=>{
    if(chef&&!equipe.find(m=>m.id===chef.id))
      setEquipe([{id:chef.id,type:"interne",debut:"08:00",fin:"16:00",pause:60}]);
  },[chef]);
  const add=(id,type)=>{if(!equipe.find(m=>m.id===id))setEquipe([...equipe,{id,type,debut:"08:00",fin:"16:00",pause:60}]);};
  const del=(id)=>{if(id!==chef?.id)setEquipe(equipe.filter(m=>m.id!==id));};
  const getNom=(id)=>{const s=salaries.find(x=>x.id===id);if(s)return s.nom;const i=interimaires.find(x=>x.id===id);return i?i.nom:id;};
  const getAg=(id)=>{const i=interimaires.find(x=>x.id===id);return i?AGENCES.find(a=>a.id===i.agence):null;};
  const autreSal=salaries.filter(s=>s.id!==chef?.id&&!equipe.find(m=>m.id===s.id));
  const autreInt=interimaires.filter(i=>!equipe.find(m=>m.id===i.id));
  return(
    <MFormWrap titre="ÉQUIPE DU JOUR" onRetour={onRetour}>
      <ChantierBandeau chantier={chantier}/>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {equipe.map(m=>{const ag=m.type==="interim"?getAg(m.id):null;return(
          <div key={m.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 10px",background:C.fond,border:`1.5px solid ${C.ligne}`}}>
            <div style={{width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:11,flexShrink:0,background:m.id===chef?.id?"#0A0A0A":ag?.couleur||"#3D5A80",color:"#fff"}}>{initiales(getNom(m.id))}</div>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{getNom(m.id)}</div><div style={{fontSize:10,color:C.gris,marginTop:1}}>{m.id===chef?.id?"Chef d'équipe · TOI":m.type==="interim"?`INTÉRIM · ${ag?.nom||""}`:"Salarié interne"}</div></div>
            {m.id!==chef?.id&&<button onClick={()=>del(m.id)} style={{background:"transparent",border:`1px solid ${C.gris}`,color:C.gris,width:26,height:26,cursor:"pointer",fontSize:16,lineHeight:1,flexShrink:0}}>×</button>}
          </div>
        );})}
        {autreSal.length>0&&<select defaultValue="" onChange={e=>{if(e.target.value){add(e.target.value,"interne");e.target.value=""}}} style={{...mInputStyle,marginTop:4}}>
          <option value="" disabled>+ Ajouter un salarié CHOK BÉTON</option>
          {autreSal.map(s=><option key={s.id} value={s.id}>{s.nom} · {s.poste}</option>)}
        </select>}
        {autreInt.length>0&&<select defaultValue="" onChange={e=>{if(e.target.value){add(e.target.value,"interim");e.target.value=""}}} style={mInputStyle}>
          <option value="" disabled>+ Ajouter un intérimaire</option>
          {autreInt.map(i=>{const ag=AGENCES.find(a=>a.id===i.agence);return<option key={i.id} value={i.id}>{i.nom} · {ag?.nom}</option>;})}
        </select>}
        <button onClick={onAjoutInt} style={{padding:"11px",background:"transparent",border:`1.5px dashed ${C.encre}`,fontFamily:FM,fontSize:11,fontWeight:700,color:C.encre,cursor:"pointer"}}>+ NOUVEL INTÉRIMAIRE (pas encore fiché)</button>
      </div>
      <MBtn disabled={equipe.length===0} onClick={()=>equipe.length>0&&onSuite()}>→ SAISIR LES HORAIRES</MBtn>
    </MFormWrap>
  );
}

function MNouvelInt({onAnnuler,onCreer}) {
  const [nom,setNom]=useState(""); const [poste,setPoste]=useState("Manœuvre"); const [agence,setAgence]=useState(AGENCES[0].id);
  const ok=nom.trim().length>2;
  return(
    <MFormWrap titre="NOUVEL INTÉRIMAIRE" onRetour={onAnnuler}>
      <MChamp label="NOM COMPLET"><input value={nom} onChange={e=>setNom(e.target.value)} placeholder="Prénom Nom" style={mInputStyle}/></MChamp>
      <MChamp label="POSTE"><select value={poste} onChange={e=>setPoste(e.target.value)} style={mInputStyle}>{POSTES.map(p=><option key={p}>{p}</option>)}</select></MChamp>
      <MChamp label="AGENCE"><select value={agence} onChange={e=>setAgence(e.target.value)} style={mInputStyle}>{AGENCES.map(a=><option key={a.id} value={a.id}>{a.nom}</option>)}</select></MChamp>
      <div style={{padding:"10px 12px",background:"#FFF8E1",border:`1px solid ${C.ligne}`,fontSize:11,lineHeight:1.5}}>💡 Il sera ajouté à la base RH pour les prochaines fois.</div>
      <MBtn disabled={!ok} onClick={()=>ok&&onCreer({id:genId("I"),nom:nom.trim(),poste,agence})}>✓ AJOUTER À L'ÉQUIPE</MBtn>
    </MFormWrap>
  );
}

function MPointage({chantier,chef,equipe,setEquipe,salaries,interimaires,onRetour,onValider}) {
  const getNom=(id)=>{const s=salaries.find(x=>x.id===id);if(s)return s.nom;const i=interimaires.find(x=>x.id===id);return i?i.nom:id;};
  const getAg=(id)=>{const i=interimaires.find(x=>x.id===id);return i?AGENCES.find(a=>a.id===i.agence):null;};
  const upd=(id,k,v)=>setEquipe(equipe.map(m=>m.id===id?{...m,[k]:k==="pause"?parseInt(v)||0:v}:m));
  const [validationsInt,setValidationsInt]=useState({});
  const interimDansEquipe=equipe.filter(m=>m.type==="interim");
  const tousInterimValides=interimDansEquipe.every(m=>validationsInt[m.id]);
  const peutEnvoyer=tousInterimValides||interimDansEquipe.length===0;
  const toggleValidInt=(id)=>setValidationsInt(prev=>({...prev,[id]:!prev[id]}));
  return(
    <MFormWrap titre="HORAIRES PAR PERSONNE" onRetour={onRetour}>
      <ChantierBandeau chantier={chantier}/>
      <div style={{overflowY:"auto",flex:1,padding:"0 0 8px"}}>
        {equipe.map(m=>{
          const isChef=m.id===chef?.id; const isInt=m.type==="interim"; const ag=isInt?getAg(m.id):null;
          const total=calcHeures(m); const valide=validationsInt[m.id];
          return(
            <div key={m.id} style={{marginBottom:12,padding:"12px",background:C.fond,border:`1.5px solid ${isInt&&valide?C.vert:C.ligne}`}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <div style={{width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:11,flexShrink:0,background:isChef?"#0A0A0A":ag?.couleur||"#3D5A80",color:"#fff"}}>{initiales(getNom(m.id))}</div>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{getNom(m.id)}</div><div style={{fontSize:10,color:C.gris}}>{isChef?"CHEF D'ÉQUIPE":isInt?`INTÉRIM · ${ag?.nom}`:"SALARIÉ CHOK BÉTON"}</div></div>
                <div style={{fontFamily:FT,fontSize:16,fontWeight:800,background:C.encre,color:C.jaune,padding:"3px 10px"}}>{fmtH(total)}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
                {[["DÉBUT","time","debut"],["FIN","time","fin"],["PAUSE (min)","number","pause"]].map(([l,t,k])=>(
                  <div key={k}>
                    <div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4,fontWeight:700}}>{l}</div>
                    <input type={t} value={m[k]} onChange={e=>upd(m.id,k,e.target.value)} style={{width:"100%",padding:"10px 8px",background:C.papier,border:`1.5px solid ${C.ligne}`,fontFamily:FM,fontSize:13,outline:"none",textAlign:"center",fontWeight:700,boxSizing:"border-box"}}/>
                  </div>
                ))}
              </div>
              <div style={{marginBottom:isInt?8:0}}>
                <div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4,fontWeight:700}}>COMMENTAIRE (OPTIONNEL)</div>
                <textarea value={m.commentaire||""} onChange={e=>upd(m.id,"commentaire",e.target.value)} placeholder="Remarque, incident..." rows={2} style={{width:"100%",padding:"8px 10px",background:C.papier,border:`1.5px solid ${C.ligne}`,fontFamily:FM,fontSize:11,outline:"none",resize:"vertical",boxSizing:"border-box"}}/>
              </div>
              {isInt&&(
                <div onClick={()=>toggleValidInt(m.id)} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px",background:valide?"#E8F5E9":"#FFF8E1",border:`1.5px solid ${valide?C.vert:C.orange}`,cursor:"pointer",marginTop:4}}>
                  <div style={{width:22,height:22,border:`2px solid ${valide?C.vert:C.orange}`,background:valide?C.vert:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>{valide&&<span style={{color:"#fff",fontSize:14,fontWeight:700,lineHeight:1}}>✓</span>}</div>
                  <div style={{fontSize:11,lineHeight:1.5,color:C.encre}}>
                    <b style={{display:"block",marginBottom:3,fontSize:12}}>{valide?"✓ HEURES ACCEPTÉES":"Je soussigné(e) certifie exact le relevé d'heures ci-dessus"}</b>
                    {!valide&&<span style={{color:C.gris}}>{getNom(m.id)} · {chantier?.nom} · {m.debut}–{m.fin} ({m.pause}min) = <b>{fmtH(total)}</b><br/>En cochant, j'autorise la transmission à l'agence <b>{ag?.nom}</b>.</span>}
                    {valide&&<span style={{color:C.vert,fontSize:10}}>{getNom(m.id)} a validé · {fmtH(total)} · Transmis à {ag?.nom}</span>}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {!peutEnvoyer&&<div style={{margin:"0 0 8px",padding:"10px 14px",background:"#FFF0F0",border:`1px solid ${C.orange}`,fontSize:11,color:C.orange,fontWeight:700}}>⚠ En attente de la validation de {interimDansEquipe.filter(m=>!validationsInt[m.id]).map(m=>getNom(m.id)).join(", ")}</div>}
      <MBtn disabled={!peutEnvoyer} onClick={()=>peutEnvoyer&&onValider(validationsInt)}>✓ ENVOYER LE RAPPORT</MBtn>
    </MFormWrap>
  );
}

function MConfirm({chantier,equipe,dateRapport,onReset}) {
  const labelDate=dateRapport===TODAY?"Aujourd'hui":dateRapport===new Date(Date.now()-86400000).toISOString().slice(0,10)?"Hier":new Date(dateRapport+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"28px 24px 8px"}}>
      <div style={{width:68,height:68,background:C.vert,color:C.papier,display:"flex",alignItems:"center",justifyContent:"center",fontSize:34,fontWeight:700,marginBottom:18}}>✓</div>
      <div style={{fontFamily:FT,fontSize:20,fontWeight:800,letterSpacing:"-0.02em",textAlign:"center"}}>RAPPORT ENVOYÉ</div>
      <div style={{fontSize:12,color:C.gris,textAlign:"center",marginTop:8,lineHeight:1.6}}>{equipe.length} pointage(s) transmis<br/>en attente de validation RH.</div>
      <div style={{width:"100%",marginTop:18,padding:14,background:C.fond,fontSize:11}}>
        <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0"}}><span>Chantier</span><b>{chantier?.nom}</b></div>
        <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0"}}><span>Date</span><b>{labelDate}</b></div>
        <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0"}}><span>Équipe</span><b>{equipe.length} pers.</b></div>
        <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0"}}><span>État</span><b style={{color:C.orange}}>EN ATTENTE VALIDATION</b></div>
      </div>
      <MBtn onClick={onReset}>RETOUR ACCUEIL</MBtn>
    </div>
  );
}

function VueSalarie({session,pointages,chantiers,salaries,interimaires}) {
  const personne=salaries.find(s=>s.id===session.personneId)||interimaires.find(i=>i.id===session.personneId);
  const ag=personne&&interimaires.find(i=>i.id===personne.id)?AGENCES.find(a=>a.id===personne.agence):null;
  const mesPtg=pointages.filter(p=>p.salarie===session.personneId).sort((a,b)=>b.date.localeCompare(a.date));
  const totalTout=mesPtg.reduce((s,p)=>s+calcHeures(p),0);
  const semaine=(()=>{const d=new Date(),day=d.getDay()||7;const lundi=new Date(d);lundi.setDate(d.getDate()-day+1);return Array.from({length:5},(_,i)=>{const x=new Date(lundi);x.setDate(lundi.getDate()+i);return x.toISOString().slice(0,10);});})();
  const totalSem=mesPtg.filter(p=>semaine.includes(p.date)).reduce((s,p)=>s+calcHeures(p),0);
  const hSup=Math.max(0,totalSem-35);
  const fmtDate=(iso)=>new Date(iso+"T00:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"}).toUpperCase();
  if(!personne)return<div style={{padding:48,textAlign:"center",color:C.gris}}>Profil introuvable.</div>;
  return(
    <main style={{padding:"28px 32px",maxWidth:900,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",gap:20,padding:"24px",background:C.papier,border:`2px solid ${C.encre}`,marginBottom:24}}>
        <div style={{width:64,height:64,background:ag?ag.couleur:C.encre,color:ag?"#fff":C.jaune,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FT,fontWeight:800,fontSize:22,flexShrink:0}}>{initiales(personne.nom)}</div>
        <div style={{flex:1}}><div style={{fontFamily:FT,fontSize:28,fontWeight:800,letterSpacing:"-0.02em"}}>{personne.nom}</div><div style={{fontSize:12,color:C.gris,marginTop:4,display:"flex",alignItems:"center",gap:10}}><span>{personne.poste}</span>{ag&&<span style={{fontSize:10,padding:"2px 8px",fontWeight:700,color:"#fff",background:ag.couleur}}>{ag.nom}</span>}</div></div>
        <div style={{display:"flex",gap:24}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4}}>CETTE SEMAINE</div><div style={{fontFamily:FT,fontSize:28,fontWeight:800}}>{fmtH(totalSem)}</div></div>
          {hSup>0&&<div style={{textAlign:"center"}}><div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4}}>H. SUP</div><div style={{fontFamily:FT,fontSize:28,fontWeight:800,color:C.orange}}>+{fmtH(hSup)}</div></div>}
          <div style={{textAlign:"center"}}><div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4}}>TOTAL</div><div style={{fontFamily:FT,fontSize:28,fontWeight:800}}>{fmtH(totalTout)}</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4}}>JOURS</div><div style={{fontFamily:FT,fontSize:28,fontWeight:800}}>{mesPtg.length}</div></div>
        </div>
      </div>
      <div style={{fontFamily:FM,fontSize:11,color:C.gris,letterSpacing:"0.2em",marginBottom:12}}>MES RAPPORTS D'HEURES</div>
      {mesPtg.length===0
        ?<div style={{padding:"48px",textAlign:"center",background:C.papier,border:`1.5px dashed ${C.ligne}`,fontSize:14,color:C.gris}}>Aucun rapport d'heures enregistré pour le moment.</div>
        :<div style={{background:C.papier,border:`1.5px solid ${C.encre}`,overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr style={{background:C.fond}}>
            {["Date","Chantier","Lieu","Début","Fin","Pause","Total","État"].map((h,i)=>(
              <th key={h} style={{padding:"11px 16px",textAlign:i>2?"right":"left",fontSize:9,letterSpacing:"0.15em",color:C.gris,fontWeight:500,borderBottom:`1px solid ${C.ligne}`,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>{mesPtg.map((p,idx)=>{
            const ch=chantiers.find(c=>c.id===p.chantier); const h=calcHeures(p); const estAujourd=p.date===TODAY;
            return(<tr key={p.id} style={{borderBottom:`1px solid ${C.ligne}`,background:estAujourd?"#FFFDE7":idx%2===0?C.papier:"#F8F6F0"}}>
              <td style={{padding:"12px 16px",whiteSpace:"nowrap"}}><div style={{fontWeight:estAujourd?700:500,fontSize:12}}>{fmtDate(p.date)}</div>{estAujourd&&<div style={{fontSize:10,color:C.vert,fontWeight:700,marginTop:2}}>AUJOURD'HUI</div>}</td>
              <td style={{padding:"12px 16px"}}>{ch?<span style={{fontSize:11,padding:"3px 8px",fontWeight:700,background:ch.couleur,color:ch.couleur==="#F5C518"?"#0A0A0A":"#fff"}}>{ch.nom}</span>:<span style={{color:C.gris}}>—</span>}</td>
              <td style={{padding:"12px 16px",fontSize:11,color:C.gris}}>{ch?`📍 ${ch.ville}`:"—"}</td>
              <td style={{padding:"12px 16px",textAlign:"right",fontWeight:500}}>{p.debut}</td>
              <td style={{padding:"12px 16px",textAlign:"right",fontWeight:500}}>{p.fin}</td>
              <td style={{padding:"12px 16px",textAlign:"right",color:C.gris}}>{p.pause}min</td>
              <td style={{padding:"12px 16px",textAlign:"right"}}><b style={{fontFamily:FT,fontSize:16}}>{fmtH(h)}</b></td>
              <td style={{padding:"12px 16px",textAlign:"right"}}>{p.valide?<span style={{fontSize:10,color:C.vert,fontWeight:700}}>✓ VALIDÉ</span>:<span style={{fontSize:10,color:C.orange,fontWeight:700}}>⏳ EN ATTENTE</span>}</td>
            </tr>);
          })}</tbody>
          <tfoot><tr style={{borderTop:`2px solid ${C.encre}`,background:C.fond}}>
            <td colSpan={6} style={{padding:"12px 16px",fontWeight:700,fontSize:11,letterSpacing:"0.05em"}}>TOTAL</td>
            <td style={{padding:"12px 16px",textAlign:"right"}}><b style={{fontFamily:FT,fontSize:20,fontWeight:800}}>{fmtH(totalTout)}</b></td>
            <td></td>
          </tr></tfoot></table>
        </div>}
      <div style={{marginTop:16,padding:"12px 16px",background:"#FFF8E1",border:`1px solid ${C.ligne}`,fontSize:11,color:C.gris,lineHeight:1.6}}>🔒 Vous consultez uniquement vos propres heures. Pour toute modification, contactez la RH.</div>
    </main>
  );
}

function Clock(){const[h,setH]=useState(heureFr());useEffect(()=>{const t=setInterval(()=>setH(heureFr()),30000);return()=>clearInterval(t);},[]);return<span>{h}</span>;}
function Kpi({label,val,sub,accent,alert}){return(<div style={{background:alert?"#FFF8E1":C.papier,padding:"18px 16px 20px",position:"relative",border:`1.5px solid ${C.encre}`,overflow:"hidden"}}><div style={{position:"absolute",top:0,left:0,right:0,height:5,background:accent}}/><div style={{fontSize:10,color:C.gris,letterSpacing:"0.18em",marginTop:5,marginBottom:12}}>{label.toUpperCase()}</div><div style={{fontFamily:FT,fontSize:30,fontWeight:800,lineHeight:1,letterSpacing:"-0.03em"}}>{val}</div><div style={{fontSize:10,color:C.gris,marginTop:8}}>{sub}</div></div>);}
function Avatar({nom,bg,light}){return<div style={{width:32,height:32,background:bg||C.encre,color:light?"#fff":C.jaune,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:11,flexShrink:0}}>{initiales(nom)}</div>;}
function Section({titre,actions,children}){return(<section style={{marginBottom:32}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:12}}><h2 style={{fontFamily:FT,fontSize:22,fontWeight:700,letterSpacing:"-0.01em",margin:0}}>{titre}</h2>{actions}</div>{children}</section>);}
function TableWrap({children}){return<div style={{background:C.papier,border:`1.5px solid ${C.encre}`,overflowX:"auto"}}><table>{children}</table></div>;}
function Th({children,r}){return<th style={{textAlign:r?"right":"left",padding:"11px 14px",fontSize:10,letterSpacing:"0.15em",color:C.gris,fontWeight:500,borderBottom:`1px solid ${C.ligne}`,background:C.fond,textTransform:"uppercase",whiteSpace:"nowrap"}}>{children}</th>;}
function Td({children,r}){return<td style={{padding:"12px 14px",verticalAlign:"middle",textAlign:r?"right":"left"}}>{children}</td>;}
function EmptyState({children}){return<div style={{padding:"48px 24px",textAlign:"center",background:C.papier,border:`1.5px dashed ${C.ligne}`,fontSize:14,lineHeight:1.8}}>{children}</div>;}
function FormInline({children}){return<div style={{background:C.papier,border:`1.5px solid ${C.encre}`,padding:"16px 20px",marginBottom:20}}>{children}</div>;}
function Champ({label,children,style}){return<div style={{display:"flex",flexDirection:"column",gap:6,flex:1,minWidth:180,...(style||{})}}><label style={{fontSize:10,color:C.gris,letterSpacing:"0.18em",fontWeight:700}}>{label}</label>{children}</div>;}
function ErrBox({children}){return<div style={{marginTop:10,padding:"8px 12px",background:"#FFF0F0",border:`1px solid ${C.orange}`,color:C.orange,fontSize:12}}>{children}</div>;}
function Btn({children,onClick,variant,disabled,style}){
  const base={fontFamily:FM,cursor:disabled?"not-allowed":"pointer",letterSpacing:"0.05em",fontWeight:700,border:"none"};
  const variants={
    default:{...base,fontSize:12,padding:"9px 16px",background:C.jaune,border:`1.5px solid ${C.encre}`,color:C.encre},
    ghost:{...base,fontSize:12,padding:"9px 14px",background:"transparent",border:`1.5px solid ${C.encre}`,color:C.encre},
    export:{...base,fontSize:12,padding:"10px 18px",background:C.encre,border:`1.5px solid ${C.encre}`,color:C.jaune},
    danger:{...base,fontSize:10,padding:"6px 12px",background:"transparent",border:`1.5px solid ${C.orange}`,color:C.orange},
    mini:{...base,fontSize:10,padding:"5px 10px",background:C.encre,color:C.jaune},
    "danger-mini":{...base,fontSize:10,padding:"5px 8px",background:"transparent",border:`1px solid ${C.orange}`,color:C.orange},
  };
  const v=variants[variant||"default"];
  return<button onClick={disabled?undefined:onClick} style={{...v,opacity:disabled?0.4:1,...(style||{})}}>{children}</button>;
}
function MBtn({children,onClick,variant,disabled}){
  const base={margin:"6px 24px 8px",padding:"17px",border:"none",fontFamily:FM,fontSize:13,fontWeight:700,letterSpacing:"0.1em",cursor:disabled?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10};
  if(disabled)return<button style={{...base,background:C.ligne,color:C.gris}} disabled>{children}</button>;
  if(variant==="alt")return<button onClick={onClick} style={{...base,background:"transparent",color:C.encre,border:`2px solid ${C.encre}`,padding:"15px 24px"}}>{children}</button>;
  return<button onClick={onClick} style={{...base,background:C.encre,color:C.jaune}}>{children}</button>;
}
function MFormWrap({titre,onRetour,children}){return(<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}><div style={{padding:"0 24px 12px",display:"flex",alignItems:"center",gap:14,borderBottom:`1px solid ${C.ligne}`,marginBottom:14,flexShrink:0}}><button onClick={onRetour} style={{background:"transparent",border:"none",color:C.encre,fontFamily:FM,fontSize:12,cursor:"pointer",padding:0}}>← Annuler</button><span style={{fontFamily:FM,fontSize:11,letterSpacing:"0.2em",color:C.gris,fontWeight:700}}>{titre}</span></div><div style={{padding:"0 24px",display:"flex",flexDirection:"column",gap:14,overflowY:"auto",flex:1}}>{children}</div></div>);}
function MChamp({label,children}){return<div><div style={{fontSize:10,color:C.gris,letterSpacing:"0.2em",marginBottom:6,fontWeight:700}}>{label}</div>{children}</div>;}
function ChantierBandeau({chantier}){return(<div style={{padding:"10px 12px",background:C.fond,borderLeft:`5px solid ${chantier?.couleur||C.gris}`,flexShrink:0}}><div style={{fontSize:9,color:C.gris,letterSpacing:"0.2em"}}>CHANTIER</div><div style={{fontFamily:FT,fontSize:15,fontWeight:700,marginTop:3}}>{chantier?.nom}</div><div style={{fontSize:10,color:C.gris,marginTop:3}}>{chantier?.ville}</div></div>);}

const inputStyle={padding:"10px 12px",background:"#F2EFE9",border:`1.5px solid #D8D2C3`,fontFamily:FM,fontSize:13,outline:"none",width:"100%",boxSizing:"border-box"};
const selectStyle={padding:"10px 12px",background:"#F2EFE9",border:`1.5px solid #D8D2C3`,fontFamily:FM,fontSize:13,outline:"none",width:"100%",boxSizing:"border-box"};
const mInputStyle={width:"100%",padding:"11px 12px",background:"#F2EFE9",border:`1.5px solid #D8D2C3`,fontFamily:FM,fontSize:13,outline:"none",boxSizing:"border-box"};

function Footer(){return(<footer style={{borderTop:`2px solid #0A0A0A`,padding:"14px 32px",display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11,color:C.gris,letterSpacing:"0.05em",flexWrap:"wrap",gap:12}}><span style={{fontWeight:700,color:C.encre}}>RAPPORT HEURE CHOK BÉTON — v1.0</span><span style={{fontStyle:"italic",fontSize:10}}>{getSb()?"● Supabase actif":"○ Stockage local uniquement"}</span></footer>);}

// ============================================================
//  MOUNT

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
