function MAccueil({chantiers,salaries,interimaires,onNouveau,onSuite}) {
  const [chSel,setChSel] = useState(null);
  const [chefId,setChefId] = useState("");
  const actifs = chantiers.filter(c=>c.actif);
  // Le chef peut être un salarié OU un intérimaire
  const tousChefs = [
    ...salaries.map(s=>({...s, _type:"interne"})),
    ...interimaires.map(i=>({...i, _type:"interim"})),
  ];
  const ok = chSel && chefId;
  const trouverChef = (id) => tousChefs.find(p=>p.id===id);
  return (
    <>
      <div style={{padding:"0 24px 14px"}}>
        <div style={{fontSize:10,color:C.gris,letterSpacing:"0.2em",marginBottom:10}}>CHANTIER DU JOUR</div>
        {actifs.length===0
          ? <div style={{padding:"10px 12px",background:"#FFF8E1",border:`1px solid ${C.ligne}`,fontSize:11,lineHeight:1.5}}>Aucun chantier actif. Créez-en un ci-dessous ou dans l'onglet Admin.</div>
          : <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {actifs.map(c=>(
                <button key={c.id} onClick={()=>setChSel(c)} style={{background:chSel?.id===c.id?C.papier:C.fond,border:`1.5px solid ${chSel?.id===c.id?C.encre:C.ligne}`,borderLeft:`5px solid ${c.couleur}`,padding:"10px 12px",cursor:"pointer",textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center",fontFamily:FM}}>
                  <div><div style={{fontSize:12,fontWeight:700}}>{c.nom}</div><div style={{fontSize:10,color:C.gris,marginTop:2}}>{c.ville}</div></div>
                  {chSel?.id===c.id && <span style={{color:C.vert,fontWeight:700}}>✓</span>}
                </button>
              ))}
            </div>
        }
      </div>
      <div style={{padding:"0 24px 14px"}}>
        <div style={{fontSize:10,color:C.gris,letterSpacing:"0.2em",marginBottom:10}}>CHEF D'ÉQUIPE</div>
        {tousChefs.length===0
          ? <div style={{padding:"10px 12px",background:"#FFF8E1",border:`1px solid ${C.ligne}`,fontSize:11}}>Aucun salarié ni intérimaire. Ajoutez-en depuis l'onglet Admin.</div>
          : <select value={chefId} onChange={e=>setChefId(e.target.value)} style={{...selectStyle,width:"100%"}}>
              <option value="" disabled>— Qui est le chef aujourd'hui ? —</option>
              {salaries.length>0 && <optgroup label="── Salariés CHOK BÉTON">
                {salaries.map(s=><option key={s.id} value={s.id}>{s.nom} · {s.poste}</option>)}
              </optgroup>}
              {interimaires.length>0 && <optgroup label="── Intérimaires">
                {interimaires.map(i=>{const ag=AGENCES.find(a=>a.id===i.agence); return <option key={i.id} value={i.id}>{i.nom} · {ag?.nom}</option>;})}
              </optgroup>}
            </select>
        }
      </div>
      <div style={{flex:1}}/>
      <MBtn variant="alt" onClick={onNouveau}>+ NOUVEAU CHANTIER</MBtn>
      <MBtn disabled={!ok} onClick={()=>ok&&onSuite(chSel,trouverChef(chefId))}>→ COMPOSER L'ÉQUIPE</MBtn>
    </>
  );
}

function MEquipe({chantier,chef,salaries,interimaires,equipe,setEquipe,onRetour,onSuite,onAjoutInt}) {
  useEffect(()=>{
    if(chef && !equipe.find(m=>m.id===chef.id))
      setEquipe([{id:chef.id,type:"interne",debut:"08:00",fin:"16:00",pause:60}]);
  },[chef]);

  const add = (id,type) => { if(!equipe.find(m=>m.id===id)) setEquipe([...equipe,{id,type,debut:"08:00",fin:"16:00",pause:60}]); };
  const del = (id) => { if(id!==chef?.id) setEquipe(equipe.filter(m=>m.id!==id)); };

  const getNom = (id) => { const s=salaries.find(x=>x.id===id); if(s) return s.nom; const i=interimaires.find(x=>x.id===id); return i?i.nom:id; };
  const getAg = (id) => { const i=interimaires.find(x=>x.id===id); return i?AGENCES.find(a=>a.id===i.agence):null; };

  const autreSal = salaries.filter(s=>s.id!==chef?.id&&!equipe.find(m=>m.id===s.id));
  const autreInt = interimaires.filter(i=>!equipe.find(m=>m.id===i.id));

  return (
    <MFormWrap titre="ÉQUIPE DU JOUR" onRetour={onRetour}>
      <ChantierBandeau chantier={chantier}/>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {equipe.map(m=>{
          const ag=m.type==="interim"?getAg(m.id):null;
          return (
            <div key={m.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 10px",background:C.fond,border:`1.5px solid ${C.ligne}`}}>
              <div style={{width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:11,flexShrink:0,background:m.id===chef?.id?"#0A0A0A":ag?.couleur||"#3D5A80",color:"#fff"}}>{initiales(getNom(m.id))}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700}}>{getNom(m.id)}</div>
                <div style={{fontSize:10,color:C.gris,marginTop:1}}>{m.id===chef?.id?"Chef d'équipe · TOI":m.type==="interim"?`INTÉRIM · ${ag?.nom||""}`:"Salarié interne"}</div>
              </div>
              {m.id!==chef?.id && <button onClick={()=>del(m.id)} style={{background:"transparent",border:`1px solid ${C.gris}`,color:C.gris,width:26,height:26,cursor:"pointer",fontSize:16,lineHeight:1,flexShrink:0}}>×</button>}
            </div>
          );
        })}

        {autreSal.length>0 && <select defaultValue="" onChange={e=>{if(e.target.value){add(e.target.value,"interne");e.target.value="";}}} style={{...mInputStyle,marginTop:4}}>
          <option value="" disabled>+ Ajouter un salarié CHOK BÉTON</option>
          {autreSal.map(s=><option key={s.id} value={s.id}>{s.nom} · {s.poste}</option>)}
        </select>}

        {autreInt.length>0 && <select defaultValue="" onChange={e=>{if(e.target.value){add(e.target.value,"interim");e.target.value="";}}} style={mInputStyle}>
          <option value="" disabled>+ Ajouter un intérimaire</option>
          {autreInt.map(i=>{const ag=AGENCES.find(a=>a.id===i.agence);return <option key={i.id} value={i.id}>{i.nom} · {ag?.nom}</option>;})}
        </select>}

        <button onClick={onAjoutInt} style={{padding:"11px",background:"transparent",border:`1.5px dashed ${C.encre}`,fontFamily:FM,fontSize:11,fontWeight:700,color:C.encre,cursor:"pointer"}}>
          + NOUVEL INTÉRIMAIRE (pas encore fiché)
        </button>
      </div>
      <MBtn disabled={equipe.length===0} onClick={()=>equipe.length>0&&onSuite()}>→ SAISIR LES HORAIRES</MBtn>
    </MFormWrap>
  );
}

function MPointage({chantier,chef,equipe,setEquipe,salaries,interimaires,onRetour,onValider}) {
  const getNom = (id) => { const s=salaries.find(x=>x.id===id); if(s) return s.nom; const i=interimaires.find(x=>x.id===id); return i?i.nom:id; };
  const getAg  = (id) => { const i=interimaires.find(x=>x.id===id); return i?AGENCES.find(a=>a.id===i.agence):null; };
  const upd = (id,k,v) => setEquipe(equipe.map(m=>m.id===id?{...m,[k]:k==="pause"?parseInt(v)||0:v}:m));

  // Validation intérimaires : chaque intérimaire doit cocher sa case
  const [validationsInt, setValidationsInt] = useState({});
  const interimDansEquipe = equipe.filter(m=>m.type==="interim");
  const tousInterimValides = interimDansEquipe.every(m=>validationsInt[m.id]);
  const peutEnvoyer = tousInterimValides || interimDansEquipe.length===0;

  const toggleValidInt = (id) => setValidationsInt(prev=>({...prev,[id]:!prev[id]}));

  return (
    <MFormWrap titre="HORAIRES PAR PERSONNE" onRetour={onRetour}>
      <ChantierBandeau chantier={chantier}/>

      <div style={{overflowY:"auto",flex:1,padding:"0 0 8px"}}>
        {equipe.map(m=>{
          const isChef=m.id===chef?.id;
          const isInt=m.type==="interim";
          const ag=isInt?getAg(m.id):null;
          const total=calcHeures(m);
          const valide=validationsInt[m.id];
          return (
            <div key={m.id} style={{marginBottom:12,padding:"12px",background:C.fond,border:`1.5px solid ${isInt&&valide?C.vert:C.ligne}`}}>
              {/* En-tête membre */}
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <div style={{width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:11,flexShrink:0,background:isChef?"#0A0A0A":ag?.couleur||"#3D5A80",color:"#fff"}}>{initiales(getNom(m.id))}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700}}>{getNom(m.id)}</div>
                  <div style={{fontSize:10,color:C.gris}}>{isChef?"CHEF D'ÉQUIPE":isInt?`INTÉRIM · ${ag?.nom}`:"SALARIÉ CHOK BÉTON"}</div>
                </div>
                <div style={{fontFamily:FT,fontSize:16,fontWeight:800,background:C.encre,color:C.jaune,padding:"3px 10px"}}>{fmtH(total)}</div>
              </div>

              {/* Horaires */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}}>
                {[["DÉBUT","time","debut"],["FIN","time","fin"],["PAUSE (min)","number","pause"]].map(([l,t,k])=>(
                  <div key={k}>
                    <div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4,fontWeight:700}}>{l}</div>
                    <input type={t} value={m[k]} onChange={e=>upd(m.id,k,e.target.value)} style={{width:"100%",padding:"10px 8px",background:C.papier,border:`1.5px solid ${C.ligne}`,fontFamily:FM,fontSize:13,outline:"none",textAlign:"center",fontWeight:700,boxSizing:"border-box"}}/>
                  </div>
                ))}
              </div>

              {/* Commentaire optionnel */}
              <div style={{marginBottom:isInt?8:0}}>
                <div style={{fontSize:9,color:C.gris,letterSpacing:"0.15em",marginBottom:4,fontWeight:700}}>COMMENTAIRE (OPTIONNEL)</div>
                <textarea
                  value={m.commentaire||""}
                  onChange={e=>upd(m.id,"commentaire",e.target.value)}
                  placeholder="Remarque, incident, information..."
                  rows={2}
                  style={{width:"100%",padding:"8px 10px",background:C.papier,border:`1.5px solid ${C.ligne}`,fontFamily:FM,fontSize:11,outline:"none",resize:"vertical",boxSizing:"border-box"}}
                />
              </div>

              {/* Case à cocher validation intérimaire */}
              {isInt && (
                <div
                  onClick={()=>toggleValidInt(m.id)}
                  style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px",background:valide?"#E8F5E9":"#FFF8E1",border:`1.5px solid ${valide?C.vert:C.orange}`,cursor:"pointer",marginTop:4}}
                >
                  {/* Checkbox custom */}
                  <div style={{width:22,height:22,border:`2px solid ${valide?C.vert:C.orange}`,background:valide?C.vert:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                    {valide && <span style={{color:"#fff",fontSize:14,fontWeight:700,lineHeight:1}}>✓</span>}
                  </div>
                  <div style={{fontSize:11,lineHeight:1.5,color:C.encre}}>
                    <b style={{display:"block",marginBottom:3,fontSize:12}}>
                      {valide ? "✓ HEURES ACCEPTÉES" : "Je soussigné(e) certifie exact le relevé d'heures ci-dessus"}
                    </b>
                    {!valide && <span style={{color:C.gris}}>
                      {getNom(m.id)} · {chantier?.nom} · {m.debut}–{m.fin} ({m.pause}min pause) = <b>{fmtH(total)}</b><br/>
                      En cochant cette case, j'atteste que ces horaires sont exacts et j'autorise leur transmission à l'agence <b>{ag?.nom}</b>.
                    </span>}
                    {valide && <span style={{color:C.vert,fontSize:10}}>
                      {getNom(m.id)} a validé · {fmtH(total)} · Transmis à {ag?.nom}
                    </span>}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {!peutEnvoyer && (
        <div style={{margin:"0 0 8px",padding:"10px 14px",background:"#FFF0F0",border:`1px solid ${C.orange}`,fontSize:11,color:C.orange,fontWeight:700}}>
          ⚠ En attente de la validation de {interimDansEquipe.filter(m=>!validationsInt[m.id]).map(m=>getNom(m.id)).join(", ")}
        </div>
      )}

      <MBtn disabled={!peutEnvoyer} onClick={()=>peutEnvoyer&&onValider(validationsInt)}>✓ ENVOYER LE RAPPORT</MBtn>
    </MFormWrap>
  );
}

function MConfirm({chantier,equipe,onReset}) {
  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"28px 24px 8px"}}>
      <div style={{width:68,height:68,background:C.vert,color:C.papier,display:"flex",alignItems:"center",justifyContent:"center",fontSize:34,fontWeight:700,marginBottom:18}}>✓</div>
      <div style={{fontFamily:FT,fontSize:20,fontWeight:800,letterSpacing:"-0.02em",textAlign:"center"}}>RAPPORT ENVOYÉ</div>
      <div style={{fontSize:12,color:C.gris,textAlign:"center",marginTop:8,lineHeight:1.6}}>{equipe.length} pointage(s) transmis<br/>en attente de validation RH.</div>
      <div style={{width:"100%",marginTop:18,padding:14,background:C.fond,fontSize:11}}>
        <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0"}}><span>Chantier</span><b>{chantier?.nom}</b></div>
        <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0"}}><span>Équipe</span><b>{equipe.length} pers.</b></div>
        <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0"}}><span>État</span><b style={{color:C.orange}}>EN ATTENTE VALIDATION</b></div>
      </div>
      <MBtn onClick={onReset}>RETOUR ACCUEIL</MBtn>
    </div>
  );
}

// ============================================================
//  COMPOSANTS UTILITAIRES
// ============================================================
function Clock() {
  const [h,setH] = useState(heureFr());
  useEffect(()=>{ const t=setInterval(()=>setH(heureFr()),30000); return()=>clearInterval(t); },[]);
  return <span>{h}</span>;
}

function Kpi({label,val,sub,accent,alert}) {
  return (
    <div style={{background:alert?"#FFF8E1":C.papier,padding:"18px 16px 20px",position:"relative",border:`1.5px solid ${C.encre}`,overflow:"hidden"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:5,background:accent}}/>
      <div style={{fontSize:10,color:C.gris,letterSpacing:"0.18em",marginTop:5,marginBottom:12}}>{label.toUpperCase()}</div>
      <div style={{fontFamily:FT,fontSize:30,fontWeight:800,lineHeight:1,letterSpacing:"-0.03em"}}>{val}</div>
      <div style={{fontSize:10,color:C.gris,marginTop:8}}>{sub}</div>
    </div>
  );
}

function Avatar({nom,bg,light}) {
  return <div style={{width:32,height:32,background:bg||C.encre,color:light?"#fff":C.jaune,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:11,flexShrink:0}}>{initiales(nom)}</div>;
}

function Section({titre,actions,children}) {
  return (
    <section style={{marginBottom:32}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:12}}>
        <h2 style={{fontFamily:FT,fontSize:22,fontWeight:700,letterSpacing:"-0.01em",margin:0}}>{titre}</h2>
        {actions}
      </div>
      {children}
    </section>
  );
}

function TableWrap({children}) {
  return <div style={{background:C.papier,border:`1.5px solid ${C.encre}`,overflowX:"auto"}}><table>{children}</table></div>;
}
function Th({children,r}) { return <th style={{textAlign:r?"right":"left",padding:"11px 14px",fontSize:10,letterSpacing:"0.15em",color:C.gris,fontWeight:500,borderBottom:`1px solid ${C.ligne}`,background:C.fond,textTransform:"uppercase",whiteSpace:"nowrap"}}>{children}</th>; }
function Td({children,r}) { return <td style={{padding:"12px 14px",verticalAlign:"middle",textAlign:r?"right":"left"}}>{children}</td>; }

function EmptyState({children}) {
  return <div style={{padding:"48px 24px",textAlign:"center",background:C.papier,border:`1.5px dashed ${C.ligne}`,fontSize:14,lineHeight:1.8}}>{children}</div>;
}

function FormInline({children}) {
  return <div style={{background:C.papier,border:`1.5px solid ${C.encre}`,padding:"16px 20px",marginBottom:20}}>{children}</div>;
}

function Champ({label,children}) {
  return <div style={{display:"flex",flexDirection:"column",gap:6,flex:1,minWidth:180}}>
    <label style={{fontSize:10,color:C.gris,letterSpacing:"0.18em",fontWeight:700}}>{label}</label>
    {children}
  </div>;
}

function ErrBox({children}) {
  return <div style={{marginTop:10,padding:"8px 12px",background:"#FFF0F0",border:`1px solid ${C.orange}`,color:C.orange,fontSize:12}}>{children}</div>;
}

function Btn({children,onClick,variant,disabled,style}) {
  const base = {fontFamily:FM,cursor:disabled?"not-allowed":"pointer",letterSpacing:"0.05em",fontWeight:700,border:"none"};
  const variants = {
    default:{...base,fontSize:12,padding:"9px 16px",background:C.jaune,border:`1.5px solid ${C.encre}`,color:C.encre},
    ghost:{...base,fontSize:12,padding:"9px 14px",background:"transparent",border:`1.5px solid ${C.encre}`,color:C.encre},
    export:{...base,fontSize:12,padding:"10px 18px",background:C.encre,border:`1.5px solid ${C.encre}`,color:C.jaune},
    danger:{...base,fontSize:10,padding:"6px 12px",background:"transparent",border:`1.5px solid ${C.orange}`,color:C.orange},
    mini:{...base,fontSize:10,padding:"5px 10px",background:C.encre,color:C.jaune},
    "danger-mini":{...base,fontSize:10,padding:"5px 8px",background:"transparent",border:`1px solid ${C.orange}`,color:C.orange},
  };
  const v = variants[variant||"default"];
  return <button onClick={disabled?undefined:onClick} style={{...v,opacity:disabled?0.4:1,...(style||{})}}>{children}</button>;
}

// Mobile helpers
function MBtn({children,onClick,variant,disabled}) {
  const base = {margin:"6px 24px 8px",padding:"17px",border:"none",fontFamily:FM,fontSize:13,fontWeight:700,letterSpacing:"0.1em",cursor:disabled?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10};
  if(disabled) return <button style={{...base,background:C.ligne,color:C.gris}} disabled>{children}</button>;
  if(variant==="alt") return <button onClick={onClick} style={{...base,background:"transparent",color:C.encre,border:`2px solid ${C.encre}`,padding:"15px 24px"}}>{children}</button>;
  return <button onClick={onClick} style={{...base,background:C.encre,color:C.jaune}}>{children}</button>;
}

function MFormWrap({titre,onRetour,children}) {
  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div style={{padding:"0 24px 12px",display:"flex",alignItems:"center",gap:14,borderBottom:`1px solid ${C.ligne}`,marginBottom:14,flexShrink:0}}>
        <button onClick={onRetour} style={{background:"transparent",border:"none",color:C.encre,fontFamily:FM,fontSize:12,cursor:"pointer",padding:0}}>← Annuler</button>
        <span style={{fontFamily:FM,fontSize:11,letterSpacing:"0.2em",color:C.gris,fontWeight:700}}>{titre}</span>
      </div>
      <div style={{padding:"0 24px",display:"flex",flexDirection:"column",gap:14,overflowY:"auto",flex:1}}>
        {children}
      </div>
    </div>
  );
}

function MChamp({label,children}) {
  return <div><div style={{fontSize:10,color:C.gris,letterSpacing:"0.2em",marginBottom:6,fontWeight:700}}>{label}</div>{children}</div>;
}

function ChantierBandeau({chantier}) {
  return (
    <div style={{padding:"10px 12px",background:C.fond,borderLeft:`5px solid ${chantier?.couleur||C.gris}`,flexShrink:0}}>
      <div style={{fontSize:9,color:C.gris,letterSpacing:"0.2em"}}>CHANTIER</div>
      <div style={{fontFamily:FT,fontSize:15,fontWeight:700,marginTop:3}}>{chantier?.nom}</div>
      <div style={{fontSize:10,color:C.gris,marginTop:3}}>{chantier?.ville}</div>
    </div>
  );
}

const selectStyle = {padding:"10px 12px",background:"#F2EFE9",border:`1.5px solid #D8D2C3`,fontFamily:FM,fontSize:13,outline:"none",width:"100%",boxSizing:"border-box"};
const mInputStyle = {width:"100%",padding:"11px 12px",background:"#F2EFE9",border:`1.5px solid #D8D2C3`,fontFamily:FM,fontSize:13,outline:"none",boxSizing:"border-box"};
